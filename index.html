<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Intelligence Flow | Live API</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #050505;
            --accent: #38bdf8;
            --text: #e2e8f0;
            --dim: #64748b;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
        }

        .search-container {
            width: 90%;
            max-width: 650px;
            position: sticky;
            top: 20px;
            z-index: 100;
        }

        .search-bar {
            background: #111;
            border: 1px solid #222;
            padding: 12px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
        }

        .search-bar:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.15);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 1.1rem;
            outline: none;
        }

        .flow-container {
            width: 90%;
            max-width: 650px;
            margin-top: 40px;
            display: none;
        }

        .ai-monologue {
            color: var(--dim);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 40px;
            padding-left: 15px;
            border-left: 1px solid #222;
        }

        .user-term { color: var(--accent); font-weight: 600; }

        .content-section {
            opacity: 0;
            transition: opacity 1s ease;
        }

        .definition-header { font-size: 2rem; margin-bottom: 10px; font-weight: 700; }
        .definition-body { font-size: 1.15rem; color: #cbd5e1; line-height: 1.8; margin-bottom: 40px; }

        .link-grid { display: flex; flex-direction: column; gap: 20px; margin-top: 30px; }
        .link-entry { display: flex; align-items: flex-start; gap: 15px; text-decoration: none; }
        .icon-circle {
            width: 32px; height: 32px; background: #111; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; color: var(--accent);
        }
        .link-text { display: flex; flex-direction: column; }
        .link-title { color: var(--accent); font-weight: 600; font-size: 1rem; margin-bottom: 2px; }
        .link-url { color: var(--dim); font-size: 0.85rem; letter-spacing: 0.5px; }
        .highlight-url { background: rgba(56, 189, 248, 0.1); color: var(--accent); padding: 2px 4px; border-radius: 4px; }
        .cursor { display: inline-block; width: 8px; height: 18px; background: var(--accent); animation: blink 0.7s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="search-container">
        <div class="search-bar">
            <i data-lucide="brain-circuit" color="#38bdf8"></i>
            <input type="text" id="aiInput" placeholder="Analyze a concept..." onkeypress="checkKey(event)">
        </div>
    </div>

    <div class="flow-container" id="flow">
        <div class="ai-monologue" id="monologue"></div>
        <div class="content-section" id="results">
            <h1 class="definition-header" id="outTitle"></h1>
            <p class="definition-body" id="outDef"></p>
            <div class="link-grid" id="outLinks"></div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const API_KEY = "Gsk_xyMPbp7mhCts7vKcCtOdWGdyb3FYFZp0Kde16CIFgTRl1mCzm5JW";

        function checkKey(e) { if(e.key === 'Enter') startInference(); }

        async function startInference() {
            const query = document.getElementById('aiInput').value;
            if(!query) return;

            const flow = document.getElementById('flow');
            const mono = document.getElementById('monologue');
            const res = document.getElementById('results');
            flow.style.display = 'block';
            res.style.opacity = '0';
            
            await typeEffect(mono, `The user is now thinking about <span class="user-term">"${query}"</span>. Initializing high-speed inference via Groq... mapping semantic clusters and generating synthesis...`);

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "mixtral-8x7b-32768",
                        messages: [
                            { role: "system", content: "Explain the concept in 3 clear, professional sentences for a developer interface." },
                            { role: "user", content: query }
                        ],
                        temperature: 0.7
                    })
                });

                if (!response.ok) throw new Error("API Connection Failed");

                const data = await response.json();
                const aiText = data.choices[0].message.content;

                mono.innerHTML += `<br><br><span style="color:var(--accent)">✔</span> Connection established. Intelligence synthesized.`;
                
                await wait(800);
                res.style.opacity = '1';
                renderResult(query, aiText);

            } catch (err) {
                mono.innerHTML += `<br><br><span style="color:#f87171">✘ Error:</span> ${err.message}. Ensure you are using a local server or have CORS handled.`;
            }
        }

        function renderResult(query, definition) {
            document.getElementById('outTitle').innerText = query;
            document.getElementById('outDef').innerText = definition;

            const links = [
                { name: 'Primary Documentation', url: `https://www.google.com/search?q=${query}+documentation` },
                { name: 'Developer Network', url: `https://developer.mozilla.org/en-US/search?q=${query}` },
                { name: 'Academic Research', url: `https://arxiv.org/search/?query=${query}&searchtype=all` }
            ];

            document.getElementById('outLinks').innerHTML = links.map(l => `
                <a href="${l.url}" class="link-entry" target="_blank">
                    <div class="icon-circle"><i data-lucide="globe" size="16"></i></div>
                    <div class="link-text">
                        <span class="link-title">${l.name}</span>
                        <span class="link-url">Source: <span class="highlight-url">${l.url}</span></span>
                    </div>
                </a>
            `).join('');
            lucide.createIcons();
        }

        async function typeEffect(element, text) {
            let i = 0;
            element.innerHTML = "";
            return new Promise(res => {
                const interval = setInterval(() => {
                    element.innerHTML = text.slice(0, i) + '<span class="cursor"></span>';
                    i++;
                    if(i > text.length) { clearInterval(interval); res(); }
                }, 20);
            });
        }

        function wait(ms) { return new Promise(r => setTimeout(r, ms)); }
    </script>
</body>
</html>
