<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yoco Live Payment Example - R2</title>
  <!-- Yoco JS SDK -->
  <script src="https://js.yoco.com/v1/yoco-sdk.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f4f4f4;
    }
    #payButton {
      padding: 15px 30px;
      font-size: 18px;
      background-color: #1e90ff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    #payButton:hover {
      background-color: #0f68c1;
    }
  </style>
</head>
<body>

  <button id="payButton">Pay Now R2</button>

  <script>
    // Initialize Yoco with your Live Public Key
    const yoco = new Yoco({
      publicKey: 'pk_live_3fa50d60wE6ZogWa2474'
    });

    const payButton = document.getElementById('payButton');

    payButton.addEventListener('click', function() {
      yoco.showPopup({
        amountInCents: 200, // R2 in cents
        currency: 'ZAR',
        name: 'Test Product',
        description: 'This is a test purchase',
        callback: function(response) {
          if (response.error) {
            alert('Payment failed: ' + response.error.message);
          } else {
            console.log('Payment token: ', response.id);
            alert('Payment successful! Token: ' + response.id);
            // Normally, send this token to your server to charge the card
          }
        }
      });
    });
  </script>

</body>
</html>
