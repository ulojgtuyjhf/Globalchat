<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Life</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        iframe {
            position: fixed; inset: 0;
            width: 100%; height: 100%;
            border: none; display: block;
        }
    </style>
</head>
<body>

<iframe id="appFrame" src="" allowfullscreen allow="camera; microphone; autoplay"></iframe>

<script>
(function () {
    var MOBILE_SRC  = 'mobile.html';
    var DESKTOP_SRC = 'desktop.html';
    var isMobile = window.matchMedia('(max-width: 899px)').matches;
    document.getElementById('appFrame').src = isMobile ? MOBILE_SRC : DESKTOP_SRC;

    // Re-check on resize (e.g. tablet rotation)
    window.matchMedia('(max-width: 899px)').addEventListener('change', function (e) {
        var frame = document.getElementById('appFrame');
        var target = e.matches ? MOBILE_SRC : DESKTOP_SRC;
        if (frame.src.indexOf(target) === -1) frame.src = target;
    });
})();
</script>

<script>
    // ── Download notification (isolated IIFE — no conflicts) ──
    (function() {
        'use strict';
        function createDownloadNotification() {
            if (window.matchMedia('(display-mode: standalone)').matches ||
                window.navigator.standalone ||
                document.referrer.includes('android-app://')) return;
            var isApple = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
            if (isApple) return;
            var ua = navigator.userAgent.toLowerCase();
            var isWebView = /(webview|wv)/.test(ua) || (/android/.test(ua) && /wv/.test(ua));
            var isMobile = /android|windows phone/.test(ua);
            var isDesktop = !/(android|iphone|ipad|ipod|windows phone)/i.test(ua);
            if (!isMobile || isWebView || isDesktop) return;

            var isAndroid = /android/.test(ua);
            var brandGradient = 'linear-gradient(135deg,#0f0f0f 0%,#3a3a3a 40%,#626262 70%,#a6a6a6 100%)';
            var brandDark = '#3a3a3a';
            var brandMid = '#626262';

            var notification = document.createElement('div');
            notification.id = 'dlNotif';
            notification.style.cssText = [
                'position:fixed','bottom:80px','left:50%',
                'transform:translateX(-50%) translateY(120px)',
                'background:#1a1a1a',
                'color:#fff',
                'padding:14px 16px',
                'border-radius:18px',
                'font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif',
                'box-shadow:0 6px 24px rgba(0,0,0,0.5)',
                'display:flex','align-items:center','gap:12px',
                'opacity:0',
                'transition:all 0.45s cubic-bezier(0.4,0,0.2,1)',
                'z-index:99999','max-width:92%','width:auto',
                'border:1px solid #3a3a3a'
            ].join(';');

            var iconEl = document.createElement('div');
            iconEl.innerHTML = '<svg width="36" height="36" viewBox="0 0 36 36"><defs><linearGradient id="dlGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0f0f0f"/><stop offset="50%" stop-color="#626262"/><stop offset="100%" stop-color="#a6a6a6"/></linearGradient></defs><circle cx="18" cy="18" r="18" fill="url(#dlGrad)"/><text x="50%" y="50%" text-anchor="middle" fill="#fff" font-size="15" font-weight="700" dy=".35em" font-family="sans-serif">N</text></svg>';

            var textEl = document.createElement('div');
            textEl.innerHTML = '<div style="font-size:13px;font-weight:700;color:#fff;margin-bottom:3px;">Get the App</div>'
                + '<div style="font-size:11px;color:rgba(255,255,255,0.55);">' + (isAndroid ? 'Download for Android' : 'Download for Windows') + '</div>';

            var btnWrap = document.createElement('div');
            btnWrap.style.cssText = 'display:flex;gap:8px;margin-left:8px;flex-shrink:0;';

            var installBtn = document.createElement('button');
            installBtn.textContent = 'Install';
            installBtn.style.cssText = 'background:linear-gradient(135deg,#3a3a3a,#8f8f8f);color:#fff;border:none;padding:7px 14px;border-radius:20px;font-weight:600;font-size:12px;cursor:pointer;white-space:nowrap;';

            var cancelBtn = document.createElement('button');
            cancelBtn.textContent = 'Later';
            cancelBtn.style.cssText = 'background:transparent;color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.25);padding:7px 12px;border-radius:20px;font-weight:500;font-size:12px;cursor:pointer;white-space:nowrap;';

            function hide() {
                notification.style.opacity = '0';
                notification.style.transform = 'translateX(-50%) translateY(120px)';
                setTimeout(function(){ if (notification.parentNode) notification.parentNode.removeChild(notification); }, 500);
            }

            installBtn.onclick = function() {
                var url = isAndroid ? 'https://median.co/share/zjajxa#apk' : 'https://median.co/share/bzqkem#apk';
                var a = document.createElement('a');
                a.href = url; a.download = 'app.apk';
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                hide();
            };
            cancelBtn.onclick = hide;

            btnWrap.appendChild(installBtn);
            btnWrap.appendChild(cancelBtn);
            notification.appendChild(iconEl);
            notification.appendChild(textEl);
            notification.appendChild(btnWrap);
            document.body.appendChild(notification);

            setTimeout(function() {
                notification.style.opacity = '1';
                notification.style.transform = 'translateX(-50%) translateY(0)';
            }, 1200);

            setTimeout(hide, 12000);
        }
        if (document.readyState === 'complete') {
            createDownloadNotification();
        } else {
            window.addEventListener('load', createDownloadNotification, { once: true });
        }
    })();
    </script>
    <script>
  // Immediately hide everything to prevent flickering  
  document.documentElement.style.visibility = 'hidden';
  
  // Check local storage for theme preference from the page  
  const themePreference = localStorage.getItem('twitter-theme') || 'light';
  
  // Define luxury gradient (static but refined)  
  const luxuryGradient = `linear-gradient(
    135deg,  
    #0f0f0f 0%,  
    #1c1c1c 15%,  
    #3a3a3a 30%,  
    #4d4d4d 45%,  
    #626262 60%,  
    #787878 75%,  
    #8f8f8f 90%,  
    #a6a6a6 100%
  )`;
  
  // Create splash screen container  
  const splashScreen = document.createElement('div');
  splashScreen.style.cssText = `  
    position: fixed;  
    top: 0;  
    left: 0;  
    width: 100vw;  
    height: 100vh;  
    background-color: ${themePreference === 'light' ? '#f7f9fa' : themePreference === 'dim' ? '#15202b' : '#000000'};  
    display: flex;  
    flex-direction: column;  
    justify-content: center;  
    align-items: center;  
    z-index: 9999;  
    opacity: 1;  
    transition: opacity 0.5s ease-in-out;  
  `;
  
  // Create content wrapper  
  const contentWrapper = document.createElement('div');
  contentWrapper.style.cssText = `  
    position: relative;  
    height: 100%;  
    width: 100%;  
    display: flex;  
    flex-direction: column;  
    justify-content: center;  
    align-items: center;  
  `;
  
  // Create logo container - positioned in the middle  
  const logoContainer = document.createElement('div');
  logoContainer.style.cssText = `  
    position: absolute;  
    top: 50%;  
    left: 50%;  
    transform: translate(-50%, -50%);  
    width: 96px;  
    height: 96px;  
    display: flex;  
    justify-content: center;  
    align-items: center;  
  `;
  
  // Add style for the circle border (now thicker and more polished)
  const styleElement = document.createElement('style');
  styleElement.textContent = `  
    #splash-screen-logo::before {  
        content: '';  
        position: absolute;  
        top: -8px;  
        left: -8px;  
        right: -8px;  
        bottom: -8px;  
        border-radius: 50%;  
        background: ${luxuryGradient};  
        -webkit-mask:   
            linear-gradient(#fff 0 0) content-box,   
            linear-gradient(#fff 0 0);  
        -webkit-mask-composite: xor;  
        mask-composite: exclude;  
        border: 8px solid transparent;  
        z-index: 1;
        padding: 2px; /* Adds smoothness to the gradient edge */
    }  
  `;
  
  document.head.appendChild(styleElement);
  
  // Logo design with refined gradient border  
  const logoPlaceholder = document.createElement('div');
  logoPlaceholder.id = 'splash-screen-logo';
  logoPlaceholder.style.cssText = `  
    width: 100%;  
    height: 100%;  
    border-radius: 50%;  
    display: flex;  
    justify-content: center;  
    align-items: center;  
    position: relative;  
    background: ${themePreference === 'light' ? '#f7f9fa' : themePreference === 'dim' ? '#15202b' : '#000000'};
  `;
  
  const logoText = document.createElement('span');
  logoText.textContent = 'N';
  logoText.style.cssText = `  
    font-size: 48px;  
    font-weight: 700;  
    background: ${luxuryGradient};  
    -webkit-background-clip: text;  
    background-clip: text;  
    color: transparent;  
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;  
    z-index: 2;  
    letter-spacing: -2px;
    letter-spacing: -2px;
  `;
  logoPlaceholder.appendChild(logoText);
  logoContainer.appendChild(logoPlaceholder);
  
  // Create company info container at the bottom  
  const companyInfoContainer = document.createElement('div');
  companyInfoContainer.style.cssText = `  
    position: absolute;  
    bottom: 15%;  
    left: 50%;  
    transform: translateX(-50%);  
    display: flex;  
    flex-direction: column;  
    align-items: center;  
    text-align: center;
  `;
  
  // Create "from" text (more elegant)
  const tagline = document.createElement('div');
  tagline.style.cssText = `  
    font-size: 14px;  
    color: ${themePreference === 'light' ? '#657786' : '#8899a6'};  
    margin-bottom: 6px;  
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;  
    font-weight: 400;
    letter-spacing: 0.5px;
    opacity: 0.8;
  `;
  tagline.textContent = 'from';
  
  // Create company name with refined gradient
  const companyName = document.createElement('h1');
  companyName.textContent = 'nmedea';
  companyName.className = 'splash-name-shimmer';
  companyName.style.cssText = `  
    font-size: 24px;  
    font-weight: 600;  
    margin: 0;  
    letter-spacing: 0.8px;  
    background: ${luxuryGradient};  
    -webkit-background-clip: text;  
    background-clip: text;  
    color: transparent;  
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;  
    text-transform: lowercase;
  `;
  
  // Append elements  
  companyInfoContainer.appendChild(tagline);
  companyInfoContainer.appendChild(companyName);
  contentWrapper.appendChild(logoContainer);
  contentWrapper.appendChild(companyInfoContainer);
  splashScreen.appendChild(contentWrapper);
  
  // Shimmer on logo circle + company name only (not full screen)
  const shimmerStyle = document.createElement('style');
  shimmerStyle.textContent = `
    @keyframes logoShimmer {
      0%   { transform: translateX(-200%) skewX(-18deg); }
      100% { transform: translateX(400%)  skewX(-18deg); }
    }
    @keyframes nameShimmer {
      0%   { transform: translateX(-250%) skewX(-18deg); }
      100% { transform: translateX(500%)  skewX(-18deg); }
    }
    .splash-logo-shimmer {
      position: absolute;
      inset: 0;
      overflow: hidden;
      border-radius: 50%;
      pointer-events: none;
      z-index: 5;
    }
    .splash-logo-shimmer::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 40%; height: 100%;
      background: linear-gradient(
        105deg,
        transparent 0%,
        transparent 30%,
        rgba(255,255,255,0.28) 50%,
        transparent 70%,
        transparent 100%
      );
      animation: logoShimmer 2.8s cubic-bezier(0.4,0,0.2,1) infinite;
    }
    .splash-name-shimmer {
      position: relative;
      overflow: hidden;
      display: inline-block;
    }
    .splash-name-shimmer::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 35%; height: 100%;
      background: linear-gradient(
        105deg,
        transparent 0%,
        rgba(255,255,255,0.35) 50%,
        transparent 100%
      );
      animation: nameShimmer 2.8s cubic-bezier(0.4,0,0.2,1) infinite;
      animation-delay: 0.4s;
    }
  `;
  document.head.appendChild(shimmerStyle);
  // Add shimmer overlay inside logo circle
  const shimmerEl = document.createElement('div');
  shimmerEl.className = 'splash-logo-shimmer';
  logoPlaceholder.appendChild(shimmerEl);

  // Add to body immediately  
  document.body.insertBefore(splashScreen, document.body.firstChild);
  
  // Show the splash screen immediately  
  document.documentElement.style.visibility = 'visible';
  
  // Find and hide the auth container if it exists  
  const hideAuthContainer = () => {
    const authContainer = document.querySelector('.auth-container');
    if (authContainer) {
      authContainer.style.opacity = '0';
      authContainer.style.pointerEvents = 'none';
      authContainer.style.position = 'fixed';
      authContainer.style.top = '-100%';
    }
  };
  
  // Try to hide the auth container  
  hideAuthContainer();
  
  // Give it another try after a delay in case DOM isn't ready  
  setTimeout(hideAuthContainer, 100);
  
  // Remove splash screen and show content  
  const removeSplashScreen = () => {
    splashScreen.style.opacity = '0';
    
    setTimeout(() => {
      if (document.body.contains(splashScreen)) {
        document.body.removeChild(splashScreen);
      }
      
      // Restore any hidden containers  
      const authContainer = document.querySelector('.auth-container');
      if (authContainer) {
        authContainer.style.position = 'static';
        authContainer.style.top = '0';
        authContainer.style.opacity = '1';
        authContainer.style.pointerEvents = 'auto';
      }
    }, 500);
  };
  
  // Remove after 11 seconds  
  setTimeout(removeSplashScreen, 11000);
  
  // Expose a method to easily replace the logo  
  window.replaceSplashScreenLogo = (logoUrl) => {
    const logoElement = document.getElementById('splash-screen-logo');
    if (logoElement) {
      // Clear existing content  
      logoElement.innerHTML = '';
      
      // Create and append new logo image  
      const logoImage = document.createElement('img');
      logoImage.src = logoUrl;
      logoImage.style.cssText = `  
        width: 100%;  
        height: 100%;  
        object-fit: contain;  
        border-radius: 50%;
      `;
      logoElement.appendChild(logoImage);
    }
  };
</script>
</body>
</html>
