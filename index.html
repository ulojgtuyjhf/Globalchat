<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pay R2</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f4f4f4;
      gap: 16px;
    }
    h2 { color: #333; }
    #payButton {
      padding: 15px 30px;
      font-size: 18px;
      background-color: #1e90ff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    #payButton:hover { background-color: #0f68c1; }
    #status {
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>

  <h2>Test Product - R2</h2>
  <button id="payButton">Pay Now R2</button>
  <p id="status">Click the button to pay</p>

  <script>
    const payButton = document.getElementById('payButton');
    const status = document.getElementById('status');

    payButton.addEventListener('click', function () {
      status.textContent = 'Opening payment...';

      // Build Yoco payment URL
      const params = new URLSearchParams({
        publicKey: 'pk_live_3fa50d60wE6ZogWa2474',
        amount: '200',
        currency: 'ZAR',
        name: 'Test Product',
        description: 'This is a test purchase'
      });

      // Load Yoco SDK dynamically
      const script = document.createElement('script');
      script.src = 'https://js.yoco.com/v1/yoco-sdk.js';

      script.onload = function () {
        status.textContent = 'SDK loaded! Opening popup...';
        const yoco = new Yoco({
          publicKey: 'pk_live_3fa50d60wE6ZogWa2474'
        });
        yoco.showPopup({
          amountInCents: 200,
          currency: 'ZAR',
          name: 'Test Product',
          description: 'This is a test purchase',
          callback: function (response) {
            if (response.error) {
              status.textContent = 'Payment failed: ' + response.error.message;
              alert('Payment failed: ' + response.error.message);
            } else {
              status.textContent = 'Payment successful! Token: ' + response.id;
              alert('Payment successful! Token: ' + response.id);
            }
          }
        });
      };

      script.onerror = function () {
        status.textContent = 'SDK failed to load - check your internet connection';
        alert('Could not load Yoco SDK. Please check your internet connection.');
      };

      document.body.appendChild(script);
    });
  </script>

</body>
</html>
