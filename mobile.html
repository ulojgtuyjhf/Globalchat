<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Air Hockey</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0d2137;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Outfit',sans-serif;overflow:hidden;touch-action:none;user-select:none;}
#scoreboard{display:flex;align-items:center;padding:8px 0 10px;width:100%;max-width:420px;justify-content:space-around;}
.sp{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;}
.sp-name{font-size:13px;font-weight:700;letter-spacing:.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px;padding:0 4px;text-align:center;}
.sp-you{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:20px;margin-bottom:2px;}
.sp.blue .sp-name{color:#29b6f6;} .sp.red .sp-name{color:#ef5350;}
.sp.blue .sp-you{background:rgba(41,182,246,.15);color:#29b6f6;}
.sp.red  .sp-you{background:rgba(239,83,80,.15);color:#ef5350;}
.sp-score{font-size:34px;font-weight:900;letter-spacing:1px;}
.sp.blue .sp-score{color:#29b6f6;} .sp.red .sp-score{color:#ef5350;}
.sp-divider{font-size:18px;color:rgba(255,255,255,.15);font-weight:300;padding:0 4px;align-self:center;margin-top:18px;}
#canvas-wrap{position:relative;border-radius:16px;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.7),0 0 20px rgba(41,182,246,.15);}
canvas{display:block;}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(13,33,55,.92);z-index:10;border-radius:16px;backdrop-filter:blur(10px);padding:20px;}
#overlay h1{font-size:26px;color:#fff;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;font-weight:900;text-align:center;}
.ov-sub{color:rgba(255,255,255,.4);font-size:12px;margin-bottom:16px;letter-spacing:.5px;text-align:center;}
#wait-room{display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;margin-bottom:14px;}
.wr-slot{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:10px 14px;width:100%;}
.wr-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;transition:background .3s,box-shadow .3s;}
.wr-dot.blue{background:#29b6f6;box-shadow:0 0 6px #29b6f6;} .wr-dot.red{background:#ef5350;box-shadow:0 0 6px #ef5350;} .wr-dot.empty{background:rgba(255,255,255,.12);}
.wr-name{font-size:13px;font-weight:700;color:#fff;flex:1;}
.wr-tag{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.3);}
.wait-pulse{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,.35);letter-spacing:.04em;}
.wp-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.3);animation:wpd .9s ease-in-out infinite;}
.wp-dot:nth-child(2){animation-delay:.15s;} .wp-dot:nth-child(3){animation-delay:.3s;}
@keyframes wpd{0%,100%{opacity:.3;transform:scale(1);}50%{opacity:1;transform:scale(1.4);}}
#start-btn{background:linear-gradient(135deg,#29b6f6,#0288d1);color:#fff;border:none;padding:12px 36px;font-size:15px;font-weight:900;letter-spacing:1.5px;border-radius:50px;cursor:pointer;text-transform:uppercase;box-shadow:0 4px 20px rgba(41,182,246,.35);font-family:'Outfit',sans-serif;-webkit-tap-highlight-color:transparent;display:none;}
#start-btn:active{transform:scale(.94);}
#role-badge{position:absolute;top:8px;left:10px;display:flex;align-items:center;gap:5px;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;z-index:20;}
.rb-dot{width:6px;height:6px;border-radius:50%;} .rb-dot.blue{background:#29b6f6;} .rb-dot.red{background:#ef5350;} .rb-dot.grey{background:rgba(255,255,255,.3);}
.rb-label{color:rgba(255,255,255,.45);}
#live-badge{position:absolute;top:8px;right:10px;display:flex;align-items:center;gap:4px;font-size:9px;font-weight:700;color:rgba(255,255,255,.45);letter-spacing:.06em;text-transform:uppercase;z-index:20;}
.live-dot-sm{width:5px;height:5px;border-radius:50%;background:#22c55e;animation:ldp 1.4s ease-in-out infinite;}
@keyframes ldp{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>

<div id="scoreboard">
  <div class="sp blue">
    <div class="sp-you" id="you-blue" style="display:none">You</div>
    <div class="sp-name" id="name-blue">—</div>
    <div class="sp-score" id="score-blue">0</div>
  </div>
  <div class="sp-divider">vs</div>
  <div class="sp red">
    <div class="sp-you" id="you-red" style="display:none">You</div>
    <div class="sp-name" id="name-red">—</div>
    <div class="sp-score" id="score-red">0</div>
  </div>
</div>

<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div id="role-badge"><div class="rb-dot grey" id="rb-dot"></div><span class="rb-label" id="rb-label">Connecting...</span></div>
  <div id="live-badge"><span class="live-dot-sm"></span>Live</div>
  <div id="overlay">
    <h1 id="ov-title">Air Hockey</h1>
    <div class="ov-sub" id="ov-sub">Live multiplayer · First to 7 wins</div>
    <div id="wait-room">
      <div class="wr-slot">
        <div class="wr-dot blue"></div>
        <span class="wr-name" id="wr-blue">Waiting...</span>
        <span class="wr-tag">Blue</span>
      </div>
      <div class="wr-slot">
        <div class="wr-dot empty" id="wr-dot-red"></div>
        <span class="wr-name" id="wr-red">Waiting for opponent...</span>
        <span class="wr-tag">Red</span>
      </div>
    </div>
    <div class="wait-pulse" id="wait-pulse">
      <div class="wp-dot"></div><div class="wp-dot"></div><div class="wp-dot"></div>
      <span>Waiting for opponent</span>
    </div>
    <button id="start-btn">Start Game</button>
  </div>
</div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getDatabase,ref,set,get,update,onValue,onDisconnect,serverTimestamp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

const cfg={apiKey:"AIzaSyDnPz8BWCaXJOazlFVO4Eap8VxdSR2oDFQ",authDomain:"globalchat-2d669.firebaseapp.com",databaseURL:"https://globalchat-2d669-default-rtdb.firebaseio.com/"};
const app=initializeApp(cfg);
const rtdb=getDatabase(app);

// Injected by feed (or fallback)
const GID=window.__NM_GID||('demo_'+Math.random().toString(36).slice(2,8));
const MY_UID=window.__NM_UID||('g_'+Math.random().toString(36).slice(2,10));
const MY_NAME=window.__NM_NAME||'Guest_' + Math.floor(Math.random()*9999);

const ROOM=`ah_rooms/${GID}`;
const rr=p=>ref(rtdb,`\( {ROOM}/ \){p}`);
const $=id=>document.getElementById(id);

// Canvas setup
const canvas=$('c'),ctx=canvas.getContext('2d');
const W=Math.min(window.innerWidth-4,420);
const H=Math.min(window.innerHeight-130,760);
canvas.width=W;canvas.height=H;

const PR=W*.085,PUCK=W*.055,GW=W*.38,BD=W*.045;
const MSPD=W*.022,FR=.993,PS=.28;

let myRole=null,gameActive=false,animId=null;
let puck={x:W/2,y:H/2,vx:0,vy:0,r:PUCK};
let bP={x:W/2,y:H*.18,tx:W/2,ty:H*.18,px:W/2,py:H*.18};
let rP={x:W/2,y:H*.82,tx:W/2,ty:H*.82,px:W/2,py:H*.82};
let sB=0,sR=0,gFlash=0,gWin='';
let pBlue={name:'—',uid:''},pRed={name:'—',uid:''};
let _lastPush=0,_pushTick=0;

function cl(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function dst(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}

function resetPuck(dir=1){
  puck.x=W/2;puck.y=H/2;
  const a=(Math.random()*.8-.4)+(dir>0?-Math.PI/2:Math.PI/2);
  puck.vx=Math.cos(a)*W*.008;puck.vy=Math.sin(a)*W*.008;
}

// ── UI ──────────────────────────────────────────────────
function uiNames(){
  $('name-blue').textContent=pBlue.name;
  $('name-red').textContent=pRed.name;
  $('wr-blue').textContent=pBlue.name||'Waiting...';
  if(pRed.uid){\( ('wr-red').textContent=pRed.name; \)('wr-dot-red').className='wr-dot red';}
  else{\( ('wr-red').textContent='Waiting for opponent...'; \)('wr-dot-red').className='wr-dot empty';}
  
  $('you-blue').style.display=(myRole==='blue')?'block':'none';
  $('you-red').style.display=(myRole==='red')?'block':'none';
  
  if(myRole){
    $('rb-dot').className='rb-dot '+myRole;
    $('rb-label').textContent='You · '+myRole.toUpperCase();
  }
}

// ── Join with better race-condition handling ─────────────
async function join(){
  let attempts = 0;
  const maxAttempts = 8;

  while(attempts < maxAttempts){
    attempts++;
    const snap=await get(ref(rtdb,ROOM));
    const room=snap.exists()?snap.val():{};

    if(!room.blue || room.blue.uid === MY_UID){
      myRole='blue';
      await set(rr('blue'),{uid:MY_UID,name:MY_NAME,t:Date.now()});
      onDisconnect(rr('blue')).remove();
      onDisconnect(rr('state')).remove();
      break;
    } 
    else if(!room.red || room.red.uid === MY_UID){
      myRole='red';
      await set(rr('red'),{uid:MY_UID,name:MY_NAME,t:Date.now()});
      onDisconnect(rr('red')).remove();
      break;
    } 
    else {
      // Room full → spectator (rare for 1v1)
      myRole='spectator';
      $('rb-label').textContent='Spectating';
      break;
    }

    // Small delay before retry
    await new Promise(r=>setTimeout(r, 120));
  }

  // Watch the entire room
  onValue(ref(rtdb,ROOM),snap=>{
    if(!snap.exists()) return;
    const r = snap.val();

    pBlue = r.blue ? {uid:r.blue.uid, name:r.blue.name} : {uid:'',name:'—'};
    pRed  = r.red  ? {uid:r.red.uid,  name:r.red.name}  : {uid:'',name:'—'};

    const both = !!(r.blue && r.red);
    $('wait-pulse').style.display = both ? 'none' : 'flex';
    $('start-btn').style.display = (both && myRole==='blue' && !gameActive) ? 'flex' : 'none';

    // Non-host reads full game state
    if(r.state && gameActive && myRole !== 'blue'){
      syncState(r.state);
    }

    // Start signal from host
    if(r.state && r.state.on && !gameActive){
      beginLocal();
    }

    // End signal
    if(r.state && r.state.on===false && gameActive){
      const wn = r.state.w==='blue' ? pBlue.name : pRed.name;
      doEndOverlay(wn, r.state.sb||0, r.state.sr||0);
    }

    uiNames();
  });
}

// ── Sync state (for red player & spectators) ─────────────
function syncState(s){
  puck.x = s.px||puck.x; puck.y = s.py||puck.y;
  puck.vx = s.pvx||0; puck.vy = s.pvy||0;
  gFlash = s.gf||0; gWin = s.gw||'';
  sB = s.sb||0; sR = s.sr||0;

  $('score-blue').textContent = sB;
  $('score-red').textContent = sR;

  if(myRole==='red'){
    bP.x = s.bx||bP.x; bP.y = s.by||bP.y;
  } else {
    rP.x = s.rx||rP.x; rP.y = s.ry||rP.y;
  }
}

// ── Start Game (only blue/host) ─────────────────────────
$('start-btn').addEventListener('click',()=>{
  if(myRole!=='blue') return;
  sB=0; sR=0; gFlash=0; gWin='';
  bP={x:W/2,y:H*.18,tx:W/2,ty:H*.18,px:W/2,py:H*.18};
  rP={x:W/2,y:H*.82,tx:W/2,ty:H*.82,px:W/2,py:H*.82};
  resetPuck(1);
  pushState(true);
  beginLocal();
});

function beginLocal(){
  gameActive=true;
  $('overlay').style.display='none';
  if(animId) cancelAnimationFrame(animId);
  loop();
}

// ── Push full state (host only) ─────────────────────────
function pushState(on){
  set(rr('state'),{
    on,
    px:+puck.x.toFixed(1), py:+puck.y.toFixed(1),
    pvx:+puck.vx.toFixed(3), pvy:+puck.vy.toFixed(3),
    bx:+bP.x.toFixed(1), by:+bP.y.toFixed(1),
    rx:+rP.x.toFixed(1), ry:+rP.y.toFixed(1),
    sb:sB, sr:sR, gf:gFlash, gw:gWin
  }).catch(()=>{});
}

// ── Input ───────────────────────────────────────────────
function touch(x,y){
  if(!gameActive || myRole==='spectator') return;
  if(myRole==='blue'){
    bP.tx=x; bP.ty=cl(y, BD+PR, H/2-PR);
  } else {
    rP.tx=x; rP.ty=cl(y, H/2+PR, H-BD-PR);
  }
}
canvas.addEventListener('touchmove',e=>{e.preventDefault(); const r=canvas.getBoundingClientRect(); touch(e.touches[0].clientX-r.left, e.touches[0].clientY-r.top);}, {passive:false});
canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect(); touch(e.clientX-r.left, e.clientY-r.top);});

// ── Physics & Game Loop (same as before, host=blue) ─────
function movePad(p,top){
  p.px=p.x; p.py=p.y;
  p.x+=(p.tx-p.x)*PS; p.y+=(p.ty-p.y)*PS;
  p.x=cl(p.x,BD+PR,W-BD-PR);
  p.y=top?cl(p.y,BD+PR,H/2-PR):cl(p.y,H/2+PR,H-BD-PR);
}

function collide(pad){
  const d=dst(puck,pad),mn=PUCK+PR;
  if(d<mn && d>0){
    const nx=(puck.x-pad.x)/d, ny=(puck.y-pad.y)/d;
    puck.x += nx*(mn-d); puck.y += ny*(mn-d);
    const pvx=(pad.x-pad.px)*8, pvy=(pad.y-pad.py)*8;
    const rv = (puck.vx-pvx)*nx + (puck.vy-pvy)*ny;
    if(rv<0){
      puck.vx -= 1.8*rv*nx; puck.vy -= 1.8*rv*ny;
    }
    puck.vx += pvx*.4; puck.vy += pvy*.4;
    const spd = Math.hypot(puck.vx,puck.vy);
    if(spd>MSPD){
      puck.vx = puck.vx/spd*MSPD;
      puck.vy = puck.vy/spd*MSPD;
    }
  }
}

function physics(){
  movePad(bP,true); movePad(rP,false);
  puck.vx*=FR; puck.vy*=FR;
  puck.x+=puck.vx; puck.y+=puck.vy;

  // Wall bounce
  if(puck.x-PUCK<BD){puck.x=BD+PUCK; puck.vx=Math.abs(puck.vx)*.92;}
  if(puck.x+PUCK>W-BD){puck.x=W-BD-PUCK; puck.vx=-Math.abs(puck.vx)*.92;}

  const gL=(W-GW)/2, gR=(W+GW)/2, inX = puck.x>gL && puck.x<gR;

  if(puck.y-PUCK<BD){
    if(inX){ sR++; gFlash=60; gWin='RED'; $('score-red').textContent=sR;
      if(sR>=7){endGame('red'); return;}
      resetPuck(-1); return;
    }
    puck.y=BD+PUCK; puck.vy=Math.abs(puck.vy)*.92;
  }
  if(puck.y+PUCK>H-BD){
    if(inX){ sB++; gFlash=60; gWin='BLUE'; $('score-blue').textContent=sB;
      if(sB>=7){endGame('blue'); return;}
      resetPuck(1); return;
    }
    puck.y=H-BD-PUCK; puck.vy=-Math.abs(puck.vy)*.92;
  }

  collide(bP); collide(rP);
  if(gFlash>0) gFlash--;
}

function draw(){ /* unchanged - keep your original draw() function */ 
  // ... (copy your existing draw() here - it's long, no changes needed)
}

function drawPad(p,c1,c2){ /* unchanged */ }

// ── Game loop ───────────────────────────────────────────
function loop(){
  if(!gameActive) return;
  if(myRole==='blue'){
    physics();
    const now=Date.now();
    if(now-_lastPush>50){ _lastPush=now; pushState(true); }
  } else if(myRole==='red'){
    _pushTick++;
    if(_pushTick%3===0){
      update(rr('state'),{rx:+rP.x.toFixed(1),ry:+rP.y.toFixed(1)}).catch(()=>{});
    }
  }
  draw();
  animId=requestAnimationFrame(loop);
}

// ── End game ────────────────────────────────────────────
function endGame(winRole){
  gameActive=false;
  if(animId) cancelAnimationFrame(animId);
  const wn = winRole==='blue' ? pBlue.name : pRed.name;
  set(rr('state'),{on:false, w:winRole, sb:sB, sr:sR}).catch(()=>{});
  doEndOverlay(wn, sB, sR);
}

function doEndOverlay(wn,sb,sr){
  gameActive=false;
  if(animId) cancelAnimationFrame(animId);
  $('ov-title').textContent = (wn||'Player') + ' Wins!';
  \( ('ov-sub').textContent = ` \){sb} – ${sr}`;
  $('wait-pulse').style.display='none';
  $('start-btn').style.display = (myRole==='blue') ? 'flex' : 'none';
  $('start-btn').textContent='Play Again';
  $('overlay').style.display='flex';
}

// ── Boot ────────────────────────────────────────────────
draw();
join();
</script>
</body>
</html>
