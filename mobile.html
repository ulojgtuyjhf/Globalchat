<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nmedea</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap');
:root{
  --brand-gradient:linear-gradient(135deg,#0f0f0f 0%,#3a3a3a 40%,#626262 70%,#a6a6a6 100%);
  --red:#ff3b5c;
  --font:'Outfit',-apple-system,sans-serif;
  --nav-h:calc(64px + env(safe-area-inset-bottom,0px));
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{overflow:hidden;height:100%;}
body{font-family:var(--font);background:#000;-webkit-font-smoothing:antialiased;}

/* ── LOADING ── */
#loading-screen{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.4s;}
#loading-screen.hidden{opacity:0;pointer-events:none;}
.spinner{width:44px;height:44px;position:relative;display:flex;align-items:center;justify-content:center;}
.spinner::before,.spinner::after{content:'';position:absolute;width:13px;height:13px;border-radius:50%;animation:spinPulse 1s ease-in-out infinite;}
.spinner::before{background:#fff;}.spinner::after{background:#666;animation-delay:0.5s;}
@keyframes spinPulse{0%,100%{transform:scale(1) translateY(0);opacity:1;}50%{transform:scale(1.6) translateY(-14px);opacity:0.5;}}

/* ── TOP TABS ── */
#mob-feed-tabs{position:fixed;top:env(safe-area-inset-top,0px);left:0;right:0;z-index:60;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:10px 8px 0;background:linear-gradient(to bottom,rgba(0,0,0,0.28) 0%,transparent 100%);transition:opacity 0.3s ease;}
#mob-feed-tabs-center{flex:1;display:flex;justify-content:center;align-items:center;pointer-events:auto;}
.mob-feed-tab{font-size:15px;font-weight:700;color:rgba(255,255,255,0.5);background:none;border:none;cursor:pointer;font-family:var(--font);padding:4px 14px 8px;position:relative;transition:color 0.18s;letter-spacing:-0.01em;-webkit-tap-highlight-color:transparent;text-shadow:0 1px 8px rgba(0,0,0,0.8);pointer-events:auto;}
.mob-feed-tab.active{color:#fff;font-weight:900;}
.mob-feed-tab::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);height:2.5px;width:0;background:linear-gradient(90deg,#0f0f0f 0%,#626262 50%,#a6a6a6 100%);border-radius:2px;transition:width 0.22s cubic-bezier(0.22,1,0.36,1);}
.mob-feed-tab.active::after{width:80%;}

/* ── GALLERY ── */
#gallery{position:fixed;top:0;left:0;right:0;bottom:0;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;overscroll-behavior-y:contain;touch-action:pan-y;}
#gallery::-webkit-scrollbar{display:none;}

/* ── SLIDE ── */
.ac-slide{position:relative;width:100%;height:100dvh;scroll-snap-align:start;scroll-snap-stop:always;background:#000;overflow:hidden;touch-action:pan-y;-webkit-tap-highlight-color:transparent;padding-bottom:var(--nav-h);box-sizing:border-box;}

/* ── PREVIEW CARD ── */
.ac-card{position:absolute;inset:0;bottom:var(--nav-h);}
.ac-preview-iframe{width:100%;height:100%;border:none;display:block;pointer-events:none;filter:blur(14px) brightness(0.5);transform:scale(1.08);}

/* ── PLAY PROMPT ── */
.ac-play-prompt{position:absolute;inset:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:5;pointer-events:auto;opacity:0;transition:opacity 0.6s ease;cursor:pointer;}
.ac-play-prompt.visible{opacity:1;}
.ac-play-circle{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,0.14);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:2px solid rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;margin-bottom:14px;box-shadow:0 8px 32px rgba(0,0,0,0.5);animation:pulseRing 2s ease-in-out infinite;}
@keyframes pulseRing{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,0.22),0 8px 32px rgba(0,0,0,0.5);}50%{box-shadow:0 0 0 16px rgba(255,255,255,0),0 8px 32px rgba(0,0,0,0.5);}}
.ac-play-circle svg{width:30px;height:30px;fill:#fff;margin-left:4px;}
.ac-play-label{font-size:13px;font-weight:800;color:rgba(255,255,255,0.95);letter-spacing:0.08em;text-transform:uppercase;text-shadow:0 2px 10px rgba(0,0,0,0.9);}
.ac-play-sub{font-size:11px;font-weight:600;color:rgba(255,255,255,0.5);margin-top:4px;letter-spacing:0.02em;text-shadow:0 1px 6px rgba(0,0,0,0.9);}

/* ── GRADIENT OVERLAY ── */
.ac-slide::after{content:'';position:absolute;left:0;right:0;bottom:var(--nav-h);top:0;pointer-events:none;z-index:2;background:linear-gradient(to bottom,transparent 30%,rgba(0,0,0,0.1) 55%,rgba(0,0,0,0.65) 80%,rgba(0,0,0,0.9) 100%);}

/* ── UI HIDDEN ── */
.ac-slide .slide-actions,.ac-slide .video-caption,.ac-slide .live-watch-left,.ac-slide .live-viewer-badge{transition:opacity 0.35s ease;}
.ac-slide.ui-hidden .slide-actions,.ac-slide.ui-hidden .video-caption,.ac-slide.ui-hidden .live-watch-left,.ac-slide.ui-hidden .live-viewer-badge{opacity:0!important;pointer-events:none!important;}

/* ── TOP-LEFT ── */
.live-watch-left{position:absolute;top:16px;left:14px;display:flex;align-items:center;gap:5px;z-index:8;pointer-events:none;}
.live-dot{width:6px;height:6px;border-radius:50%;background:#fe2c55;box-shadow:0 0 6px rgba(254,44,85,0.85);animation:livePulse 1.4s ease-in-out infinite;flex-shrink:0;}
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.65);}}
.live-watch-label{font-size:11px;font-weight:600;color:rgba(255,255,255,0.8);font-family:var(--font);}

/* ── TOP-RIGHT ── */
.live-viewer-badge{position:absolute;top:10px;right:14px;display:flex;align-items:center;z-index:8;pointer-events:none;}
.live-vav-stack{display:flex;align-items:center;}
.live-vav{width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,0.85);background:#555;font-size:11px;font-weight:900;color:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;margin-left:-8px;position:relative;box-shadow:0 2px 8px rgba(0,0,0,0.4);}
.live-vav:first-child{margin-left:0;}.live-vav img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;}
.live-vav-logo{width:28px;height:28px;border-radius:50%;background:#000;border:2px solid rgba(255,255,255,0.5);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff;font-family:var(--font);}

/* ── CAPTION ── */
.video-caption{position:absolute;bottom:calc(var(--nav-h) + 10px);left:16px;right:70px;z-index:6;pointer-events:none;}
.video-creator-av-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;pointer-events:auto;}
.video-creator-av-img{width:32px;height:32px;border-radius:50%;border:2px solid transparent;background:linear-gradient(#1a1a1a,#1a1a1a) padding-box,linear-gradient(135deg,#0f0f0f 0%,#626262 50%,#a6a6a6 100%) border-box;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.5);cursor:pointer;}
.video-creator-av-img img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;}
.video-creator-meta{display:flex;flex-direction:column;gap:1px;min-width:0;flex:1;}
.video-creator-name{font-size:15px;font-weight:900;letter-spacing:-0.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:linear-gradient(90deg,#fff 0%,#a6a6a6 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 2px 12px rgba(0,0,0,0.95));}
.video-creator-handle{font-size:11px;color:rgba(255,255,255,0.55);font-weight:600;}
.video-creator-date{font-size:10px;font-weight:700;color:rgba(255,255,255,0.6);white-space:nowrap;text-shadow:0 1px 6px rgba(0,0,0,0.9);}
.video-follow-btn{flex-shrink:0;font-size:9px;font-weight:800;padding:3px 10px 3px 7px;border-radius:99px;border:1px solid rgba(255,255,255,0.12);background:linear-gradient(135deg,#0f0f0f 0%,#3a3a3a 50%,#626262 100%);color:#fff;cursor:pointer;font-family:var(--font);pointer-events:auto;-webkit-tap-highlight-color:transparent;white-space:nowrap;letter-spacing:0.06em;text-transform:uppercase;display:flex;align-items:center;gap:4px;box-shadow:0 2px 12px rgba(0,0,0,0.55);}
.video-follow-btn:active{transform:scale(0.88);}.video-follow-btn.following{opacity:0.6;}
.video-caption-text{font-size:13px;font-weight:500;color:rgba(255,255,255,0.88);text-shadow:0 1px 8px rgba(0,0,0,0.9);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:8px;}

/* ── ACTIONS ── */
.slide-actions{position:absolute;right:8px;bottom:calc(var(--nav-h) + 10px);z-index:10;display:flex;flex-direction:column;align-items:center;gap:14px;}
.slide-action-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;-webkit-tap-highlight-color:transparent;padding:0;transition:transform 0.18s cubic-bezier(0.34,1.56,0.64,1);}
.slide-action-btn:active{transform:scale(0.82);}
.slide-action-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;}
.slide-action-icon svg{width:22px;height:22px;fill:none;stroke:rgba(255,255,255,0.95);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 1px 4px rgba(0,0,0,0.7));}
.slide-action-label{font-size:11px;font-weight:800;color:rgba(255,255,255,0.92);text-shadow:0 1px 6px rgba(0,0,0,0.9);}
.slide-action-btn[data-act="superlike"] .slide-action-icon{width:60px;height:60px;}
.slide-action-btn[data-act="superlike"] .slide-action-icon svg{width:46px!important;height:40px!important;}
.cmt-live-dot{position:absolute;top:2px;right:2px;width:9px;height:9px;border-radius:50%;background:#22c55e;box-shadow:0 0 7px rgba(34,197,94,0.95);border:1.5px solid rgba(0,0,0,0.4);animation:cmtDotPulse 1.6s ease-in-out infinite;pointer-events:none;}
@keyframes cmtDotPulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.55;transform:scale(0.72);}}
.slide-disc-wrap{width:44px;height:44px;display:flex;align-items:center;justify-content:center;}
.slide-disc{width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#3a3a3a 0%,#0f0f0f 70%);border:2px solid rgba(255,255,255,0.18);animation:discSpin 4s linear infinite;}
@keyframes discSpin{to{transform:rotate(360deg);}}
.slide-action-btn.liked .slide-action-icon svg{stroke:#ff3b5c;fill:#ff3b5c;}

/* ── EXPLOSION ── */
.particle{position:fixed;pointer-events:none;z-index:9997;border-radius:50%;animation:particleFly 0.75s ease-out forwards;}
@keyframes particleFly{0%{transform:translate(0,0) scale(1);opacity:1;}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0;}}
.float-heart{position:fixed;pointer-events:none;z-index:9996;font-size:52px;animation:floatUp 0.9s ease-out forwards;}
@keyframes floatUp{0%{transform:scale(0) rotate(var(--rot));opacity:1;}20%{transform:scale(1.3) rotate(var(--rot));}100%{transform:scale(0.9) translateY(-120px) rotate(var(--rot));opacity:0;}}

/* ── FULLSCREEN GAME VIEWER ── */
#game-viewer{display:none;position:fixed;inset:0;z-index:500;background:#000;flex-direction:column;}
#game-viewer.open{display:flex;animation:viewerUp 0.38s cubic-bezier(0.16,1,0.3,1);}
@keyframes viewerUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
#gv-topbar{display:flex;align-items:center;gap:12px;padding:calc(env(safe-area-inset-top,0px) + 12px) 16px 12px;background:rgba(0,0,0,0.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0;}
#gv-back{width:36px;height:36px;border-radius:10px;background:var(--brand-gradient);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;box-shadow:0 3px 12px rgba(0,0,0,0.4);flex-shrink:0;transition:transform 0.15s,opacity 0.15s;}
#gv-back:active{transform:scale(0.88);opacity:0.8;}
#gv-back svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2.8;stroke-linecap:round;stroke-linejoin:round;}
#gv-title{font-size:16px;font-weight:900;color:#fff;font-family:var(--font);letter-spacing:-0.02em;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#gv-iframe-wrap{flex:1;position:relative;overflow:hidden;}
#gv-iframe{width:100%;height:100%;border:none;display:block;background:#0a0a0a;touch-action:none;overscroll-behavior:none;}

/* ── NAV ── */
#bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);padding-bottom:env(safe-area-inset-bottom,0px);background:rgba(255,255,255,0.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1.5px solid rgba(0,0,0,0.07);box-shadow:0 -4px 24px rgba(0,0,0,0.06);display:flex;align-items:center;justify-content:space-around;z-index:300;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:none;border:none;cursor:pointer;color:rgba(0,0,0,0.3);font-family:var(--font);font-size:9px;font-weight:700;letter-spacing:0.03em;text-transform:uppercase;padding:8px 0;-webkit-tap-highlight-color:transparent;transition:color 0.18s;}
.nav-btn.active{color:#111;}
.nav-icon-wrap{width:40px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:12px;position:relative;}
.nav-btn.active .nav-icon-wrap::after{content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);width:20px;height:3px;border-radius:2px;background:var(--brand-gradient);}
.nav-icon-wrap svg{width:23px;height:23px;stroke:rgba(0,0,0,0.28);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.nav-btn.active .nav-icon-wrap svg{stroke:#111;}
.nav-badge{position:absolute;top:-2px;right:-2px;width:8px;height:8px;border-radius:50%;background:var(--red);border:2px solid #fff;display:none;}
.nav-badge.show{display:block;}
.nav-upload-wrap{flex:1;display:flex;align-items:center;justify-content:center;}
.nav-upload-pill{width:64px;height:40px;border-radius:20px;background:var(--brand-gradient);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transform:translateY(-4px);box-shadow:0 4px 18px rgba(0,0,0,0.28);-webkit-tap-highlight-color:transparent;}
.nav-upload-pill svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2.8;stroke-linecap:round;}

/* ── EXPLORE ── */
#explore-section{display:none;position:fixed;inset:0;bottom:var(--nav-h);background:#fafafa;z-index:200;flex-direction:column;overflow:hidden;}
#explore-section.active{display:flex;}
#explore-header{padding:calc(env(safe-area-inset-top,0px) + 16px) 16px 0;background:#fff;border-bottom:1px solid #f0f0f0;flex-shrink:0;}
#explore-header-title{font-size:22px;font-weight:900;color:#111;font-family:var(--font);letter-spacing:-0.03em;display:block;margin-bottom:12px;}
#explore-search-wrap{position:relative;margin-bottom:12px;}
#explore-search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:#bbb;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none;}
#explore-search-input{width:100%;padding:10px 12px 10px 36px;border-radius:12px;border:1.5px solid #efefef;background:#f7f7f5;font-family:var(--font);font-size:14px;color:#111;outline:none;-webkit-appearance:none;}
#explore-search-input:focus{border-color:#bbb;background:#fff;}
#explore-tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:0 0 12px;}
#explore-tabs::-webkit-scrollbar{display:none;}
.exp-tab{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;font-family:var(--font);cursor:pointer;border:1.5px solid #e8e8e8;background:#f8f8f8;color:#777;-webkit-tap-highlight-color:transparent;transition:all 0.18s;}
.exp-tab.active{background:#111;color:#fff;border-color:#111;}
#explore-grid{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 6px calc(env(safe-area-inset-bottom,0px) + 16px);column-count:2;column-gap:6px;scrollbar-width:none;}
#explore-grid::-webkit-scrollbar{display:none;}
.exp-card{break-inside:avoid;margin-bottom:6px;border-radius:14px;overflow:hidden;background:#fff;cursor:pointer;position:relative;box-shadow:0 1px 6px rgba(0,0,0,0.08);-webkit-tap-highlight-color:transparent;transition:transform 0.18s;}
.exp-card:active{transform:scale(0.97);}
.exp-thumb{width:100%;aspect-ratio:3/4;background:linear-gradient(135deg,#e8e8e8,#d0d0d0);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.exp-thumb-ph{font-size:32px;font-weight:900;color:#c0c0c0;font-family:var(--font);}
.exp-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.exp-thumb-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.7) 0%,transparent 55%);}
.exp-info{position:absolute;bottom:0;left:0;right:0;padding:10px 8px 8px;}
.exp-title{font-size:12px;font-weight:800;color:#fff;font-family:var(--font);letter-spacing:-0.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.exp-handle{font-size:10px;color:rgba(255,255,255,0.7);font-family:var(--font);font-weight:600;}
.exp-plays{position:absolute;top:7px;right:7px;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);color:#fff;font-size:9px;font-weight:700;font-family:var(--font);padding:2px 6px;border-radius:6px;}
#explore-empty{display:none;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;gap:10px;}
#explore-empty.show{display:flex;}
#explore-empty span{font-size:14px;font-weight:700;color:#bbb;font-family:var(--font);}

/* ── EXPLORE GAME VIEWER ── */
#explore-game-viewer{display:none;position:fixed;inset:0;bottom:var(--nav-h);background:#f5f5f3;z-index:250;flex-direction:column;overflow:hidden;}
#explore-game-viewer.open{display:flex;}
#egv-topbar{display:flex;align-items:center;gap:12px;padding:calc(env(safe-area-inset-top,0px) + 12px) 16px 12px;background:#fff;border-bottom:1px solid #efefef;flex-shrink:0;}
#egv-back{width:36px;height:36px;border-radius:10px;background:var(--brand-gradient);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:transform 0.15s,opacity 0.15s;box-shadow:0 3px 12px rgba(0,0,0,0.18);flex-shrink:0;}
#egv-back:active{transform:scale(0.88);opacity:0.8;}
#egv-back svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2.8;stroke-linecap:round;stroke-linejoin:round;}
#egv-title{font-size:16px;font-weight:900;color:#111;font-family:var(--font);letter-spacing:-0.02em;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#egv-body{flex:1;display:flex;flex-direction:column;align-items:center;padding:14px 16px 8px;overflow:hidden;}
#egv-card{width:100%;max-width:380px;flex:1;min-height:0;border-radius:22px;overflow:hidden;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,0.10),0 8px 32px rgba(0,0,0,0.08),0 0 0 1px rgba(0,0,0,0.04);position:relative;touch-action:none;}
#egv-iframe{width:100%;height:100%;border:none;display:block;background:#f7f7f5;touch-action:none;overscroll-behavior:none;}
#egv-meta{width:100%;max-width:380px;margin-top:10px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0;}
.ac-av{width:30px;height:30px;border-radius:50%;background:#ddd;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;overflow:hidden;flex-shrink:0;border:1.5px solid #e8e8e8;}
.ac-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.ac-title{font-size:14px;font-weight:900;color:#111;font-family:var(--font);letter-spacing:-0.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ac-handle{font-size:11px;color:#888;font-family:var(--font);font-weight:600;white-space:nowrap;}
.ac-follow-btn{flex-shrink:0;padding:6px 14px;border-radius:10px;border:none;background:var(--brand-gradient);color:#fff;font-family:var(--font);font-size:11px;font-weight:800;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity 0.15s,transform 0.15s;white-space:nowrap;}
.ac-follow-btn:active{transform:scale(0.92);opacity:0.8;}
.ac-follow-btn.following{background:#f2f2f2;color:#888;border:1.5px solid #e8e8e8;}

/* ── GUEST AUTH ── */

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import{getFirestore,collection,query,orderBy,limit,getDocs,serverTimestamp,updateDoc,doc,increment,setDoc,deleteDoc,getDoc}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import{getDatabase,ref,onValue,set,onDisconnect}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const cfg={apiKey:"AIzaSyDnPz8BWCaXJOazlFVO4Eap8VxdSR2oDFQ",authDomain:"globalchat-2d669.firebaseapp.com",projectId:"globalchat-2d669",messagingSenderId:"178714711978",appId:"1:178714711978:web:fb831188be23e62a4bbdd3",databaseURL:"https://globalchat-2d669-default-rtdb.firebaseio.com/"};
const app=initializeApp(cfg),auth=getAuth(app),db=getFirestore(app),rtdb=getDatabase(app);
window._fbDb=db; window._currentUser=null;

const $=id=>document.getElementById(id);
const fmt=n=>n>=1000?(n/1000).toFixed(1).replace(/\.0$/,'')+'K':String(n||0);
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
window._goLogin=m=>location.href='login.html?mode='+(m||'login');
window._showAuthPrompt=()=>$('guest-auth-prompt').classList.add('open');

// ── NAV ──────────────────────────────────────────────
function setNav(tab){
  ['navHome','navExplore','navLiked','navProfile'].forEach(id=>{const b=$(id);if(b)b.classList.remove('active');});
  $('explore-section').classList.remove('active');
  if(tab==='home')$('navHome').classList.add('active');
  else if(tab==='explore'){$('navExplore').classList.add('active');$('explore-section').classList.add('active');loadExplore();}
  else if(tab==='updates')$('navLiked').classList.add('active');
  else if(tab==='profile')$('navProfile').classList.add('active');
}
$('navHome').addEventListener('click',()=>setNav('home'));
$('navExplore').addEventListener('click',()=>setNav('explore'));
$('navLiked').addEventListener('click',()=>setNav('updates'));
$('navProfile').addEventListener('click',()=>setNav('profile'));
$('navUpload').addEventListener('click',()=>{if(!window._currentUser)window._showAuthPrompt();});
document.querySelectorAll('.mob-feed-tab').forEach(t=>{t.addEventListener('click',()=>{document.querySelectorAll('.mob-feed-tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');});});

// ── FULLSCREEN VIEWER ────────────────────────────────
function openGameFullscreen(gid,data){
  $('gv-title').textContent=data.title||'Game';
  $('gv-iframe').srcdoc='';
  $('game-viewer').classList.add('open');
  setTimeout(()=>{
    $('gv-iframe').srcdoc=data.code||'';
    try{updateDoc(doc(db,'arcade_games',gid),{plays:increment(1)}).catch(()=>{});}catch(x){}
  },80);
}
$('gv-back').addEventListener('click',()=>{
  $('game-viewer').classList.remove('open');
  setTimeout(()=>{$('gv-iframe').srcdoc='';},400);
});

// ── EXPLOSION ────────────────────────────────────────
const _PC=['#ff3b5c','#ff6b35','#ffd700','#ff69b4','#c084fc','#60a5fa','#34d399','#fff'];
function spawnExplosion(x,y,count=18){
  for(let i=0;i<count;i++){
    const p=document.createElement('div');p.className='particle';
    const size=4+Math.random()*8,angle=Math.random()*Math.PI*2,dist=40+Math.random()*90;
    p.style.cssText=`left:${x}px;top:${y}px;width:${size}px;height:${size}px;background:${_PC[Math.floor(Math.random()*_PC.length)]};--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist-30}px;animation-delay:${Math.random()*0.12}s;`;
    document.body.appendChild(p);p.addEventListener('animationend',()=>p.remove());
  }
}
function spawnFloatHeart(x,y){
  const h=document.createElement('div');h.className='float-heart';
  h.style.cssText=`left:${x-26}px;top:${y-26}px;--rot:${(Math.random()-0.5)*30}deg;`;
  h.textContent='❤️';document.body.appendChild(h);h.addEventListener('animationend',()=>h.remove());
}

// ── PRESENCE ─────────────────────────────────────────
function buildViewers(wl,vb,viewers){
  const c=viewers.length;
  wl.innerHTML='<div class="live-dot"></div><span class="live-watch-label">'+(c>999?(c/1000).toFixed(1)+'K':c)+' playing</span>';
  if(c===0){vb.innerHTML='<div class="live-vav-logo">N</div>';return;}
  const sh=viewers.slice(0,3);const ex=c-sh.length;let s='<div class="live-vav-stack">';
  sh.forEach((v,i)=>{const l=((v.name||'?')[0]).toUpperCase();const h=(l.charCodeAt(0)*37)%360;s+=v.photo?'<div class="live-vav" style="z-index:'+(3-i)+'"><img src="'+v.photo+'" onerror="this.style.display=\'none\'"></div>':'<div class="live-vav" style="background:hsl('+h+',55%,42%);z-index:'+(3-i)+'">'+l+'</div>';});
  if(ex>0)s+='<div class="live-vav" style="background:rgba(0,0,0,0.6);border:2px solid rgba(255,255,255,0.7);font-size:9px;font-weight:900;">+'+ex+'</div>';
  s+='</div>';vb.innerHTML=s;
}
let _pId=null;
function trackPresence(gid){
  if(!window._currentUser||!gid)return;
  if(_pId&&_pId!==gid)try{set(ref(rtdb,'viewers/'+_pId+'/'+window._currentUser.uid),null);}catch(e){}
  _pId=gid;
  const r=ref(rtdb,'viewers/'+gid+'/'+window._currentUser.uid);
  set(r,{uid:window._currentUser.uid,t:Date.now(),name:window._currentUser.displayName||'player',photo:window._currentUser.photoURL||''});
  onDisconnect(r).remove();
}
const followedUsers=new Set();
async function toggleFollow(uid){
  if(!window._currentUser||!uid)return;
  const fId=window._currentUser.uid+'_'+uid,fRef=doc(db,'follows',fId);
  if(followedUsers.has(uid)){followedUsers.delete(uid);try{await deleteDoc(fRef);}catch(e){}}
  else{followedUsers.add(uid);try{await setDoc(fRef,{followerId:window._currentUser.uid,followingId:uid,createdAt:serverTimestamp()});}catch(e){}}
}
function fmtLeft(ms){if(ms<=0)return'Expiring…';const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000);return h>=1?h+'h':m+'m';}

// ── BUILD SLIDE ──────────────────────────────────────
function buildSlide(gid,data){
  const slide=document.createElement('div');slide.className='ac-slide';

  // Blurry preview iframe — NO thumbnail
  const card=document.createElement('div');card.className='ac-card';
  const iframe=document.createElement('iframe');iframe.className='ac-preview-iframe';
  iframe.sandbox='allow-scripts';iframe.title=data.title||'Game';
  card.appendChild(iframe);slide.appendChild(card);

  // Play prompt — fades in after 3s
  const prompt=document.createElement('div');prompt.className='ac-play-prompt';
  prompt.innerHTML=`<div class="ac-play-circle"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div><div class="ac-play-label">Tap to Play</div><div class="ac-play-sub">${esc(data.title||'Untitled')}</div>`;
  prompt.addEventListener('click',e=>{e.stopPropagation();openGameFullscreen(gid,data);});
  slide.appendChild(prompt);

  // IntersectionObserver: load preview + 3s timer
  let previewLoaded=false,promptTimer=null;
  new IntersectionObserver(entries=>{
    if(entries[0].isIntersecting){
      if(!previewLoaded&&data.code){previewLoaded=true;iframe.srcdoc=data.code;trackPresence(gid);}
      promptTimer=setTimeout(()=>prompt.classList.add('visible'),3000);
    } else {
      clearTimeout(promptTimer);prompt.classList.remove('visible');
      iframe.srcdoc='';previewLoaded=false;
    }
  },{threshold:0.5}).observe(slide);

  // TOP-LEFT
  const wl=document.createElement('div');wl.className='live-watch-left';
  wl.innerHTML='<div class="live-dot"></div><span class="live-watch-label">0 playing</span>';
  slide.appendChild(wl);

  // TOP-RIGHT
  const vb=document.createElement('div');vb.className='live-viewer-badge';
  vb.innerHTML='<div class="live-vav-logo">N</div>';
  slide.appendChild(vb);
  try{onValue(ref(rtdb,'viewers/'+gid),snap=>{const v=[];if(snap.exists())snap.forEach(c=>v.push(c.val()));buildViewers(wl,vb,v);});}catch(e){}

  // CAPTION
  const caption=document.createElement('div');caption.className='video-caption';
  const nm=data.userDisplay||'developer',lt=(nm[0]||'D').toUpperCase(),hue=(lt.charCodeAt(0)*37)%360,hasPh=data.userPhoto&&!data.userPhoto.includes('default_profile');
  const crow=document.createElement('div');crow.className='video-creator-av-row';
  const cavEl=document.createElement('div');cavEl.className='video-creator-av-img';cavEl.style.background='hsl('+hue+',50%,38%)';
  if(hasPh){const ai=document.createElement('img');ai.src=data.userPhoto;ai.style.cssText='width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;';cavEl.appendChild(ai);}else cavEl.textContent=lt;
  const metaEl=document.createElement('div');metaEl.className='video-creator-meta';
  const nameEl=document.createElement('span');nameEl.className='video-creator-name';nameEl.textContent=nm;
  const subLine=document.createElement('div');subLine.style.cssText='display:flex;align-items:center;gap:4px;';
  const handleEl=document.createElement('span');handleEl.className='video-creator-handle';handleEl.textContent='@'+nm;
  const dateEl=document.createElement('span');dateEl.className='video-creator-date';
  let uploadMs=null;const ts=data.createdAt;
  if(ts){if(typeof ts.seconds==='number')uploadMs=ts.seconds*1000;else if(typeof ts.toDate==='function')try{uploadMs=ts.toDate().getTime();}catch(e){}}
  if(uploadMs){const expMs=uploadMs+86400000;dateEl.textContent='· '+fmtLeft(expMs-Date.now());if(!window._expiryTickers)window._expiryTickers=[];window._expiryTickers.push({el:dateEl,expireMs:expMs});if(!window._expiryTickerInterval)window._expiryTickerInterval=setInterval(()=>{const now=Date.now();window._expiryTickers=window._expiryTickers.filter(t=>{if(!t.el.isConnected)return false;t.el.textContent='· '+fmtLeft(t.expireMs-now);return t.expireMs-now>0;});},60000);}
  else dateEl.textContent='· 24h';
  subLine.appendChild(handleEl);subLine.appendChild(dateEl);metaEl.appendChild(nameEl);metaEl.appendChild(subLine);
  const fBtn=document.createElement('button');fBtn.className='video-follow-btn';
  const _setFBtn=f=>{fBtn.innerHTML=f?'<svg width="9" height="9" viewBox="0 0 12 12" fill="none"><polyline points="1,6 4.5,10 11,2" stroke="rgba(255,255,255,0.5)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>Following':'<svg width="9" height="9" viewBox="0 0 12 12" fill="none"><line x1="6" y1="1" x2="6" y2="11" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/><line x1="1" y1="6" x2="11" y2="6" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/></svg>Follow';fBtn.classList.toggle('following',f);};
  _setFBtn(followedUsers.has(data.userId));
  if(window._currentUser&&data.userId===window._currentUser.uid)fBtn.style.display='none';
  fBtn.addEventListener('click',async e=>{e.stopPropagation();if(!window._currentUser){window._showAuthPrompt();return;}await toggleFollow(data.userId);_setFBtn(followedUsers.has(data.userId));});
  crow.appendChild(cavEl);crow.appendChild(metaEl);crow.appendChild(fBtn);caption.appendChild(crow);
  if(data.description&&data.description.trim()){const d=document.createElement('div');d.className='video-caption-text';d.textContent=data.description;caption.appendChild(d);}
  slide.appendChild(caption);

  // ACTIONS
  const actions=document.createElement('div');actions.className='slide-actions';

  const sBtn=document.createElement('button');sBtn.className='slide-action-btn';sBtn.dataset.act='superlike';
  sBtn.innerHTML='<div class="slide-action-icon"><svg viewBox="0 0 28 24" fill="none" stroke="rgba(255,255,255,0.95)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" width="46" height="40"><path d="M7 3.5a3.5 3.5 0 0 0-3.5 3.5c0 4 3.5 7 7 9.5C14 14 17.5 11 17.5 7a3.5 3.5 0 0 0-7 0 3.5 3.5 0 0 0-3.5-3.5z" opacity="0.5"/><path d="M13 5.5a3.5 3.5 0 0 0-3.5 3.5c0 4 3.5 7 7 9.5C20 16 23.5 13 23.5 9a3.5 3.5 0 0 0-7 0 3.5 3.5 0 0 0-3.5-3.5z"/><circle cx="25" cy="3" r="1" fill="rgba(255,255,255,0.8)" stroke="none"/><circle cx="27" cy="7" r="0.7" fill="rgba(255,255,255,0.6)" stroke="none"/><circle cx="23" cy="1" r="0.7" fill="rgba(255,255,255,0.6)" stroke="none"/></svg></div><span class="slide-action-label">'+fmt(data.superlikes||0)+'</span>';
  actions.appendChild(sBtn);

  let _liked=false,_likesN=data.likes||0;
  const lBtn=document.createElement('button');lBtn.className='slide-action-btn';
  const lLabel=document.createElement('span');lLabel.className='slide-action-label';lLabel.textContent=fmt(_likesN);
  lBtn.innerHTML='<div class="slide-action-icon"><svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.95)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div>';
  lBtn.appendChild(lLabel);
  lBtn.addEventListener('click',e=>{
    e.stopPropagation();if(!window._currentUser){window._showAuthPrompt();return;}
    _liked=!_liked;lBtn.classList.toggle('liked',_liked);
    _likesN=Math.max(0,_likesN+(_liked?1:-1));lLabel.textContent=fmt(_likesN);
    if(_liked){const r=lBtn.getBoundingClientRect();spawnExplosion(r.left+r.width/2,r.top+r.height/2,20);spawnFloatHeart(r.left+r.width/2,r.top+r.height/2);}
    try{updateDoc(doc(db,'arcade_games',gid),{likes:increment(_liked?1:-1)}).catch(()=>{});}catch(x){}
  });
  actions.appendChild(lBtn);

  const cBtn=document.createElement('button');cBtn.className='slide-action-btn';
  cBtn.innerHTML='<div class="slide-action-icon" style="position:relative;"><svg viewBox="0 0 122.97 122.88" xmlns="http://www.w3.org/2000/svg" width="26" height="26"><path d="M61.44,0a61.46,61.46,0,0,1,54.91,89l6.44,25.74a5.83,5.83,0,0,1-7.25,7L91.62,115A61.43,61.43,0,1,1,61.44,0ZM96.63,26.25a49.78,49.78,0,1,0-9,77.52A5.83,5.83,0,0,1,92.4,103L109,107.77l-4.5-18a5.86,5.86,0,0,1,.51-4.34,49.06,49.06,0,0,0,4.62-11.58,50,50,0,0,0-13-47.62Z" fill="#ffffff" stroke="rgba(255,255,255,0.3)" stroke-width="1"/></svg><span class="cmt-live-dot"></span></div><span class="slide-action-label">'+fmt(data.comments||0)+'</span>';
  cBtn.addEventListener('click',e=>{e.stopPropagation();if(!window._currentUser){window._showAuthPrompt();return;}});
  actions.appendChild(cBtn);

  const shBtn=document.createElement('button');shBtn.className='slide-action-btn';
  shBtn.innerHTML='<div class="slide-action-icon"><svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.95)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg></div><span class="slide-action-label">Share</span>';
  shBtn.addEventListener('click',e=>{e.stopPropagation();if(navigator.share)navigator.share({title:data.title||'Nmedea',url:location.href});});
  actions.appendChild(shBtn);

  const svBtn=document.createElement('button');svBtn.className='slide-action-btn';
  svBtn.innerHTML='<div class="slide-action-icon"><svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.95)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></div><span class="slide-action-label">Save</span>';
  actions.appendChild(svBtn);

  const disc=document.createElement('div');disc.className='slide-action-btn';disc.style.pointerEvents='none';
  disc.innerHTML='<div class="slide-disc-wrap"><div class="slide-disc"></div></div>';
  actions.appendChild(disc);
  slide.appendChild(actions);

  // DOUBLE-TAP → explosion + auto-like
  let _tc=0,_tt=null;
  function _isUI(e){return!!e.target.closest('.slide-actions,.video-caption,.live-watch-left,.live-viewer-badge,.video-follow-btn,.ac-play-prompt');}
  slide.addEventListener('touchend',e=>{
    if(_isUI(e))return;
    _tc++;clearTimeout(_tt);_tt=setTimeout(()=>{_tc=0;},280);
    if(_tc>=2){
      clearTimeout(_tt);_tc=0;
      const t=e.changedTouches[0];
      spawnExplosion(t.clientX,t.clientY,24);spawnFloatHeart(t.clientX,t.clientY);
      if(!_liked&&window._currentUser){_liked=true;lBtn.classList.add('liked');_likesN++;lLabel.textContent=fmt(_likesN);try{updateDoc(doc(db,'arcade_games',gid),{likes:increment(1)}).catch(()=>{});}catch(x){}}
      window._uiHidden=!window._uiHidden;slide.classList.toggle('ui-hidden',window._uiHidden);
    }
  },{passive:true});

  return slide;
}

// ── FEED ─────────────────────────────────────────────
async function fetchFeed(){
  const gallery=$('gallery'),loading=$('loading-screen');
  gallery.innerHTML='';
  try{
    const snap=await getDocs(query(collection(db,'arcade_games'),orderBy('createdAt','desc'),limit(40)));
    loading.classList.add('hidden');setTimeout(()=>loading.style.display='none',400);
    if(snap.empty){
      const e=document.createElement('div');e.className='ac-slide';
      e.style.cssText='display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;';
      e.innerHTML='<div style="font-size:38px;font-weight:900;color:#fff;letter-spacing:-0.04em;font-family:var(--font)">nmedea.</div><div style="font-size:14px;color:#666;font-family:var(--font)">No games yet.</div>';
      gallery.appendChild(e);return;
    }
    snap.forEach(d=>gallery.appendChild(buildSlide(d.id,d.data())));
  }catch(err){console.warn('Feed error',err);$('loading-screen').classList.add('hidden');}
}

// ── EXPLORE ───────────────────────────────────────────
let _exploreTab='recent',_exploreSearch='',_exploreDebounce=null;
const _followingSet=new Set();

function loadExplore(){
  const grid=$('explore-grid'),empty=$('explore-empty');
  grid.innerHTML='<div style="padding:30px;text-align:center;font-size:13px;color:#bbb;font-family:var(--font);">Loading...</div>';
  empty.classList.remove('show');
  async function run(){
    let qr;
    if(_exploreTab==='top')qr=query(collection(db,'arcade_games'),orderBy('plays','desc'),limit(40));
    else if(_exploreTab==='liked')qr=query(collection(db,'arcade_games'),orderBy('likes','desc'),limit(40));
    else qr=query(collection(db,'arcade_games'),orderBy('createdAt','desc'),limit(40));
    try{
      const snap=await getDocs(qr);grid.innerHTML='';let count=0;
      snap.forEach(d=>{
        const data=d.data(),search=_exploreSearch.toLowerCase().trim();
        if(search&&!(data.title||'').toLowerCase().includes(search)&&!(data.userDisplay||'').toLowerCase().includes(search))return;
        if(_exploreTab==='following'&&!_followingSet.has(data.userId))return;
        grid.appendChild(buildExpCard(d.id,data));count++;
      });
      if(count===0){grid.innerHTML='';empty.classList.add('show');}
    }catch(e){grid.innerHTML='<div style="padding:30px;text-align:center;font-size:13px;color:#d63031;font-family:var(--font);">Error loading.</div>';}
  }
  run();
}

function openGameInExplore(gameId,data){
  $('egv-title').textContent=data.title||'Game';
  $('egv-iframe').srcdoc='';$('egv-meta').innerHTML='';
  $('explore-game-viewer').classList.add('open');
  setTimeout(()=>{$('egv-iframe').srcdoc=data.code||'';try{updateDoc(doc(db,'arcade_games',gameId),{plays:increment(1)}).catch(()=>{});}catch(x){}},100);
  const name=data.userDisplay||'developer',letter=(name[0]||'D').toUpperCase(),hue=(letter.charCodeAt(0)*37)%360,hasPh=data.userPhoto&&!data.userPhoto.includes('default_profile');
  const ml=document.createElement('div');ml.style.cssText='display:flex;align-items:center;gap:8px;flex:1;min-width:0;';
  const av=document.createElement('div');av.className='ac-av';av.style.background=hasPh?'':'hsl('+hue+',50%,44%)';
  if(hasPh){const ai=document.createElement('img');ai.src=data.userPhoto;av.appendChild(ai);}else av.textContent=letter;
  const titles=document.createElement('div');titles.style.cssText='min-width:0;flex:1;';
  titles.innerHTML='<div class="ac-title">'+esc(data.title||'Untitled')+'</div><div class="ac-handle">@'+esc(name)+'</div>';
  ml.appendChild(av);ml.appendChild(titles);$('egv-meta').appendChild(ml);
  if(!window._currentUser||window._currentUser.uid!==data.userId){
    const fb=document.createElement('button');fb.className='ac-follow-btn';fb.textContent='Follow';let isF=false;
    if(window._currentUser&&data.userId){getDoc(doc(db,'follows',window._currentUser.uid+'_'+data.userId)).then(s=>{if(s.exists()){isF=true;fb.textContent='Following';fb.classList.add('following');}}).catch(()=>{});}
    fb.addEventListener('click',async e=>{
      e.stopPropagation();if(!window._currentUser){window._showAuthPrompt();return;}if(!data.userId)return;
      const fId=window._currentUser.uid+'_'+data.userId,fRef=doc(db,'follows',fId);
      isF=!isF;fb.textContent=isF?'Following':'Follow';fb.classList.toggle('following',isF);
      try{if(isF)await setDoc(fRef,{followerId:window._currentUser.uid,followingId:data.userId,createdAt:serverTimestamp()});else await deleteDoc(fRef);}
      catch(err){isF=!isF;fb.textContent=isF?'Following':'Follow';fb.classList.toggle('following',isF);}
    });
    $('egv-meta').appendChild(fb);
  }
}

$('egv-back').addEventListener('click',()=>{$('explore-game-viewer').classList.remove('open');$('egv-iframe').srcdoc='';});

function buildExpCard(gameId,data){
  const card=document.createElement('div');card.className='exp-card';
  const thumb=document.createElement('div');thumb.className='exp-thumb';
  if(data.thumbnail){const img=document.createElement('img');img.src=data.thumbnail;thumb.appendChild(img);}
  else{const ph=document.createElement('div');ph.className='exp-thumb-ph';ph.textContent='⬡';thumb.appendChild(ph);}
  const overlay=document.createElement('div');overlay.className='exp-thumb-overlay';thumb.appendChild(overlay);
  const plays=document.createElement('div');plays.className='exp-plays';plays.textContent=fmt(data.plays||0)+' plays';thumb.appendChild(plays);
  const info=document.createElement('div');info.className='exp-info';
  info.innerHTML='<div class="exp-title">'+esc(data.title||'Untitled')+'</div><div class="exp-handle">@'+esc(data.userDisplay||'developer')+'</div>';
  thumb.appendChild(info);card.appendChild(thumb);
  card.addEventListener('click',()=>openGameInExplore(gameId,data));
  return card;
}

document.querySelectorAll('.exp-tab').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.exp-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');_exploreTab=btn.dataset.tab;loadExplore();});});
$('explore-search-input').addEventListener('input',e=>{_exploreSearch=e.target.value;clearTimeout(_exploreDebounce);_exploreDebounce=setTimeout(loadExplore,300);});

onAuthStateChanged(auth,user=>{window._currentUser=user||null;fetchFeed();});
</script>
