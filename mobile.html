<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin: 0;
  height: 200vh; /* just to allow scrolling test */
}

/* SIMPLE BUBBLE */
#bubble {
  width: 70px;
  height: 70px;
  background: black;
  color: white;
  border-radius: 50%;
  position: fixed;
  top: 200px;
  left: 100px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  z-index: 9999;
  user-select: none;
}
</style>
</head>

<body>

<div id="bubble">AI</div>

<script>
let bubble = document.getElementById("bubble");

let offsetX = 0;
let offsetY = 0;
let isDragging = false;

// TOUCH START
bubble.addEventListener("touchstart", function(e) {
  isDragging = true;
  offsetX = e.touches[0].clientX - bubble.offsetLeft;
  offsetY = e.touches[0].clientY - bubble.offsetTop;
});

// TOUCH MOVE (DRAG)
document.addEventListener("touchmove", function(e) {
  if (isDragging) {
    bubble.style.left = (e.touches[0].clientX - offsetX) + "px";
    bubble.style.top = (e.touches[0].clientY - offsetY) + "px";
  }
});

// TOUCH END
document.addEventListener("touchend", function() {
  isDragging = false;
});

// TAP (CLICK)
bubble.addEventListener("click", function() {
  alert("Bubble tapped");
});
</script>

</body>
</html>
