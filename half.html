<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Gallery</title>
    <style>
/* ═══════════════════════════════════════════════
   CHOOSE LIFE — Clean Bold Premium Stylesheet
   ═══════════════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap');

:root {
    --brand-gradient: linear-gradient(135deg, #0f0f0f 0%, #3a3a3a 40%, #626262 70%, #a6a6a6 100%);
    --brand-dark: #0f0f0f;
    --brand-mid: #626262;
    --brand-light: #a6a6a6;
    --red: #ff3b5c;
    --white: #ffffff;
    --off-white: #f8f8f8;
    --border: #efefef;
    --text-dark: #111;
    --text-mid: #555;
    --text-light: #bbb;
    --font: 'Outfit', -apple-system, sans-serif;
    --nav-h: 72px;
    --sheet-radius: 32px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: var(--font);
    background: #000;
    overflow: hidden;
    color: var(--text-dark);
    -webkit-font-smoothing: antialiased;
}

/* ─── LOADING SCREEN ─── */
.loading-container {
    position: fixed; inset: 0;
    background: #000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 9999;
    transition: opacity 0.4s ease-out;
}
.loading-container.hidden { opacity: 0; pointer-events: none; }
/* start = centered, move-to-top = slides UP while staying centered */
.loading-container.start {
    justify-content: center;
    align-items: center;
}
.loading-container.move-to-top {
    justify-content: flex-start;
    align-items: center;
    padding-top: 24px;
    transition: padding-top 0.5s ease-out, opacity 0.4s ease-out;
}
@media (min-width: 768px) {
    .loading-container { align-items: center; justify-content: flex-start; padding-top: 24px; }
}
.spinner {
    width: 44px; height: 44px;
    position: relative;
    display: flex; align-items: center; justify-content: center;
}
.spinner::before, .spinner::after {
    content: '';
    position: absolute;
    width: 13px; height: 13px;
    border-radius: 50%;
    animation: spinPulse 1s ease-in-out infinite;
}
.spinner::before { background: #fff; animation-delay: 0s; }
.spinner::after  { background: #666; animation-delay: 0.5s; }
@keyframes spinPulse {
    0%   { transform: scale(1) translateY(0); opacity: 1; }
    50%  { transform: scale(1.6) translateY(-14px); opacity: 0.5; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
}

/* ─── GALLERY / VIDEO FEED ─── */
.gallery {
    position: fixed; inset: 0; bottom: 0;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
}
.gallery::-webkit-scrollbar { display: none; }

.pin-container {
    position: relative;
    width: 100%; height: 100dvh;
    scroll-snap-align: start;
    scroll-snap-stop: always;
    overflow: hidden;
    background: #000;
    -webkit-tap-highlight-color: transparent;
}
.pin-container.leaving  { opacity: 0.5; transform: scale(0.97); transition: all 0.3s ease; }
.pin-container.entering { animation: videoEnter 0.35s ease-out; }
@keyframes videoEnter {
    from { opacity: 0.6; transform: scale(1.03); }
    to   { opacity: 1;   transform: scale(1); }
}

.gallery-item {
    position: absolute; inset: 0; overflow: hidden;
}
.gallery-item video {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    -webkit-tap-highlight-color: transparent;
    outline: none; user-select: none;
    will-change: transform;
}
/* Cinematic gradient — strong bottom fade */
.gallery-item::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(
        to bottom,
        transparent 0%,
        transparent 38%,
        rgba(0,0,0,0.25) 58%,
        rgba(0,0,0,0.72) 80%,
        rgba(0,0,0,0.94) 100%
    );
    pointer-events: none;
}

/* ─── VIDEO CAPTION STRIP (bottom-left) ─── */
.profile-info { display: none !important; }
.feed-description { display: none !important; }
.options { display: none !important; }
.video-caption {
    position: absolute;
    bottom: 90px; left: 16px; right: 78px;
    z-index: 6;
    pointer-events: none;
}
.video-creator-name {
    display: block;
    font-size: 18px; font-weight: 900;
    color: #fff;
    letter-spacing: -0.02em;
    text-shadow: 0 2px 16px rgba(0,0,0,0.9);
    margin-bottom: 6px;
}
.video-caption-text {
    font-size: 13px; font-weight: 500;
    color: rgba(255,255,255,0.88);
    text-shadow: 0 1px 8px rgba(0,0,0,0.9);
    line-height: 1.45;
    display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden; margin-bottom: 8px;
}
.video-music-pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px; padding: 5px 12px;
    color: #fff; font-size: 11px; font-weight: 600;
    pointer-events: none;
}
.video-music-pill svg { width: 11px; height: 11px; flex-shrink: 0; }
.music-ticker { overflow: hidden; max-width: 150px; }
.music-ticker-inner { white-space: nowrap; animation: musicScroll 7s linear infinite; display: inline-block; }
@keyframes musicScroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

/* ─── LIVE VIEWER BADGE (top-left) ─── */
.live-viewer-badge {
    position: absolute;
    top: 16px; left: 14px;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 24px; padding: 6px 12px 6px 10px;
    display: flex; align-items: center; gap: 6px;
    z-index: 8; pointer-events: none;
}
.live-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 6px rgba(255,59,92,0.8);
    animation: livePulse 1.4s ease-in-out infinite;
    flex-shrink: 0;
}
@keyframes livePulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.45; transform: scale(0.72); }
}
.live-viewer-text { font-size: 12px; font-weight: 800; color: #fff; letter-spacing: 0.02em; }

/* ─── PAUSE INDICATOR ─── */
.pause-indicator {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0; z-index: 15; pointer-events: none;
    transition: opacity 0.2s;
    background: rgba(0,0,0,0.5);
    border-radius: 50%; width: 72px; height: 72px;
    display: flex; align-items: center; justify-content: center;
}
.pause-indicator.show { opacity: 1; }
.pause-indicator svg { width: 36px; height: 36px; }

/* ─── RIGHT SIDE ACTION BUTTONS ─── */
.slide-actions {
    position: absolute; right: 10px; bottom: 92px;
    z-index: 10; display: flex; flex-direction: column;
    align-items: center; gap: 20px;
    pointer-events: auto;
}
.slide-action-btn {
    display: flex; flex-direction: column;
    align-items: center; gap: 5px;
    background: none; border: none; cursor: pointer;
    -webkit-tap-highlight-color: transparent; padding: 0;
    transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1);
}
.slide-action-btn:active { transform: scale(0.82); }
.slide-action-icon {
    width: 56px; height: 56px; border-radius: 50%;
    background: rgba(0,0,0,0.45);
    border: 1.5px solid rgba(255,255,255,0.22);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
}
.slide-action-icon svg {
    width: 26px; height: 26px;
    fill: none; stroke: rgba(255,255,255,0.95);
    stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    transition: all 0.2s;
}
.slide-action-label {
    font-size: 12px; font-weight: 800;
    color: rgba(255,255,255,0.92);
    text-shadow: 0 1px 6px rgba(0,0,0,0.9);
}

/* Profile avatar action */
.profile-action-icon {
    padding: 0 !important; overflow: visible !important;
    border: 3px solid #fff !important;
    background: #555 !important;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.2), 0 4px 20px rgba(0,0,0,0.6) !important;
}
.profile-action-icon img {
    width: 100% !important; height: 100% !important;
    border-radius: 50%; object-fit: cover; display: block;
}
.follow-badge {
    position: absolute; bottom: -10px; left: 50%;
    transform: translateX(-50%);
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--brand-gradient);
    border: 2.5px solid #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.35);
    display: flex; align-items: center; justify-content: center;
    z-index: 5; transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
}
.follow-badge svg { width: 11px; height: 11px; }
.follow-badge svg line { stroke: #fff; stroke-width: 2.5px; }
.slide-action-btn:active .follow-badge { transform: translateX(-50%) scale(0.84); }

/* LIKE active — heart fills with brand color */
.slide-action-btn.on .slide-action-icon {
    background: rgba(98,98,98,0.18);
    border-color: rgba(98,98,98,0.5);
}
.slide-action-btn.on .slide-action-icon .heart-icon {
    fill: url(#brandHeartGrad) !important; stroke: #626262 !important;
}

/* Like pop + float heart */
@keyframes likePop {
    0% { transform: scale(1); }
    35%{ transform: scale(1.55); }
    65%{ transform: scale(0.88); }
    100%{ transform: scale(1); }
}
.slide-action-btn.liked-pop .slide-action-icon { animation: likePop 0.42s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes floatHeart {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    30%  { opacity: 1; transform: translateY(-30px) scale(1.15); }
    100% { opacity: 0; transform: translateY(-85px) scale(0.5); }
}
.float-heart { position: absolute; width: 30px; height: 30px; pointer-events: none; z-index: 20; animation: floatHeart 0.9s ease-out forwards; }
.float-heart svg { width: 100%; height: 100%; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4)); }

/* ─── BOTTOM NAV ─── */
#bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: calc(var(--nav-h) + env(safe-area-inset-bottom, 0px));
    padding-bottom: env(safe-area-inset-bottom, 0px);
    background: #fff;
    border-top: 1px solid var(--border);
    box-shadow: 0 -8px 30px rgba(0,0,0,0.07);
    display: flex; align-items: center; justify-content: space-around;
    z-index: 300;
}
.nav-btn {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 3px;
    background: none; border: none; cursor: pointer;
    color: rgba(0,0,0,0.3);
    font-family: var(--font);
    font-size: 10px; font-weight: 700; letter-spacing: 0.03em;
    text-transform: uppercase;
    transition: color 0.18s, transform 0.15s; padding: 0;
    -webkit-tap-highlight-color: transparent;
}
.nav-btn.active { color: #111; }
.nav-btn.active .nav-icon-wrap {
    background: var(--brand-gradient);
    box-shadow: 0 6px 18px rgba(0,0,0,0.28);
    transform: translateY(-3px);
}
.nav-btn.active .nav-icon-wrap svg { stroke: #fff !important; }
.nav-btn.active .nav-icon-wrap svg[fill="currentColor"] { fill: #fff !important; stroke: none !important; }
.nav-icon-wrap {
    width: 44px; height: 44px; border-radius: 16px;
    background: #f2f2f2;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1);
    margin-bottom: 1px;
}
.nav-btn:active { transform: scale(0.88); }
.nav-btn:active .nav-icon-wrap { background: #e6e6e6; }
.nav-icon-wrap svg { width: 21px; height: 21px; stroke: rgba(0,0,0,0.5); }
.nav-upload-wrap { flex: 1; display: flex; align-items: center; justify-content: center; }
.nav-upload-pill {
    width: 62px; height: 62px; border-radius: 22px;
    background: var(--brand-gradient);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 28px rgba(0,0,0,0.3), 0 2px 6px rgba(0,0,0,0.12);
    transform: translateY(-8px);
    transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
}
.nav-upload-pill svg { width: 22px; height: 22px; fill: none; stroke: #fff; stroke-width: 2.6; stroke-linecap: round; stroke-linejoin: round; }
.nav-upload-pill:active { transform: translateY(-8px) scale(0.87); }

/* Tabs — hidden */
#feed-tabs { display: none !important; }

/* ─── PROFILE PANEL ─── */
#fpOverlay { display: none !important; pointer-events: none !important; }
#followingPanel { display: none !important; }

/* ─── LAZY LOAD ─── */
.lazy-load { opacity: 0; transition: opacity 0.3s ease-in; }
.lazy-load.loaded { opacity: 1; }

/* ─── COMMENT SHEET ─── */
.cs-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 2500; opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease;
    backdrop-filter: blur(2px);
}
.cs-overlay.open { opacity: 1; pointer-events: all; }

.comment-sheet {
    position: fixed; left: 0; right: 0; bottom: 0;
    height: 74dvh;
    background: #fafafa;
    border-radius: 28px 28px 0 0;
    z-index: 2600;
    display: flex; flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.44s cubic-bezier(0.22,1,0.36,1);
    overflow: hidden;
    box-shadow: 0 -24px 60px rgba(0,0,0,0.22);
}
.comment-sheet.open { transform: translateY(0); }

/* Brand accent bar at top */
.comment-sheet::before {
    content: ''; display: block; height: 3px; flex-shrink: 0;
    background: var(--brand-gradient);
}

.cs-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: #ddd; margin: 10px auto 0; flex-shrink: 0;
}

.cs-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 18px 14px;
    flex-shrink: 0;
    background: #fff;
    border-bottom: 1px solid #f0f0f0;
}
.cs-head-left { display: flex; align-items: center; gap: 10px; }
.cs-live-pill {
    display: flex; align-items: center; gap: 5px;
    background: var(--brand-dark); color: #fff;
    font-size: 9px; font-weight: 900; letter-spacing: 0.16em;
    padding: 5px 11px; border-radius: 99px; line-height: 1;
}
.cs-live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #fff;
    animation: livePulse 1.4s ease-in-out infinite;
}
.cs-head-title { font-size: 16px; font-weight: 900; color: #111; letter-spacing: -0.02em; }
.cs-close {
    background: #f0f0f0; border: none; border-radius: 50%;
    width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.15s; z-index: 9999; pointer-events: all;
}
.cs-close:active { background: #e0e0e0; }
.cs-close svg { width: 13px; height: 13px; fill: none; stroke: #666; stroke-width: 2.5; stroke-linecap: round; pointer-events: none; }

/* Typing indicator */
.typing-indicator {
    padding: 4px 18px; font-size: 11.5px; color: #aaa;
    font-style: italic; min-height: 20px; flex-shrink: 0;
    display: flex; align-items: center; gap: 6px;
    opacity: 0; transition: opacity 0.3s;
    background: #fff;
}
.typing-indicator.visible { opacity: 1; }
.typing-dots { display: flex; gap: 3px; }
.typing-dots span {
    width: 5px; height: 5px; border-radius: 50%; background: #bbb;
    animation: typingBounce 1.2s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce {
    0%,60%,100% { transform: translateY(0); opacity: 0.35; }
    30% { transform: translateY(-3px); opacity: 0.8; }
}

/* ─── COMMENTS LOADING STATE ─── */
.comments-loading {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 40px 20px; gap: 14px;
}
.cs-spinner {
    width: 36px; height: 36px;
    position: relative;
    display: flex; align-items: center; justify-content: center;
}
.cs-spinner::before, .cs-spinner::after {
    content: '';
    position: absolute;
    width: 11px; height: 11px;
    border-radius: 50%;
    animation: spinPulse 1s ease-in-out infinite;
}
.cs-spinner::before { background: var(--brand-dark); animation-delay: 0s; }
.cs-spinner::after  { background: var(--brand-mid); animation-delay: 0.5s; }
.cs-spinner-text { font-size: 12px; font-weight: 600; color: #bbb; letter-spacing: 0.04em; }

/* ─── COMMENTS LIST ─── */
#commentsList { flex: 1; overflow-y: auto; padding: 8px 0 4px; background: #fff; }
#commentsList::-webkit-scrollbar { display: none; }

.comment {
    display: flex; padding: 8px 16px;
    gap: 10px;
    animation: cmtIn 0.25s ease-out;
}
@keyframes cmtIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
.comment.new-comment { animation: cmtIn 0.3s ease-out; }

.comment-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    object-fit: cover; flex-shrink: 0; cursor: pointer;
    border: 1.5px solid #f0f0f0;
}
.comment-bubble {
    flex: 1; min-width: 0;
}
.comment-author {
    font-size: 12px; font-weight: 800; color: #111;
    margin-bottom: 2px; display: flex; align-items: center; gap: 5px;
    flex-wrap: wrap;
}
.comment-flag { width: 15px; height: 11px; border-radius: 2px; vertical-align: middle; }
.comment-creator-badge {
    font-size: 9.5px; font-weight: 800; color: #fff;
    background: var(--brand-gradient);
    padding: 1px 6px; border-radius: 99px; letter-spacing: 0.03em;
}
.comment-text { font-size: 13px; font-weight: 400; color: #333; line-height: 1.45; word-break: break-word; overflow-wrap: anywhere; }
.comment-actions {
    display: flex; align-items: center; margin-top: 4px; gap: 0;
}
.comment-time { font-size: 10.5px; color: #c8c8c8; margin-right: 6px; font-weight: 500; }

/* Comment like button — brand, no red ever */
.like-button {
    display: flex; align-items: center; gap: 4px;
    background: transparent; border: none;
    border-radius: 6px; cursor: pointer;
    font-family: var(--font); padding: 2px 6px;
    transition: all 0.18s cubic-bezier(0.34,1.56,0.64,1);
}
.like-button:active { transform: scale(0.84); }
.like-button svg {
    width: 13px; height: 13px;
    transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1);
    fill: none; stroke: #ccc; stroke-width: 1.8; flex-shrink: 0;
}
.like-button.liked svg {
    fill: var(--brand-dark); stroke: var(--brand-dark);
    transform: scale(1.25);
}
@keyframes cLikePop {
    0%{transform:scale(1)} 40%{transform:scale(1.25)} 70%{transform:scale(0.95)} 100%{transform:scale(1)}
}
.like-button.pop svg { animation: cLikePop 0.36s cubic-bezier(0.34,1.56,0.64,1); }
.like-count { font-size: 11px; font-weight: 700; color: #ccc; min-width: 8px; transition: color 0.18s; }
.like-button.liked ~ .like-count { color: var(--brand-dark); }

.reply-btn {
    background: none; border: none; cursor: pointer;
    font-size: 11px; font-weight: 700; color: #ccc;
    font-family: var(--font); padding: 2px 8px; transition: color 0.15s;
}
.reply-btn:active { color: var(--brand-mid); }

/* Top comment */
.top-comment { position: relative; padding-top: 18px !important; }
.top-comment-badge {
    position: absolute; top: 4px; left: 62px;
    background: var(--brand-gradient); color: #fff;
    font-size: 9px; font-weight: 900; letter-spacing: 0.1em;
    padding: 2px 9px; border-radius: 99px;
    text-transform: uppercase;
}

/* Reply preview inside form */
.reply-preview {
    display: none; align-items: center; gap: 6px;
    padding: 6px 14px 4px; background: transparent;
    flex-shrink: 0;
}
.reply-preview.show { display: flex; }
.reply-preview-icon { font-size: 14px; color: var(--brand-mid); flex-shrink: 0; }
.reply-preview-text { font-size: 12px; color: var(--brand-mid); font-weight: 700; flex: 1; }
.reply-preview-close {
    background: #eee; border: none; cursor: pointer; color: #888;
    border-radius: 50%; width: 20px; height: 20px; flex-shrink: 0;
    font-size: 14px; display: flex; align-items: center; justify-content: center;
    line-height: 1; transition: background 0.15s;
}
.reply-preview-close:active { background: #ddd; }

/* Replies */
.replies-container { margin-left: 46px; margin-top: 4px; }
.view-replies-btn {
    background: none; border: none; cursor: pointer;
    font-size: 12px; font-weight: 800; color: var(--brand-mid);
    font-family: var(--font); padding: 4px 0 8px;
    display: flex; align-items: center; gap: 6px;
    transition: color 0.15s;
}
.view-replies-btn::before {
    content: ''; display: block;
    width: 22px; height: 1.5px;
    background: #ddd; border-radius: 1px; flex-shrink: 0;
}
.view-replies-btn:active { color: var(--brand-dark); }

/* ─── COMMENT FORM ─── */
.comment-form {
    background: #fff;
    border-top: 1px solid #eeeeee;
    padding: 10px 14px calc(10px + env(safe-area-inset-bottom, 0px)) 14px;
    flex-shrink: 0;
    display: flex; flex-direction: column; gap: 0;
}

.cf-row {
    display: flex; align-items: flex-end; gap: 10px;
}

.cf-avatar {

async function toggleFollow(userId, userName) {
    if (!currentUser) return;
    
    try {
        const followQuery = query(
            collection(db, 'follows'),
            where('followerUserId', '==', currentUser.uid),
            where('followedUserId', '==', userId)
        );
        
        const followSnapshot = await getDocs(followQuery);
        
        if (followSnapshot.empty) {
            await addDoc(collection(db, 'follows'), {
                followerUserId: currentUser.uid,
                followedUserId: userId,
                followedUserName: userName,
                timestamp: serverTimestamp()
            });
            followedUsers.add(userId);
        } else {
            followSnapshot.forEach(async doc => {
                await deleteDoc(doc.ref);
            });
            followedUsers.delete(userId);
        }
        
        updateFollowButtons();
    } catch (error) {
        console.error('Error toggling follow:', error);
    }
}

function debounce(func, wait) {
    let timeout;
    return function() {
        const context = this;
        const args = arguments;
        clearTimeout(timeout);
        timeout = setTimeout(() => {
            func.apply(context, args);
        }, wait);
    };
}

function loadMediaElement(el) {
    if (!el.dataset.src) return;
    el.src = el.dataset.src;
    el.removeAttribute('data-src');
    el.classList.add('loaded');
    if (el.tagName === 'VIDEO') {
        el.playsInline = true;
        el.loop = true;
        el.muted = true;
        el.load();
    }
}

function setupLazyLoading() {
    const all = Array.from(document.querySelectorAll('.lazy-load'));
    const galleryEl = document.getElementById('gallery');

    // Eagerly load first 3 so screen is never black on open
    all.slice(0, 3).forEach(el => loadMediaElement(el));

    if ('IntersectionObserver' in window && all.length > 3) {
        const lazyObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    loadMediaElement(entry.target);
                    lazyObserver.unobserve(entry.target);
                }
            });
        }, {
            root: galleryEl,
            rootMargin: '300px 0px',
            threshold: 0
        });
        all.slice(3).forEach(el => lazyObserver.observe(el));
    } else {
        all.slice(3).forEach(el => loadMediaElement(el));
    }
}

async function setupVideoVisibility() {
    const galleryEl = document.getElementById('gallery');

    function playVideo(video) {
        const doPlay = () => {
            video.muted = false;
            video.play().catch(() => {
                video.muted = true;
                video.play().catch(() => {});
            });
        };
        // If src not yet set (still has data-src), load it first
        if (!video.src && video.dataset && video.dataset.src) {
            loadMediaElement(video);
        }
        // Wait until video has data before playing to avoid black flash
        if (video.readyState >= 2) {
            doPlay();
        } else {
            video.addEventListener('canplay', doPlay, { once: true });
        }
    }

    const visObs = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            const video = entry.target;
            if (entry.isIntersecting && entry.intersectionRatio >= 0.6) {
                playVideo(video);
            } else {
                video.pause();
            }
        });
    }, {
        root: galleryEl,
        threshold: [0, 0.6, 1.0]
    });

    document.querySelectorAll('#gallery video').forEach(v => visObs.observe(v));
    window._videoVisObs = visObs;
    // Expose so newly added videos can be registered
    window._playVideo = playVideo;
}

async function fetchPosts() {
    try {
        const recenceCollection = collection(db, 'recence');
        const q = query(recenceCollection, orderBy('timestamp', 'desc'));
        const querySnapshot = await getDocs(q);

        loadingContainer.classList.add('hidden');
        setTimeout(() => {
            loadingContainer.style.display = 'none';
        }, 300);

        if (querySnapshot.empty) {
            gallery.innerHTML = '<div style="text-align: center; padding: 20px;">No posts found</div>';
            return;
        }

        const desktopFeed = document.getElementById('desktop-feed');
        const desktopPosts = [];
        const isDesktop = window.innerWidth >= 900;

        querySnapshot.forEach((doc) => {
            const postData = doc.data();
            if (postData.media && postData.media.length > 0) {
                // Mobile feed
                if (!isDesktop) {
                    const pinElement = createPinElement(postData, doc.id);
                    if (pinElement) gallery.appendChild(pinElement);
                }
                // Desktop feed
                if (isDesktop && desktopFeed && typeof window._buildDesktopCard === 'function') {
                    const card = window._buildDesktopCard(postData, doc.id);
                    if (card) desktopFeed.appendChild(card);
                }
                desktopPosts.push({ data: postData, id: doc.id });
            }
        });

        if (isDesktop) {
            document.dispatchEvent(new CustomEvent('desktopPostsReady', { detail: { posts: desktopPosts } }));
        } else {
            setupLazyLoading();
            setupVideoVisibility();
        }
    } catch (error) {
        console.error('Error fetching posts:', error);
        loadingContainer.classList.add('hidden');
        setTimeout(() => {
            loadingContainer.style.display = 'none';
        }, 300);
        gallery.innerHTML = '<div style="text-align: center; padding: 20px;">Error loading content. Please try again later.</div>';
    }
}

            const postRef = doc(db, 'recence', postId);
            onSnapshot(postRef, (snap) => {

                const num = (d.viewerCount) || (d.likes ? d.likes.length * 14 + 120 : 200);

    // Pause indicator (brand styled)

    pauseEl.innerHTML = `<svg viewBox="0 0 24 24"><rect x="5" y="3" width="4" height="18" rx="2" fill="#a6a6a6"/><rect x="15" y="3" width="4" height="18" rx="2" fill="#3a3a3a"/></svg>`;
    pinContainer.appendChild(pauseEl);

    // Clicking the video toggles play/pause — always with sound
    if (mediaElement && mediaElement.tagName === 'VIDEO') {
        mediaElement.addEventListener('click', (e) => {
            e.stopPropagation();
            mediaElement.muted = false;
            if (mediaElement.paused) {
                mediaElement.play().catch(() => {});
                pauseEl.classList.remove('show');
            } else {
                mediaElement.pause();
                pauseEl.classList.add('show');
                setTimeout(() => pauseEl.classList.remove('show'), 900);
            }
        });
    }

    // Register video with visibility observer so it pauses when off-screen
    if (mediaElement && mediaElement.tagName === 'VIDEO' && window._videoVisObs) {
        window._videoVisObs.observe(mediaElement);
    }

    // openComments custom event fired by the comment button in injected slide-actions
    pinContainer.addEventListener('openComments', () => {
        openModal(postData, postId);
    });

    pinContainer.addEventListener('click', (e) => {

        if (e.target.tagName !== 'VIDEO') {
            openModal(postData, postId);

    const slideActions = document.createElement('div');
    slideActions.className = 'slide-actions';

    // HEART / Like button (was thumbs-up — now a proper heart)

        '</div>' +
        '<span class="slide-action-label thumb-lbl">0</span>';

    thumbLbl.textContent = initialLikes.length;
    if (currentUser && initialLikes.includes(currentUser.uid)) {
        thumbBtn.classList.add('on');
    }
    thumbBtn.addEventListener('click', async (e) => {
        e.stopPropagation();
        if (!currentUser) return;
        // Vibration feedback
        if (navigator.vibrate) navigator.vibrate(30);
        // Pop animation
        thumbBtn.classList.remove('liked-pop');
        void thumbBtn.offsetWidth;
        thumbBtn.classList.add('liked-pop');
        // Floating heart
        const heart = document.createElement('div');
        heart.className = 'float-heart';
        heart.innerHTML = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0f0f0f"/><stop offset="40%" stop-color="#626262"/><stop offset="100%" stop-color="#a6a6a6"/></linearGradient></defs><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" fill="url(#hg)" stroke="none"/></svg>';
        heart.style.cssText = 'right:10px;bottom:' + (parseInt(thumbBtn.getBoundingClientRect().bottom) + 30) + 'px;';
        pinContainer.appendChild(heart);
        setTimeout(() => heart.remove(), 900);
        try {
            const postRef = doc(db, 'recence', postId);
            const postDoc = await getDoc(postRef);
            if (!postDoc.exists()) return;
            const data = postDoc.data();
            const isLiked = data.likes && data.likes.includes(currentUser.uid);
            if (isLiked) {
                await updateDoc(postRef, { likes: arrayRemove(currentUser.uid) });
                thumbBtn.classList.remove('on');
                thumbLbl.textContent = Math.max(0, (data.likes ? data.likes.length : 1) - 1);

                thumbLbl.textContent = (data.likes ? data.likes.length : 0) + 1;

    const profileAvatarEl = document.createElement('div');

    const followBadge = document.createElement('div');

    followBadge.innerHTML = _isFollowedInit

    profileBtn.addEventListener('click', async (e) => {
        e.stopPropagation();

        const nowFollowing = !followedUsers.has(postData.userId);

        followBadge.innerHTML = nowFollowing
            ? '<svg viewBox="0 0 14 14" fill="none"><polyline points="2,7 5.5,11 12,3" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>'
            : '<svg viewBox="0 0 14 14" fill="none"><line x1="7" y1="2" x2="7" y2="12" stroke="#111" stroke-width="2.2" stroke-linecap="round"/><line x1="2" y1="7" x2="12" y2="7" stroke="#111" stroke-width="2.2" stroke-linecap="round"/></svg>';
        followBadge.style.background = nowFollowing ? 'var(--brand-gradient)' : '';
        profileBtn.querySelector('.slide-action-icon').style.borderColor = nowFollowing ? 'rgba(255,255,255,0.7)' : '';
        await toggleFollow(postData.userId, postData.name || 'User');
    });

    slideActions.appendChild(profileBtn);

    slideActions.appendChild(thumbBtn);

    // Comment button
    const cmtBtn = document.createElement('button');
    cmtBtn.className = 'slide-action-btn';
    cmtBtn.setAttribute('aria-label', 'Comments');
    cmtBtn.innerHTML =
        '<div class="slide-action-icon">' +
            '<svg viewBox="0 0 122.97 122.88" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M61.44,0a61.46,61.46,0,0,1,54.91,89l6.44,25.74a5.83,5.83,0,0,1-7.25,7L91.62,115A61.43,61.43,0,1,1,61.44,0ZM96.63,26.25a49.78,49.78,0,1,0-9,77.52A5.83,5.83,0,0,1,92.4,103L109,107.77l-4.5-18a5.86,5.86,0,0,1,.51-4.34,49.06,49.06,0,0,0,4.62-11.58,50,50,0,0,0-13-47.62Z" fill="#ffffff" stroke="rgba(255,255,255,0.3)" stroke-width="1"/></svg>' +
        '</div>' +
        '<span class="slide-action-label cmt-count">' + (postData.commentCount || 0) + '</span>';
    cmtBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        openModal(postData, postId);
    });
    slideActions.appendChild(cmtBtn);

    pinContainer.appendChild(slideActions);

    return pinContainer;
}

function createMediaElement(mediaItem) {
    if (!mediaItem || !mediaItem.url) return null;

    const isVideo = mediaItem.type === 'video' || mediaItem.contentType?.startsWith('video/');
    
    if (isVideo) {
        const video = document.createElement('video');
        video.className = 'lazy-load';
        video.dataset.src = mediaItem.url;
        video.alt = 'Video content';
        video.muted = true; // start muted to allow autoplay, unmuted by observer
        video.controls = false;
        video.playsInline = true;
        video.loop = true;
        video.autoplay = false; // observer handles play after src is set

        video.onerror = function() {
            if (this.parentNode && this.parentNode.parentNode) {
                this.parentNode.parentNode.remove();
            }
            return null;
        };

        return video;
    } else {
        // Images not supported — video-only platform
        return null;
    }
}

function openModal(postData, postId) {
    currentPostId = postId;
    currentPostData = postData;
    
    modalMedia.innerHTML = '';
    commentsList.innerHTML = '';
    commentsCount.textContent = '0 comments';
    commentInput.value = '';
    submitComment.disabled = true;
    selectedGif = null;
    currentReplyTo = null;
    replyPreview.style.display = 'none'; replyPreview.classList.remove('show');
    
    postUserAvatar.src = postData.photoURL || 'https://abs.twimg.com/sticky/default_profile_images/default_profile_400x400.png';
    postUserAvatar.onerror = function() {
        this.src = 'https://abs.twimg.com/sticky/default_profile_images/default_profile_400x400.png';
    };
    postUserAvatar.addEventListener('click', (e) => {
        e.stopPropagation();
        viewProfile(postData.userId);
    });
    
    postUserName.textContent = postData.name || 'User';
    postUserName.addEventListener('click', (e) => {
        e.stopPropagation();
        viewProfile(postData.userId);
    });
    
    postUserFlag.src = `https://flagcdn.com/w20/${postData.country || 'unknown'}.png`;
    postUserFlag.onerror = function() {
        this.style.display = 'none';
    };
    
    // Description — always hidden in comment sheet
    const descWrap = document.getElementById('postDescriptionWrap');
    const descToggle = document.getElementById('postDescToggle');
    if (descWrap) descWrap.style.display = 'none';
    if (descToggle) descToggle.style.display = 'none';
    
    if (postData.userId === currentUser?.uid) {
        followButton.style.display = 'none';
    } else {
        followButton.style.display = 'inline-block';
        followButton.textContent = followedUsers.has(postData.userId) ? 'Following ✓' : 'Follow';
        followButton.classList.toggle('following', followedUsers.has(postData.userId));
    }
    
    likePostButton.classList.toggle('liked', postData.likes && postData.likes.includes(currentUser?.uid));
    likePostCount.textContent = postData.likes ? postData.likes.length : 0;
    
    // Open the comment sheet (slides up from bottom)
    // The feed video stays playing in the background — no duplicate media shown
    const sheet = document.getElementById('commentSheet');
    const overlay = document.getElementById('csOverlay');
    if (sheet) sheet.classList.add('open');
    if (overlay) overlay.classList.add('open');
    
    loadComments(postId);
}

function openPanel() {
    const panel = document.getElementById('followingPanel');
    const ov = document.getElementById('fpOverlay');
    if (panel) panel.classList.add('open');
    if (ov) ov.classList.add('open');
    document.body.style.overflow = 'hidden';

function viewProfile(userId) {
    const panel = document.getElementById('followingPanel');
    const card  = document.getElementById('fpProfileCard');
    const fpFeedEl = document.getElementById('fpFeed');
    const fpTitle  = document.getElementById('fpTitle');
    if (!panel) return;

    if (card) card.style.display = 'flex';
    if (fpFeedEl) fpFeedEl.style.display = 'none';
    if (fpTitle) fpTitle.textContent = 'Profile';

    openPanel();

    const defaultAvatar = 'https://abs.twimg.com/sticky/default_profile_images/default_profile_400x400.png';
    const followsRef = collection(db, 'follows');

    Promise.all([
        getDoc(doc(db, 'users', userId)),
        getDocs(query(followsRef, where('followedUserId', '==', userId))),
        getDocs(query(followsRef, where('followerUserId', '==', userId)))
    ]).then(([userDoc, followersSnap, followingSnap]) => {
        const u = userDoc.data() || {};
        const fpAvatar   = document.getElementById('fpAvatar');
        const fpUserName = document.getElementById('fpUserName');
        const fpCounts   = document.getElementById('fpCounts');
        if (fpAvatar) { fpAvatar.src = u.photoURL || defaultAvatar; fpAvatar.onerror = () => { fpAvatar.src = defaultAvatar; }; }
        if (fpUserName) fpUserName.textContent = u.displayName || u.name || 'User';
        if (fpCounts) fpCounts.innerHTML =
            `<div class="fp-count-item"><span class="fp-count-num">${followersSnap.size}</span><span class="fp-count-label">Followers</span></div>
             <div class="fp-count-item"><span class="fp-count-num">${followingSnap.size}</span><span class="fp-count-label">Following</span></div>`;
    }).catch(() => {});
}

function closeProfileModal() {

    const ov = document.getElementById('fpOverlay');

    if (ov) ov.classList.remove('open');

function closeModal() {
    const sheet = document.getElementById('commentSheet');
    const overlay = document.getElementById('csOverlay');
    if (sheet) sheet.classList.remove('open');
    if (overlay) overlay.classList.remove('open');
    document.body.style.overflow = '';

        commentsUnsubscribe();

    }
    
    currentPostId = null;
    currentPostData = null;
    currentVideo = null;
    
    gifSelector.classList.remove('active');
    selectedGif = null;

function loadComments(postId) {
    // Set cfAvatar to current user's photo
    const cfAv = document.getElementById('cfAvatar');
    if (cfAv && currentUser) cfAv.src = currentUser.photoURL || 'https://abs.twimg.com/sticky/default_profile_images/default_profile_400x400.png';

    commentsList.innerHTML = `
        <div class="comments-loading">
            <div class="cs-spinner"></div>
            <span class="cs-spinner-text">Loading comments</span>
        </div>
    `;
    
    const commentsRef = collection(db, 'recence', postId, 'comments');
    const q = query(commentsRef, orderBy('timestamp', 'asc'));
    
    // Typing indicator simulation
    const typingEl = document.getElementById('typingIndicator');
    const typingNames = ['Alex', 'Sam', 'Jordan', 'Riley', 'Casey'];
    let typingTimer;
    function showTyping() {
        if (!typingEl) return;
        const name = typingNames[Math.floor(Math.random() * typingNames.length)];
        document.getElementById('typingText').textContent = name + ' is typing...';
        typingEl.classList.add('visible');
        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => typingEl.classList.remove('visible'), 2500);
    }
    // Show typing randomly
    const typingInterval = setInterval(showTyping, Math.random() * 18000 + 10000);

    const _renderedIds = new Set();
    commentsUnsubscribe = onSnapshot(q, (snapshot) => {
        // Update count only
        commentsCount.textContent = snapshot.size;
        if (currentPostId) {
            const slideEl = document.querySelector(`.pin-container[data-post-id="${currentPostId}"]`);
            if (slideEl) {
                const cmtCountEl = slideEl.querySelector('.cmt-count');
                if (cmtCountEl) cmtCountEl.textContent = snapshot.size;
            }
        }

        if (snapshot.empty) {
            // Clear only if truly empty (first load)
            if (_renderedIds.size === 0) {
                commentsList.innerHTML = '<div class="comments-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>No comments yet</span><span style="font-size:12px;color:#ddd;">Be the first to share your thoughts</span></div>';
            }
            clearInterval(typingInterval);
            return;
        }

        // Remove empty placeholder if present
        if (_renderedIds.size === 0) commentsList.innerHTML = '';

        // Build replies map
        const repliesMap = {};
        snapshot.forEach((d) => {
            const c = d.data(); c.id = d.id;
            if (c.parentId) {
                if (!repliesMap[c.parentId]) repliesMap[c.parentId] = [];
                repliesMap[c.parentId].push(c);
            }
        });

        // Only add NEW root comments — don't re-render existing
        let firstRoot = true;
        snapshot.forEach((d) => {
            const c = d.data(); c.id = d.id;
            if (c.parentId) return; // skip replies handled below
            if (_renderedIds.has(c.id)) return; // already rendered
            // Remove optimistic duplicate
            const opt = commentsList.querySelector('[data-comment-id^="temp_"]');
            if (opt && c.text && opt.querySelector('.comment-text') &&
                opt.querySelector('.comment-text').textContent === c.text) {
                opt.remove();
            }
            _renderedIds.add(c.id);
            const el = createCommentElement(c, repliesMap[c.id] || []);
            el.classList.add('new-comment');
            // Top comment badge only for first comment with likes
            if (firstRoot && c.likes && c.likes.length > 0) {
                el.classList.add('top-comment');
                const badge = document.createElement('div');
                badge.className = 'top-comment-badge';
                badge.textContent = '⭐ Top';
                el.appendChild(badge);
            }
            firstRoot = false;
            commentsList.appendChild(el);
        });

        clearInterval(typingInterval);
        setTimeout(() => { commentsList.scrollTop = commentsList.scrollHeight; }, 40);
    }, (error) => {
        console.error("Error loading comments:", error);
        commentsList.innerHTML = '<div style="text-align: center; padding: 10px;">Error loading comments</div>';
    });
}

function createCommentElement(commentData, replies = []) {
    const comment = document.createElement('div');
    comment.className = 'comment';
    comment.dataset.commentId = commentData.id;

    const avatar = document.createElement('img');
    avatar.className = 'comment-avatar';
    avatar.src = commentData.userPhotoURL || 'https://abs.twimg.com/sticky/default_profile_images/default_profile_400x400.png';
    avatar.onerror = function() { this.src = 'https://abs.twimg.com/sticky/default_profile_images/default_profile_400x400.png'; };
    avatar.addEventListener('click', (e) => { e.stopPropagation(); viewProfile(commentData.userId); });

    const bubble = document.createElement('div');
    bubble.className = 'comment-bubble';

    // Author row
    const author = document.createElement('div');
    author.className = 'comment-author';
    const nameNode = document.createTextNode(commentData.userName || 'Anonymous');
    author.appendChild(nameNode);
    author.style.cursor = 'pointer';
    author.addEventListener('click', (e) => { e.stopPropagation(); viewProfile(commentData.userId); });

    if (commentData.country) {
        const flag = document.createElement('img');
        flag.className = 'comment-flag';
        flag.src = `https://flagcdn.com/w20/${commentData.country}.png`;
        flag.onerror = function() { this.style.display = 'none'; };
        author.appendChild(flag);
    }
    if (currentPostData && commentData.userId === currentPostData.userId) {
        const cb = document.createElement('span');
        cb.className = 'comment-creator-badge';
        cb.textContent = 'Creator';
        author.appendChild(cb);
    }
    bubble.appendChild(author);

    // Text
    if (commentData.text && commentData.text.trim()) {
        const text = document.createElement('div');
        text.className = 'comment-text';
        text.textContent = commentData.text;
        bubble.appendChild(text);
    }

    // GIF
    if (commentData.gifUrl) {
        const gif = document.createElement('img');
        gif.className = 'comment-gif';
        gif.src = commentData.gifUrl;
        gif.loading = 'lazy';
        bubble.appendChild(gif);
    }

    // Actions row
    const actions = document.createElement('div');
    actions.className = 'comment-actions';

    const timestamp = document.createElement('span');
    timestamp.className = 'comment-time';
    timestamp.textContent = (commentData.timestamp && commentData.timestamp.toDate) ? formatTimestamp(commentData.timestamp.toDate()) : 'Just now';
    actions.appendChild(timestamp);

    // Like button
    const likeButton = document.createElement('button');
    likeButton.className = 'like-button' + (commentData.likes && commentData.likes.includes(currentUser?.uid) ? ' liked' : '');
    likeButton.innerHTML = `<svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;

    const likeCount = document.createElement('span');
    likeCount.className = 'like-count';
    likeCount.textContent = commentData.likes ? commentData.likes.length : 0;

    let _localLikes = commentData.likes ? [...commentData.likes] : [];
    likeButton.addEventListener('click', async (e) => {
        e.stopPropagation();
        if (!currentUser) return;
        if (navigator.vibrate) navigator.vibrate(20);
        const isLiked = likeButton.classList.contains('liked');
        likeButton.classList.remove('pop'); void likeButton.offsetWidth; likeButton.classList.add('pop');
        if (isLiked) {
            likeButton.classList.remove('liked');
            _localLikes = _localLikes.filter(id => id !== currentUser.uid);
        } else {
            likeButton.classList.add('liked');
            _localLikes.push(currentUser.uid);
        }
        likeCount.textContent = _localLikes.length;
        try {
            const commentRef = doc(db, 'recence', currentPostId, 'comments', commentData.id);
            await updateDoc(commentRef, { likes: isLiked ? arrayRemove(currentUser.uid) : arrayUnion(currentUser.uid) });
        } catch (err) {
            if (isLiked) { likeButton.classList.add('liked'); _localLikes.push(currentUser.uid); }
            else { likeButton.classList.remove('liked'); _localLikes = _localLikes.filter(id => id !== currentUser.uid); }
            likeCount.textContent = _localLikes.length;
        }
    });
    actions.appendChild(likeButton);
    actions.appendChild(likeCount);

    // Reply button
    const replyButton = document.createElement('button');
    replyButton.className = 'reply-btn';
    replyButton.textContent = 'Reply';
    replyButton.addEventListener('click', (e) => {
        e.stopPropagation();
        // Check if we're in desktop panel or mobile sheet
        var inDesktop = !!replyButton.closest('#dc-list');
        if (inDesktop) {
            // Dispatch event so desktop handler picks it up
            document.getElementById('dc-list').dispatchEvent(Object.assign(new Event('_reply', {bubbles:true}), {
                _commentId: commentData.id, _userName: commentData.userName
            }));
        } else {
            currentReplyTo = { id: commentData.id, name: commentData.userName };
            replyPreviewText.textContent = `Replying to ${commentData.userName}`;
            replyPreview.classList.add('show');
            replyPreview.style.display = 'flex';
            commentInput.focus();
        }
    });
    actions.appendChild(replyButton);

    bubble.appendChild(actions);

    // Replies
    if (replies.length > 0) {
        const repliesContainer = document.createElement('div');
        repliesContainer.className = 'replies-container';
        const viewRepliesBtn = document.createElement('button');
        viewRepliesBtn.className = 'view-replies-btn';
        viewRepliesBtn.textContent = `View ${replies.length} repl${replies.length === 1 ? 'y' : 'ies'}`;
        const repliesList = document.createElement('div');
        repliesList.style.display = 'block';
        replies.forEach(reply => repliesList.appendChild(createCommentElement(reply)));
        viewRepliesBtn.addEventListener('click', (e) => {

        });

        repliesContainer.appendChild(repliesList);

    comment.appendChild(avatar);
    comment.appendChild(bubble);
    return comment;
}

function formatTimestamp(date) {
    const now = new Date();
    const diffMs = now - date;
    const diffSec = Math.floor(diffMs / 1000);
    const diffMin = Math.floor(diffSec / 60);
    const diffHour = Math.floor(diffMin / 60);
    const diffDay = Math.floor(diffHour / 24);
    
    if (diffSec < 60) {
        return 'Just now';
    } else if (diffMin < 60) {
        return `${diffMin}m ago`;
    } else if (diffHour < 24) {
        return `${diffHour}h ago`;
    } else if (diffDay < 7) {
        return `${diffDay}d ago`;
    } else {
        return date.toLocaleDateString();
    }
}

async function addComment() {
    if (!currentUser || !currentPostId) return;
    
    const text = commentInput.value.trim();
    if (text === '' && !selectedGif) return;
    
    // Show spinner ONLY near input — don't touch comment list
    const spinner = document.getElementById('sendSpinner');
    if (spinner) spinner.classList.add('visible');
    submitComment.disabled = true;
    commentInput.value = '';
    
    // Optimistically append the comment right away
    const optimisticData = {
        id: 'temp_' + Date.now(),
        userId: currentUser.uid,
        userName: currentUser.displayName || 'User',
        userPhotoURL: currentUser.photoURL,
        text: text,
        timestamp: null,
        likes: [],
        country: currentUser.country
    };
    if (currentReplyTo) {
        optimisticData.parentId = currentReplyTo.id;
        optimisticData.parentUserName = currentReplyTo.name;
    }
    if (selectedGif) optimisticData.gifUrl = selectedGif;
    
    const optimisticEl = createCommentElement(optimisticData, []);
    optimisticEl.classList.add('new-comment');
    optimisticEl.style.opacity = '0.7';
    commentsList.appendChild(optimisticEl);
    commentsList.scrollTop = commentsList.scrollHeight;
    
    const savedGif = selectedGif;
    selectedGif = null;
    const savedReply = currentReplyTo;
    currentReplyTo = null;
    replyPreview.style.display = 'none'; replyPreview.classList.remove('show');
    const previewGif = document.querySelector('.gif-preview');
    if (previewGif) previewGif.remove();
    
    try {
        const commentData = {
            userId: currentUser.uid,
            userName: currentUser.displayName || 'User',
            userPhotoURL: currentUser.photoURL,
            text: text,
            timestamp: serverTimestamp(),
            likes: [],
            country: currentUser.country
        };
        if (savedReply) {
            commentData.parentId = savedReply.id;
            commentData.parentUserName = savedReply.name;
        }
        if (savedGif) commentData.gifUrl = savedGif;
        
        const commentsRef = collection(db, 'recence', currentPostId, 'comments');
        await addDoc(commentsRef, commentData);
        
        // Confirm optimistic element
        optimisticEl.style.opacity = '1';
        
        const postRef = doc(db, 'recence', currentPostId);
        const postDoc = await getDoc(postRef);
        if (postDoc.exists()) {
            await updateDoc(postRef, { commentCount: (postDoc.data().commentCount || 0) + 1 });
        }
    } catch (error) {
        console.error('Error adding comment:', error);
        optimisticEl.remove(); // remove failed comment
        commentInput.value = text; // restore text
        alert('Failed to send. Please try again.');
    } finally {
        if (spinner) spinner.classList.remove('visible');
        submitComment.disabled = commentInput.value.trim() === '' && !savedGif;
    }
}

// Load following feed — fetch posts from people current user follows
document.addEventListener('loadFollowingFeed', async function() {
    if (!currentUser) {
        document.dispatchEvent(new CustomEvent('fpFeedReady', { detail: { posts: [] } }));
        return;
    }
    try {
        // Get list of followed user IDs
        const followingSnap = await getDocs(query(collection(db, 'follows'), where('followerUserId', '==', currentUser.uid)));
        const followedIds = followingSnap.docs.map(d => d.data().followedUserId);
        if (!followedIds.length) {
            document.dispatchEvent(new CustomEvent('fpFeedReady', { detail: { posts: [] } }));
            return;
        }
        // Fetch posts from followed users (Firestore 'in' supports up to 30)
        const chunks = [];
        for (let i = 0; i < followedIds.length; i += 30) chunks.push(followedIds.slice(i, i + 30));
        let allPosts = [];
        for (const chunk of chunks) {
            const snap = await getDocs(query(collection(db, 'recence'), where('userId', 'in', chunk), orderBy('timestamp', 'desc')));
            snap.forEach(d => { if (d.data().media && d.data().media.length) allPosts.push({ id: d.id, ...d.data() }); });
        }
        // Sort by timestamp desc
        allPosts.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
        document.dispatchEvent(new CustomEvent('fpFeedReady', { detail: { posts: allPosts } }));
    } catch(e) {
        console.error('loadFollowingFeed error:', e);
        document.dispatchEvent(new CustomEvent('fpFeedReady', { detail: { posts: [] } }));
    }
});

        var card = entry.target;
        var v = card._video;
        if (entry.isIntersecting && entry.intersectionRatio >= 0.6) {
          // Mark active
          document.querySelectorAll('.desktop-card').forEach(function(c){ c.classList.remove('active'); });
          card.classList.add('active');
          // Play this video
          if (v) { v.muted = false; v.play().catch(function(){ v.muted = true; v.play().catch(function(){}); }); }
          // Open its comments
          var pid = card.dataset.postId;
          var pdata = card._postData;
          if (pid && pdata) openDesktopComments(pdata, pid);
        } else {
          if (v) { v.pause(); v.currentTime = 0; }
        }
      });
    }, { root: feed, threshold: 0.6 });

    document.querySelectorAll('.desktop-card').forEach(function(card) {
      obs.observe(card);
    });
    window._desktopFeedObs = obs;
  }

  // Nav arrows HTML injection
  function injectDesktopNavArrows() {
    if (document.getElementById('desktopNavArrows')) return;
    var arrows = document.createElement('div');
    arrows.className = 'desktop-nav-arrows';
    arrows.id = 'desktopNavArrows';
    arrows.innerHTML =

      '<button class="desktop-nav-arrow" id="dnDown" title="Next"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></button>';
    document.body.appendChild(arrows);

    var feed = document.getElementById('desktop-feed');
    document.getElementById('dnUp').addEventListener('click', function() {

    document.getElementById('dnDown').addEventListener('click', function() {
      var h = window.innerHeight;
      feed.scrollBy({ top: h, behavior: 'smooth' });

  }

  // Open first post in desktop panel on load
  document.addEventListener('desktopPostsReady', function(e) {
    var posts = e.detail.posts;
    // Store postData on each card element so IntersectionObserver can access it
    var cards = document.querySelectorAll('#desktop-feed .desktop-card');
    cards.forEach(function(card, i) {
      if (posts[i]) card._postData = posts[i].data;
    });
    if (posts && posts.length > 0) {
      openDesktopComments(posts[0].data, posts[0].id);
      if (cards[0]) cards[0].classList.add('active');
      if (cards[0] && cards[0]._video) {
        cards[0]._video.muted = false;
        cards[0]._video.play().catch(function(){ cards[0]._video.muted = true; cards[0]._video.play().catch(function(){}); });
      }
    }
    setTimeout(function() {
      setupDesktopFeedObserver();
      injectDesktopNavArrows();
    }, 200);
  });

  // Wire reply button on desktop — when someone clicks Reply in #dc-list, set dcReplyTo
  function setDcReply(cid, name) {
    dcReplyTo = { id: cid, name: name };
    var rp = document.getElementById('dc-reply-preview');
    var rt = document.getElementById('dc-reply-text');
    if (rt) rt.textContent = 'Replying to ' + name;
    if (rp) { rp.style.display = 'flex'; rp.classList.add('show'); }
    var inp = document.getElementById('dc-comment-input');
    if (inp) inp.focus();
  }
  document.getElementById('dc-list').addEventListener('click', function(e) {
    var btn = e.target.closest('.reply-btn');
    if (!btn) return;
    e.stopPropagation();
    var commentEl = btn.closest('.comment');
    var bubble = btn.closest('.comment-bubble');
    if (!commentEl || !bubble) return;
    var authorEl = bubble.querySelector('.comment-author');
    var name = authorEl ? authorEl.childNodes[0].textContent.trim() : 'User';
    var cid = commentEl.dataset.commentId;
    setDcReply(cid, name);
  });
  document.getElementById('dc-list').addEventListener('_reply', function(e) {
    setDcReply(e._commentId, e._userName);
  });

})();

    <script>
    // ── TikTok snap scroll + sound on first tap ──
    (function() {
        var gallery = document.getElementById('gallery');
        if (!gallery) return;
        var current = 0, timer, isSettling = false;
        var userInteracted = false;

        // Unmute all videos after first user interaction
        function unmuteAll() {
            if (userInteracted) return;
            userInteracted = true;
            gallery.querySelectorAll('video').forEach(function(v) {
                v.muted = false;
                if (!v.paused) v.play().catch(function(){});
            });
        }
        document.addEventListener('touchstart', unmuteAll, { once: true, passive: true });
        document.addEventListener('click', unmuteAll, { once: true });

        gallery.addEventListener('scroll', function() {
            clearTimeout(timer);
            timer = setTimeout(settle, 60);
        }, { passive: true });

        function settle() {
            if (isSettling) return;
            var slides = gallery.querySelectorAll('.pin-container');
            var h = window.innerHeight;
            var idx = Math.round(gallery.scrollTop / h);
            idx = Math.max(0, Math.min(idx, slides.length - 1));
            if (idx === current) return;

            isSettling = true;

            var leaving = slides[current];
            if (leaving) {
                leaving.classList.add('leaving');
                setTimeout(function() { leaving.classList.remove('leaving'); }, 380);
            }
            current = idx;

            slides.forEach(function(s, i) {
                var v = s.querySelector('video');
                if (!v) return;
                if (i === current) {
                    v.currentTime = 0; // always restart from beginning
                    v.muted = false;
                    v.play().catch(function(){ 
                        v.muted = true;
                        v.play().catch(function(){});
                    });
                } else {
                    v.pause();
                    v.currentTime = 0; // reset so it starts fresh if revisited
                }
            });

            setTimeout(function() { isSettling = false; }, 400);
        }

        // Auto-play first video — use playVideo helper which handles canplay + src loading
        setTimeout(function() {
            var first = gallery.querySelector('.pin-container video');
            if (first) {
                if (typeof window._playVideo === 'function') {
                    window._playVideo(first);
                } else {
                    // fallback
                    var doPlay = function() {
                        first.muted = false;
                        first.play().catch(function(){
                            first.muted = true;
                            first.play().catch(function(){});
                            document.addEventListener('click', function(){ first.muted = false; first.play().catch(function(){}); }, { once: true });
                        });
                    };
                    if (first.readyState >= 2) { doPlay(); }
                    else { first.addEventListener('canplay', doPlay, { once: true }); }
                }
            }
        }, 500);

        // When comment sheet opens: shrink gallery so video "floats up"
        var commentSheet = document.getElementById('commentSheet');
        if (commentSheet) {
            var observer = new MutationObserver(function() {
                if (commentSheet.classList.contains('open')) {
                    gallery.style.bottom = '74dvh';
                    gallery.style.transition = 'bottom 0.44s cubic-bezier(0.22,1,0.36,1)';
                } else {
                    gallery.style.bottom = '0';
                }
            });
            observer.observe(commentSheet, { attributes: true, attributeFilter: ['class'] });
        }
    })();

    // buttons are now built directly inside createPinElement in the module script

    // ── Comment sheet close button ──
    (function() {
        var btn = document.getElementById('csClose');
        var ov  = document.getElementById('csOverlay');
        var sh  = document.getElementById('commentSheet');
        function close() {
            if (sh) sh.classList.remove('open');
            if (ov) ov.classList.remove('open');
        }
        if (btn) btn.addEventListener('click', close);
        if (ov)  ov.addEventListener('click', close);
    })();

    // ── Profile panel close — definitive handler ──
    (function() {
        function closeFpPanel() {
            var panel = document.getElementById('followingPanel');
            var ov    = document.getElementById('fpOverlay');
            if (panel) panel.classList.remove('open');
            if (ov)    ov.classList.remove('open');
            document.body.style.overflow = '';
            var tabFY = document.getElementById('tabForYou');
            var tabFL = document.getElementById('tabFollowing');
            if (tabFY) tabFY.classList.add('active');
            if (tabFL) tabFL.classList.remove('active');
        }
        // Use capture phase so it fires before any blocking handlers
        document.getElementById('fpBack').addEventListener('click', function(e) {
            e.stopPropagation();
            closeFpPanel();
        }, true);
        document.getElementById('fpOverlay').addEventListener('click', closeFpPanel);
        // Expose globally so IIFE closePanel can also call it
        window._closeFpPanel = closeFpPanel;
    })();

    // ── Nav ──
    (function() {
        var home = document.getElementById('navHome');
        var prof = document.getElementById('navProfile');
        var up   = document.getElementById('navUpload');
        var gal  = document.getElementById('gallery');
        if (home) home.addEventListener('click', function() {
            home.classList.add('active'); prof.classList.remove('active');
            if (gal) gal.scrollTo({ top: 0, behavior: 'smooth' });
        });
        if (prof) prof.addEventListener('click', function() {
            prof.classList.add('active'); home.classList.remove('active');
        });
    })();

    // ── Following tab panel — slides up, TikTok feed of followed users ──
    (function() {
        var tabFollowing = document.getElementById('tabFollowing');
        var tabForYou    = document.getElementById('tabForYou');
        var panel        = document.getElementById('followingPanel');
        var ov           = document.getElementById('fpOverlay');
        var fpBack       = document.getElementById('fpBack');
        var fpFeedEl     = document.getElementById('fpFeed');
        var fpFeedLoaded = false;
        var fpCurrent = 0, fpTimer, fpSettling = false;

        function closePanel() {
            if (typeof window._closeFpPanel === 'function') { window._closeFpPanel(); }
            if (fpFeedEl) fpFeedEl.querySelectorAll('video').forEach(function(v){ v.pause(); v.currentTime = 0; });
        }

        // snap scroll inside fpFeed with sleep effect
        if (fpFeedEl) {
            fpFeedEl.addEventListener('scroll', function() {
                clearTimeout(fpTimer);
                fpTimer = setTimeout(fpSettle, 60);
            }, { passive: true });
        }

        function fpSettle() {
            if (fpSettling) return;
            var slides = fpFeedEl ? fpFeedEl.querySelectorAll('.fp-slide') : [];
            if (!slides.length) return;
            var h = fpFeedEl.clientHeight;
            var idx = Math.round(fpFeedEl.scrollTop / h);
            idx = Math.max(0, Math.min(idx, slides.length - 1));
            if (idx === fpCurrent) return;
            fpSettling = true;
            var leaving = slides[fpCurrent];
            if (leaving) { leaving.classList.add('leaving'); setTimeout(function(){ leaving.classList.remove('leaving'); }, 320); }
            var entering2 = slides[current];
            if (entering2) { entering2.classList.add('entering'); setTimeout(function(){ entering2.classList.remove('entering'); }, 420); }
            fpCurrent = idx;
            slides.forEach(function(s, i) {
                var v = s.querySelector('video');
                if (!v) return;
                if (i === fpCurrent) { v.muted = false; v.play().catch(function(){}); }
                else { v.pause(); v.currentTime = 0; }
            });
            setTimeout(function(){ fpSettling = false; }, 400);
        }

        function buildFpSlide(post) {
            var media = post.media && post.media[0];
            if (!media) return null;
            var isVid = media.type === 'video' || (media.contentType && media.contentType.startsWith('video/'));
            var slide = document.createElement('div');
            slide.className = 'fp-slide';
            if (isVid) {
                var v = document.createElement('video');
                v.src = media.url; v.muted = true; v.loop = true; v.playsInline = true;
                slide.appendChild(v);
            } else {
                var img = document.createElement('img');
                img.src = media.url; img.loading = 'lazy';
                slide.appendChild(img);
            }
            // overlay: avatar + name
            var ov2 = document.createElement('div');
            ov2.className = 'fp-slide-overlay';
            ov2.innerHTML = '<div class="fp-slide-name">'
                + '<img src="'+(post.photoURL||'https://abs.twimg.com/sticky/default_profile_images/default_profile_400x400.png')+'" onerror="this.src='https://abs.twimg.com/sticky/default_profile_images/default_profile_400x400.png'">'
                + '<span>'+(post.name||'User')+'</span></div>';
            slide.appendChild(ov2);
            return slide;
        }

        if (tabFollowing) {
            tabFollowing.addEventListener('click', function() {
                tabFollowing.classList.add('active');
                tabForYou.classList.remove('active');
                // hide profile card, show feed
                var card = document.getElementById('fpProfileCard');
                var fpTitle = document.getElementById('fpTitle');
                if (card) card.style.display = 'none';
                if (fpFeedEl) fpFeedEl.style.display = 'block';
                if (fpTitle) fpTitle.textContent = 'Following';
                if (panel) panel.classList.add('open');
                if (ov) ov.classList.add('open');
                document.body.style.overflow = 'hidden';
                // load posts from followed users (fired to module)
                if (!fpFeedLoaded) {
                    fpFeedEl.innerHTML = '<div class="fp-empty-feed">Loading...</div>';
                    document.dispatchEvent(new CustomEvent('loadFollowingFeed', { detail: { buildSlide: buildFpSlide } }));
                    fpFeedLoaded = true;
                } else {
                    // autoplay first on re-open
                    var first = fpFeedEl.querySelector('.fp-slide video');
                    if (first) { first.muted = false; first.play().catch(function(){}); }
                }
            });
        }
        if (tabForYou)  tabForYou.addEventListener('click', closePanel);

        // receive posts from module and build feed
        document.addEventListener('fpFeedReady', function(e) {
            if (!fpFeedEl) return;
            fpFeedEl.innerHTML = '';
            fpCurrent = 0; fpSettling = false;
            var posts = e.detail.posts;
            if (!posts || !posts.length) {
                fpFeedEl.innerHTML = '<div class="fp-empty-feed">Follow people to see their posts here</div>';
                return;
            }
            posts.forEach(function(p) {
                var s = buildFpSlide(p);
                if (s) fpFeedEl.appendChild(s);
            });
            // autoplay first
            setTimeout(function() {
                var first = fpFeedEl.querySelector('.fp-slide video');
                if (first) { first.muted = false; first.play().catch(function(){}); }
            }, 300);
        });
    })();
    </script>
