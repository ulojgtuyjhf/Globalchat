<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Profile — Recence</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap');
:root{
  --brand-gradient:linear-gradient(135deg,#0f0f0f 0%,#3a3a3a 40%,#626262 70%,#a6a6a6 100%);
  --font:'Outfit',-apple-system,sans-serif;
  --background:#ffffff;--text:#0f1419;--secondary-text:#536471;
  --border:#eff3f4;--card-bg:#f7f9f9;--primary:#1d9bf0;
}
[data-theme="dim"]{--background:#15202b;--text:#ffffff;--secondary-text:#8899a6;--border:#38444d;--card-bg:#1e2732;--primary:#1d9bf0;}
[data-theme="dark"]{--background:#000000;--text:#ffffff;--secondary-text:#71767b;--border:#2f3336;--card-bg:#16181c;--primary:#1d9bf0;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;transition:background-color 0.25s ease,color 0.25s ease,border-color 0.25s ease;}
html,body{font-family:var(--font);background:var(--background);color:var(--text);height:100%;-webkit-font-smoothing:antialiased;overflow:hidden;}
#pl{position:fixed;inset:0;background:var(--background);display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.4s ease;}
#pl.gone{opacity:0;pointer-events:none;}
.spin{width:44px;height:44px;position:relative;display:flex;align-items:center;justify-content:center;}
.spin::before,.spin::after{content:'';position:absolute;width:13px;height:13px;border-radius:50%;animation:sp 1s ease-in-out infinite;}
.spin::before{background:var(--text);}.spin::after{background:var(--secondary-text);animation-delay:0.5s;}
@keyframes sp{0%,100%{transform:scale(1) translateY(0);opacity:1;}50%{transform:scale(1.6) translateY(-14px);opacity:0.4;}}
#ms{position:fixed;inset:0;overflow-y:auto;overflow-x:hidden;background:var(--card-bg);-webkit-overflow-scrolling:touch;scrollbar-width:none;}
#ms::-webkit-scrollbar{display:none;}
.pw{max-width:640px;margin:0 auto;background:var(--background);min-height:100vh;}
@media(min-width:900px){#ms{background:var(--border);}.pw{box-shadow:0 0 60px rgba(0,0,0,0.15);}}
/* TOP BAR */
.tb{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:calc(env(safe-area-inset-top,0px)+14px) 18px 13px;background:var(--background);border-bottom:1px solid var(--border);}
.tb-u{font-size:18px;font-weight:900;letter-spacing:-0.03em;color:var(--text);}
.tb-s{width:36px;height:36px;border-radius:50%;background:var(--card-bg);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.tb-s svg{width:17px;height:17px;stroke:var(--text);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
/* HERO */
.hero{background:var(--brand-gradient);padding:28px 22px 0;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,0.07) 0%,transparent 70%);pointer-events:none;}
.av-ring{padding:3px;border-radius:50%;background:#fff;box-shadow:0 6px 28px rgba(0,0,0,0.4);display:inline-block;flex-shrink:0;z-index:2;}
.av-inner{width:88px;height:88px;border-radius:50%;background:#333;border:3px solid #000;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:900;color:#fff;}
.av-inner img{width:100%;height:100%;object-fit:cover;display:block;}
.hc{background:var(--background);border-radius:24px 24px 0 0;margin-top:18px;padding:18px 20px 0;}
.ptr{display:flex;align-items:flex-start;gap:18px;margin-bottom:14px;}
.psr{display:flex;gap:0;flex:1;padding-top:6px;}
.si{flex:1;display:flex;flex-direction:column;align-items:center;cursor:pointer;padding:6px 4px;border-radius:14px;}
.si:active{background:var(--card-bg);}
.sn{font-size:20px;font-weight:900;letter-spacing:-0.03em;color:var(--text);}
.sl{font-size:10.5px;font-weight:700;color:var(--secondary-text);margin-top:2px;text-transform:uppercase;letter-spacing:0.05em;}
.pn{font-size:17px;font-weight:900;color:var(--text);letter-spacing:-0.02em;margin-bottom:2px;}
.ph{font-size:13px;font-weight:600;color:var(--secondary-text);margin-bottom:8px;}
.pb{font-size:13.5px;font-weight:500;color:var(--secondary-text);line-height:1.55;margin-bottom:16px;}
.pa{display:flex;gap:8px;margin-bottom:18px;}
.pbtn{flex:1;height:36px;border-radius:12px;font-size:13px;font-weight:800;font-family:var(--font);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;border:1px solid var(--border);}
.pbtn:active{transform:scale(0.95);}
.pbtn.pr{background:var(--brand-gradient);color:#fff;border:none;box-shadow:0 2px 14px rgba(0,0,0,0.22);}
.pbtn.ps{background:var(--card-bg);color:var(--text);}
.pbtn svg{width:13px;height:13px;flex-shrink:0;}
/* TABS */
.tabs{display:flex;background:var(--background);border-bottom:1.5px solid var(--border);}
.tabb{flex:1;height:46px;background:none;border:none;border-bottom:2.5px solid transparent;color:var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;margin-bottom:-1.5px;}
.tabb.active{color:var(--text);border-bottom-color:var(--text);}
.tabb svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
/* GRID */
#ca{background:var(--background);}
.vg{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5px;background:var(--border);}
@media(min-width:500px){.vg{grid-template-columns:repeat(4,1fr);}}
.gt{aspect-ratio:9/16;background:var(--card-bg);overflow:hidden;cursor:pointer;position:relative;}
.gt video{width:100%;height:100%;object-fit:cover;pointer-events:none;display:block;}
.gt::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.5) 0%,transparent 50%);pointer-events:none;}
.gtl{position:absolute;bottom:7px;left:7px;z-index:2;display:flex;align-items:center;gap:3px;font-size:12px;font-weight:800;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,0.8);}
.gtl svg{width:11px;height:11px;fill:#fff;flex-shrink:0;}
.gtp{position:absolute;top:50%;left:50%;z-index:2;transform:translate(-50%,-50%);width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;}
@media(hover:none){.gtp{opacity:0.75;}}
.gt:hover .gtp{opacity:1;}
.gtp svg{width:14px;height:14px;fill:#fff;margin-left:2px;}
.ge{grid-column:1/-1;padding:70px 20px;text-align:center;}
.ge-icon{width:64px;height:64px;border-radius:22px;background:var(--card-bg);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
.ge-icon svg{width:28px;height:28px;stroke:var(--secondary-text);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.ge p{font-size:16px;font-weight:900;color:var(--secondary-text);margin-bottom:4px;}
.ge small{font-size:12px;color:var(--secondary-text);opacity:0.6;font-weight:500;}
.te{padding:60px 20px;text-align:center;}
.te p{font-size:16px;font-weight:900;color:var(--secondary-text);}
/* SHARED SHEET BASE */
.sh-ov{position:fixed;inset:0;background:rgba(0,0,0,0.45);opacity:0;pointer-events:none;transition:opacity 0.28s ease;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
.sh-ov.open{opacity:1;pointer-events:all;}
.sh{position:fixed;left:max(0px,calc(50% - 320px));right:max(0px,calc(50% - 320px));bottom:0;background:var(--background);border-radius:28px 28px 0 0;padding-bottom:env(safe-area-inset-bottom,20px);transform:translateY(100%);transition:transform 0.44s cubic-bezier(0.22,1,0.36,1);display:flex;flex-direction:column;box-shadow:0 -8px 40px rgba(0,0,0,0.2);}
.sh.open{transform:translateY(0);}
.sh-handle{width:40px;height:4px;border-radius:2px;background:var(--border);margin:12px auto 0;flex-shrink:0;}
.sh-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 12px;flex-shrink:0;border-bottom:1px solid var(--border);}
.sh-title{font-size:17px;font-weight:900;color:var(--text);}
.sh-close{width:32px;height:32px;border-radius:50%;background:var(--card-bg);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.sh-close svg{width:13px;height:13px;stroke:var(--text);fill:none;stroke-width:2.5;stroke-linecap:round;}
/* THEME SHEET */
#ts-ov{z-index:8000;}.#ts{z-index:8100;max-height:75dvh;}
#theme-sheet{z-index:8100;max-height:75dvh;}
#theme-overlay{z-index:8000;}
.ts-body{padding:14px 18px 8px;overflow-y:auto;}
.ts-lbl{font-size:10px;font-weight:900;color:var(--secondary-text);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px;}
.to{display:flex;align-items:center;padding:12px 14px;border-radius:16px;cursor:pointer;margin-bottom:4px;border:1.5px solid transparent;}
.to:hover{background:var(--card-bg);}
.to.active{border-color:var(--primary);background:var(--card-bg);}
.to-circle{width:36px;height:36px;border-radius:50%;flex-shrink:0;margin-right:14px;border:1px solid var(--border);}
.to-info{flex:1;}
.to-name{font-size:14px;font-weight:800;color:var(--text);}
.to-desc{font-size:12px;color:var(--secondary-text);margin-top:1px;}
.to-check{width:20px;height:20px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(0);transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1);}
.to.active .to-check{opacity:1;transform:scale(1);}
.to-check svg{width:11px;height:11px;fill:#fff;}
/* FP SHEET */
#fp-sheet{z-index:6100;max-height:82dvh;}
#fp-overlay{z-index:6000;}
#fp-list{flex:1;overflow-y:auto;padding:8px 0 10px;scrollbar-width:none;}
#fp-list::-webkit-scrollbar{display:none;}
.fpur{display:flex;align-items:center;gap:12px;padding:10px 18px;cursor:pointer;}
.fpur:active{background:var(--card-bg);}
.fpav{width:46px;height:46px;border-radius:50%;flex-shrink:0;overflow:hidden;background:var(--card-bg);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:#fff;border:2px solid var(--border);}
.fpav img{width:100%;height:100%;object-fit:cover;display:block;border-radius:50%;}
.fpui{flex:1;min-width:0;}
.fpun{font-size:14px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fpuh{font-size:12px;color:var(--secondary-text);font-weight:500;margin-top:1px;}
.fpfb{flex-shrink:0;height:32px;padding:0 16px;border-radius:99px;border:none;cursor:pointer;font-size:11.5px;font-weight:800;font-family:var(--font);background:var(--brand-gradient);color:#fff;letter-spacing:0.04em;text-transform:uppercase;}
.fpfb:active{transform:scale(0.92);}
.fpfb.following{background:var(--card-bg);color:var(--secondary-text);border:1px solid var(--border);}
.fpe{padding:40px 20px;text-align:center;font-size:13px;font-weight:600;color:var(--secondary-text);}
/* EDIT SHEET */
#edit-sheet{z-index:7100;max-height:92dvh;}
#edit-overlay{z-index:7000;}
#eb{flex:1;overflow-y:auto;padding:18px 18px 10px;scrollbar-width:none;}
#eb::-webkit-scrollbar{display:none;}
.ear{display:flex;align-items:center;gap:14px;padding:0 0 20px;border-bottom:1px solid var(--border);margin-bottom:18px;cursor:pointer;}
.eari{padding:2.5px;border-radius:50%;background:var(--brand-gradient);flex-shrink:0;}
.eav{width:64px;height:64px;border-radius:50%;background:var(--card-bg);border:2.5px solid var(--background);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#fff;}
.eav img{width:100%;height:100%;object-fit:cover;display:block;}
.eat p{font-size:15px;font-weight:800;color:var(--text);margin-bottom:2px;}
.eat small{font-size:11.5px;color:var(--secondary-text);font-weight:500;}
.ub{height:3px;border-radius:2px;background:var(--border);overflow:hidden;margin-top:6px;opacity:0;transition:opacity 0.2s;}
.ub.on{opacity:1;}
.ubf{height:100%;width:0%;background:var(--brand-gradient);transition:width 0.3s ease;}
.ef{margin-bottom:14px;}
.efl{font-size:10px;font-weight:900;color:var(--secondary-text);letter-spacing:0.09em;text-transform:uppercase;margin-bottom:6px;}
.ef input,.ef textarea{width:100%;background:var(--card-bg);border:1.5px solid var(--border);border-radius:14px;outline:none;resize:none;font-size:15px;font-weight:700;color:var(--text);font-family:var(--font);line-height:1.45;padding:12px 14px;transition:border-color 0.18s;}
.ef textarea{min-height:80px;}
.ef input::placeholder,.ef textarea::placeholder{color:var(--secondary-text);opacity:0.5;font-weight:500;}
.ef input:focus,.ef textarea:focus{border-color:var(--primary);}
.esl{font-size:10px;font-weight:900;color:var(--secondary-text);letter-spacing:0.09em;text-transform:uppercase;padding:8px 0 12px;border-top:1px solid var(--border);margin-top:6px;display:block;}
.eir{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border);}
.eir:last-of-type{border-bottom:none;}
.eik{font-size:13.5px;font-weight:700;color:var(--secondary-text);}
.eiv{font-size:13.5px;font-weight:700;color:var(--text);max-width:60%;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.esb{width:100%;height:52px;border-radius:16px;border:none;background:var(--brand-gradient);color:#fff;font-size:15px;font-weight:900;font-family:var(--font);cursor:pointer;margin-top:20px;letter-spacing:0.02em;}
.esb:active{transform:scale(0.97);}
.esob{width:100%;height:48px;border-radius:16px;border:1.5px solid var(--border);background:transparent;color:var(--secondary-text);font-size:13px;font-weight:800;font-family:var(--font);cursor:pointer;margin-top:10px;margin-bottom:4px;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:0.04em;text-transform:uppercase;}
.esob svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
/* TOAST */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(12px);background:#111;color:#fff;font-size:13px;font-weight:700;font-family:var(--font);padding:11px 22px;border-radius:99px;opacity:0;pointer-events:none;z-index:9999;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,0.25);}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
/* VIEWER */
#pv{position:fixed;inset:0;z-index:5000;background:#000;transform:translateY(100%);transition:transform 0.44s cubic-bezier(0.22,1,0.36,1);overflow:hidden;}
#pv.open{transform:translateY(0);}
#pvf{position:absolute;inset:0;overflow-y:scroll;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;scroll-behavior:auto;overscroll-behavior-y:contain;}
#pvf::-webkit-scrollbar{display:none;}
#pvb{position:fixed;top:calc(env(safe-area-inset-top,0px)+10px);left:14px;z-index:5100;width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,0.5);border:none;cursor:pointer;display:none;align-items:center;justify-content:center;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:0 2px 12px rgba(0,0,0,0.4);}
#pvb.show{display:flex;}
#pvb:active{transform:scale(0.88);}
#pvb svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
#pvf .pin-container{position:relative;width:100%;height:100dvh;scroll-snap-align:start;scroll-snap-stop:always;overflow:hidden;background:#000;}
#pvf .gallery-item{position:absolute;inset:0;overflow:hidden;}
#pvf .gallery-item video{width:100%;height:100%;object-fit:cover;display:block;outline:none;user-select:none;}
#pvf .gallery-item::after{content:'';position:absolute;inset:0;pointer-events:none;background:linear-gradient(to bottom,transparent 0%,transparent 38%,rgba(0,0,0,0.25) 58%,rgba(0,0,0,0.72) 80%,rgba(0,0,0,0.94) 100%);}
</style>
</head>
<body>
<div id="pl"><div class="spin"></div></div>
<div id="ms">
<div class="pw">
  <div class="tb">
    <span class="tb-u" id="topUsername">@username</span>
    <button class="tb-s" id="settingsBtn">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
  <div class="hero">
    <div class="hc">
      <div class="ptr">
        <div class="av-ring"><div class="av-inner" id="heroAv"><span id="heroAvLetter"></span></div></div>
        <div class="psr">
          <div class="si" id="statPosts"><div class="sn" id="statNumPosts">—</div><div class="sl">Posts</div></div>
          <div class="si" id="statFollowers"><div class="sn" id="statNumFollowers">—</div><div class="sl">Followers</div></div>
          <div class="si" id="statFollowing"><div class="sn" id="statNumFollowing">—</div><div class="sl">Following</div></div>
        </div>
      </div>
      <div class="pn" id="profName"> </div>
      <div class="ph" id="profHandle"> </div>
      <div class="pb" id="profBio"></div>
      <div class="pa">
        <button class="pbtn pr" onclick="openEditSheet()">
          <svg viewBox="0 0 24 24" stroke="#fff" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>
          Edit Profile
        </button>
        <button class="pbtn ps" id="shareProfileBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          Share
        </button>
      </div>
    </div>
  </div>
  <div class="tabs">
    <button class="tabb active" id="tabVideos" onclick="switchTab('videos')">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    </button>
    <button class="tabb" id="tabLiked" onclick="switchTab('liked')">
      <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    </button>
    <button class="tabb" id="tabBookmarks" onclick="switchTab('bookmarks')">
      <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
    </button>
  </div>
  <div id="ca">
    <div id="tabVideosContent"><div class="vg" id="videoGrid"></div></div>
    <div id="tabLikedContent" style="display:none;"></div>
    <div id="tabBookmarksContent" style="display:none;"></div>
  </div>
</div>
</div>

<!-- VIEWER -->
<div id="pv"><div id="pvf"></div></div>
<button id="pvb"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>

<!-- THEME SHEET -->
<div class="sh-ov" id="theme-overlay"></div>
<div class="sh" id="theme-sheet">
  <div class="sh-handle"></div>
  <div class="sh-head">
    <span class="sh-title">Appearance</span>
    <button class="sh-close" id="themeClose"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>
  <div class="ts-body">
    <div class="ts-lbl">Theme</div>
    <div class="to active" data-theme="light" id="topt-light">

function openViewer(posts,startIdx){
  const viewer=document.getElementById('pv'),feed=document.getElementById('pvf'),back=document.getElementById('pvb');
  if(_vObs){_vObs.disconnect();_vObs=null;}
  feed.querySelectorAll('video').forEach(v=>{v.pause();v.currentTime=0;});
  feed.innerHTML='';_vCur=null;
  posts.forEach(p=>{const pin=buildPin(p.data,p.id);if(pin)feed.appendChild(pin);});
  viewer.classList.add('open');back.classList.add('show');
  document.getElementById('ms').style.overflow='hidden';
  const pins=feed.querySelectorAll('.pin-container');
  if(pins[startIdx])feed.scrollTop=pins[startIdx].offsetTop;
  _vObs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      const pin=e.target,vid=pin.querySelector('video');if(!vid)return;
      if(e.isIntersecting&&e.intersectionRatio>=0.85){
        if(_vCur&&_vCur!==pin){const lv=_vCur.querySelector('video');if(lv)lv.pause();}
        _vCur=pin;vid.currentTime=0;vid.muted=false;
        setTimeout(()=>vid.play().catch(()=>{vid.muted=true;vid.play().catch(()=>{});}),50);
      }else if(!e.isIntersecting){vid.pause();vid.muted=true;vid.currentTime=0;}
    });
  },{root:feed,threshold:[0,0.85]});
  pins.forEach(p=>_vObs.observe(p));
  back.onclick=()=>{
    if(_vObs){_vObs.disconnect();_vObs=null;}_vCur=null;
    feed.querySelectorAll('video').forEach(v=>{v.pause();v.muted=true;});
    viewer.classList.remove('open');back.classList.remove('show');
    document.getElementById('ms').style.overflow='';
    setTimeout(()=>{feed.innerHTML='';},460);
  };
}

      const av=document.createElement('div');av.className='fpav';av.style.background=`hsl(${hue},50%,38%)`;
      if(photo&&!photo.includes('default_profile')){av.innerHTML=`<img src="${photo}" onerror="this.parentNode.textContent='${ltr}';">`;}else{av.textContent=ltr;}
      const info=document.createElement('div');info.className='fpui';info.innerHTML=`<div class="fpun">${name}</div><div class="fpuh">@${handle}</div>`;
      const fb=document.createElement('button');fb.className='fpfb'+(isFol?' following':'');fb.textContent=isFol?'Following':'Follow';
      if(uid===currentUser.uid)fb.style.display='none';
      fb.addEventListener('click',async()=>{
        if(followedUsers.has(uid)){const q2=query(collection(db,'follows'),where('followerUserId','==',currentUser.uid),where('followedUserId','==',uid));const s2=await getDocs(q2);s2.forEach(d=>deleteDoc(doc(db,'follows',d.id)));followedUsers.delete(uid);fb.textContent='Follow';fb.classList.remove('following');}
        else{await addDoc(collection(db,'follows'),{followerUserId:currentUser.uid,followedUserId:uid,createdAt:new Date().toISOString()});followedUsers.add(uid);fb.textContent='Following';fb.classList.add('following');}
        loadStats();
      });
      row.appendChild(av);row.appendChild(info);row.appendChild(fb);list.appendChild(row);
    });
  }catch(e){document.getElementById('fp-list').innerHTML='<div class="fpe">Could not load</div>';}
}
document.getElementById('fpClose').addEventListener('click',()=>{document.getElementById('fp-overlay').classList.remove('open');document.getElementById('fp-sheet').classList.remove('open');});
document.getElementById('fp-overlay').addEventListener('click',()=>{document.getElementById('fp-overlay').classList.remove('open');document.getElementById('fp-sheet').classList.remove('open');});

// ── Edit Profile ──
window.openEditSheet=function(){document.getElementById('edit-overlay').classList.add('open');document.getElementById('edit-sheet').classList.add('open');};
function closeEdit(){document.getElementById('edit-overlay').classList.remove('open');document.getElementById('edit-sheet').classList.remove('open');}
document.getElementById('editClose').addEventListener('click',closeEdit);
document.getElementById('edit-overlay').addEventListener('click',closeEdit);

document.getElementById('eavInput').addEventListener('change',async e=>{
  const file=e.target.files[0];if(!file)return;
  if(file.size>5*1024*1024){toast('Image must be under 5MB');return;}
  const reader=new FileReader();
  reader.onload=ev=>{
    ['editAv','heroAv'].forEach(id=>{const el=document.getElementById(id);el.innerHTML=`<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover;display:block;">`;});
  };
  reader.readAsDataURL(file);
  const bar=document.getElementById('ub'),fill=document.getElementById('ubf');
  bar.classList.add('on');fill.style.width='30%';
  try{
    const ext=file.name.split('.').pop(),fileId=`avatars_${currentUser.uid}_${Date.now()}.${ext}`;
    const fd=new FormData();fd.append('file',file);fd.append('fileId',fileId);
    fill.style.width='60%';
    const res=await fetch(R2_WORKER_URL+'/upload',{method:'POST',body:fd});
    fill.style.width='90%';if(!res.ok)throw new Error(res.status);
    const data=await res.json();pendingPhotoURL=data.url||`${R2_PUBLIC_URL}/${fileId}`;
    fill.style.width='100%';setTimeout(()=>{bar.classList.remove('on');fill.style.width='0%';},500);
    toast('Photo ready — tap Save');
  }catch(err){bar.classList.remove('on');fill.style.width='0%';toast('Upload failed. Try again.');}
});

window.saveProfile=async()=>{
  const btn=document.getElementById('editSaveBtn');btn.textContent='Saving…';
  const name=document.getElementById('editName').value.trim();
  const username=document.getElementById('editUsername').value.trim().replace(/[^a-zA-Z0-9_]/g,'');
  const bio=document.getElementById('editBio').value.trim();
  if(!name){toast('Name cannot be empty');btn.textContent='Save Changes';return;}
  if(username.length<3){toast('Username needs 3+ characters');btn.textContent='Save Changes';return;}
  const photo=pendingPhotoURL||userData.photoURL||currentUser.photoURL||'';
  try{
    await updateProfile(currentUser,{displayName:name,photoURL:photo||null});
    await setDoc(doc(db,'users',currentUser.uid),{displayName:name,username,bio,photoURL:photo,updatedAt:new Date().toISOString()},{merge:true});
    try{const q=query(collection(db,'recence'),where('userId','==',currentUser.uid));const s=await getDocs(q);if(!s.empty){const b=writeBatch(db);s.forEach(d=>b.update(doc(db,'recence',d.id),{name,userName:username,photoURL:photo}));await b.commit();}}catch(ex){}
    userData={...userData,displayName:name,username,bio,photoURL:photo};pendingPhotoURL=null;
    document.getElementById('topUsername').textContent='@'+username;
    document.getElementById('profName').textContent=name;
    document.getElementById('profHandle').textContent='@'+username;
    document.getElementById('profBio').textContent=bio;
    toast('Profile saved ✓');closeEdit();
  }catch(err){console.error(err);toast('Failed to save.');}
  btn.textContent='Save Changes';
};

window.doSignOut=async()=>{await fbSignOut(auth);window.location.href='/';};
</script>
