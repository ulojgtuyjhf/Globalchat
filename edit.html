<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Edit Profile - Nmedea</title>

  <style>
    :root {
      --primary: #626262;
      --background: #f7f9fa;
      --card: #ffffff;
      --text: #14171A;
      --text-light: #657786;
      --border: #E1E8ED;
      --error: #E0245E;
      --success: #17BF63;
      --brand-gradient: linear-gradient(135deg, #0f0f0f 0%, #1c1c1c 15%, #3a3a3a 30%, #4d4d4d 45%, #626262 60%, #787878 75%, #8f8f8f 90%, #a6a6a6 100%);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      background-color: var(--background);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      overflow-x: hidden;
    }

    /* ── Topbar ── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 44px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 14px;
      z-index: 50;
    }

    /* Save button — invisible until dirty */
    .save-btn {
      height: 34px;
      padding: 0 20px;
      border: none;
      border-radius: 999px;
      background: var(--brand-gradient);
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      position: relative;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transform: scale(0.82) translateX(10px);
      transition: opacity 0.22s cubic-bezier(0.22,1,0.36,1),
                  transform 0.22s cubic-bezier(0.22,1,0.36,1),
                  box-shadow 0.18s;
    }
    .save-btn.visible {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1) translateX(0);
    }
    .save-btn:hover  { transform: translateY(-1px) scale(1); box-shadow: 0 4px 14px rgba(98,98,98,0.32); }
    .save-btn:active { transform: scale(0.95); box-shadow: none; }
    .save-btn:disabled { opacity: 0.5 !important; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

    /* Branded 3-dot loader inside save button */
    .save-dots {
      display: none;
      align-items: center;
      gap: 4px;
    }
    .save-dots span {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.9);
      display: inline-block;
      animation: dotBounce 1.1s ease-in-out infinite;
    }
    .save-dots span:nth-child(1) { animation-delay: 0s; }
    .save-dots span:nth-child(2) { animation-delay: 0.18s; }
    .save-dots span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes dotBounce {
      0%, 80%, 100% { transform: scale(0.55); opacity: 0.45; }
      40%            { transform: scale(1.1);  opacity: 1; }
    }

    /* ── Page ── */
    .page {
      padding-top: 44px;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
    }
    .page-inner {
      width: 100%; max-width: 600px;
      padding: 0 0 100px;
      animation: fadeUp 0.35s ease;
    }

    /* ── Cover ── */
    .cover-wrap {
      width: 100%; height: 140px;
      background: var(--brand-gradient);
      position: relative; cursor: pointer; overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    .cover-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .cover-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .cover-wrap:hover .cover-overlay,
    .cover-wrap:active .cover-overlay { background: rgba(0,0,0,0.3); }
    .cover-cam {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.2s;
    }
    .cover-wrap:hover .cover-cam { opacity: 1; }
    .cover-cam svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Avatar row ── */
    .avatar-row {
      padding: 0 16px;
      display: flex; justify-content: space-between; align-items: flex-end;
      margin-top: -38px; position: relative; z-index: 2;
    }
    .av-ring {
      width: 80px; height: 80px; border-radius: 50%;
      background: var(--brand-gradient); padding: 3px;
      cursor: pointer; position: relative;
      -webkit-tap-highlight-color: transparent; flex-shrink: 0;
      transition: transform 0.18s;
    }
    .av-ring:active { transform: scale(0.93); }
    .av-inner {
      width: 100%; height: 100%; border-radius: 50%;
      background: var(--background); border: 3px solid var(--background);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; font-size: 28px; font-weight: 900; color: #fff;
    }
    .av-inner img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: block; }
    .av-badge {
      position: absolute; bottom: 2px; right: 2px;
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--brand-gradient); border: 2.5px solid var(--background);
      display: flex; align-items: center; justify-content: center;
    }
    .av-badge svg { width: 11px; height: 11px; stroke: #fff; fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
    .av-hint { font-size: 12px; color: var(--text-light); font-weight: 500; padding-bottom: 6px; }

    /* ── Upload progress ── */
    .upload-progress {
      height: 3px; background: var(--border); border-radius: 2px;
      margin-top: 6px; overflow: hidden; display: none;
    }
    .upload-progress-bar {
      height: 100%; background: var(--brand-gradient);
      border-radius: 2px; width: 0%;
      transition: width 0.4s cubic-bezier(0.19,1,0.22,1);
    }

    /* ── Form sections ── */
    .form-section { margin: 20px 16px 0; }
    .section-label {
      font-size: 11px; font-weight: 700; color: var(--text-light);
      letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 10px; padding-left: 2px;
    }

    /* ── Floating label inputs ── */
    .input-group { position: relative; margin-bottom: 12px; }

    .input-group input,
    .input-group textarea {
      width: 100%; padding: 22px 14px 8px;
      border: 1.5px solid var(--border); border-radius: 14px;
      font-size: 15px; background: var(--card); color: var(--text);
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }
    .input-group input { height: 56px; }
    .input-group textarea {
      min-height: 90px; max-height: 180px;
      resize: vertical; padding-top: 26px; line-height: 1.5;
    }
    .input-group input:focus,
    .input-group textarea:focus {
      border-color: #626262;
      box-shadow: 0 0 0 3px rgba(98,98,98,0.12);
    }
    .input-group input.ferr { border-color: var(--error) !important; box-shadow: 0 0 0 3px rgba(224,36,94,0.1) !important; }

    .input-group label {
      position: absolute; top: 50%; left: 14px;
      transform: translateY(-50%);
      font-size: 15px; font-weight: 500; color: var(--text-light);
      pointer-events: none;
      transition: all 0.18s cubic-bezier(0.22,1,0.36,1);
      z-index: 1;
    }
    .input-group.ta-group label { top: 18px; transform: none; }

    .input-group input:focus ~ label,
    .input-group input:not(:placeholder-shown) ~ label,
    .input-group textarea:focus ~ label,
    .input-group textarea:not(:placeholder-shown) ~ label {
      top: 10px; transform: translateY(0);
      font-size: 10px; font-weight: 700; color: #626262;
      letter-spacing: 0.06em; text-transform: uppercase;
    }
    .input-group.ta-group textarea:focus ~ label,
    .input-group.ta-group textarea:not(:placeholder-shown) ~ label { top: 8px; }

    .input-group input.with-status { padding-right: 108px; }

    /* username status badge */
    .uname-pill {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      display: flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 700;
      opacity: 0; transition: opacity 0.2s; pointer-events: none;
    }
    .uname-pill.vis { opacity: 1; }
    .uname-pill.checking { color: var(--text-light); }
    .uname-pill.ok  { color: var(--success); }
    .uname-pill.bad { color: var(--error); }
    .uname-pill svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Field messages ── */
    .fmsg {
      font-size: 12px; font-weight: 600;
      margin-top: 4px; padding-left: 4px; display: none;
    }
    .fmsg.err { color: var(--error); display: block; }
    .fmsg.ok  { color: var(--success); display: block; }

    /* ── Char count ── */
    .char-row { display: flex; justify-content: flex-end; margin-top: -6px; margin-bottom: 8px; }
    .char-count { font-size: 11px; color: var(--text-light); font-weight: 500; }
    .char-count.warn { color: #f4900c; }
    .char-count.over { color: var(--error); }

    /* ── Divider ── */
    .divider { height: 1px; background: var(--border); margin: 24px 0 0; }

    /* ═══════════════════════════════════════
       LINKS SECTION
    ═══════════════════════════════════════ */
    .links-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }

    /* Branded gradient-border pill */
    .link-pill {
      border-radius: 14px;
      padding: 2px;                        /* gradient border thickness */
      background: var(--brand-gradient);
      display: flex; align-items: stretch;
    }
    .link-pill-inner {
      display: flex; align-items: center; gap: 10px;
      background: var(--card); border-radius: 12px;
      padding: 10px 12px; width: 100%; min-width: 0;
    }
    .pill-icon {
      flex-shrink: 0; width: 32px; height: 32px; border-radius: 50%;
      background: var(--brand-gradient);
      display: flex; align-items: center; justify-content: center;
    }
    .pill-icon svg { width: 14px; height: 14px; stroke: #fff; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

    .pill-link {
      flex: 1; min-width: 0;
      text-decoration: none; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .pill-link-label {
      font-size: 13px; font-weight: 700; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      display: block;
    }
    .pill-link:hover .pill-link-label { text-decoration: underline; }
    .pill-link-url {
      font-size: 11px; color: var(--text-light);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      display: block; margin-top: 1px;
    }

    .pill-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .pill-btn {
      width: 30px; height: 30px; border-radius: 50%;
      border: none; background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-light);
      transition: background 0.18s, color 0.18s;
      -webkit-tap-highlight-color: transparent;
    }
    .pill-btn:hover { background: var(--border); }
    .pill-btn.del:hover { background: rgba(224,36,94,0.1); color: var(--error); }
    .pill-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

    /* Add row */
    .add-link-row { display: flex; gap: 8px; align-items: flex-start; }
    .add-link-row .input-group { flex: 1; margin-bottom: 0; }

    .add-btn {
      flex-shrink: 0; height: 56px; padding: 0 16px;
      border: none; border-radius: 14px;
      background: var(--brand-gradient);
      color: #fff; font-size: 13px; font-weight: 800;
      cursor: pointer; font-family: inherit;
      display: flex; align-items: center; gap: 6px;
      white-space: nowrap;
      transition: transform 0.18s, box-shadow 0.18s, opacity 0.18s;
    }
    .add-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(98,98,98,0.28); }
    .add-btn:active { transform: scale(0.96); }
    .add-btn:disabled { opacity: 0.42; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
    .add-btn svg { width: 15px; height: 15px; stroke: #fff; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    .links-note { font-size: 12px; color: var(--text-light); font-weight: 500; padding-left: 2px; margin-top: 8px; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text); color: var(--card);
      padding: 11px 20px; border-radius: 999px;
      font-size: 14px; font-weight: 700;
      z-index: 999; opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none; white-space: nowrap;
      display: flex; align-items: center; gap: 8px;
      max-width: calc(100vw - 40px);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
    .toast.terr { background: var(--error); }

    /* ── Animations ── */
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes fadeUp  { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .cover-wrap { height: 120px; }
      .av-ring { width: 72px; height: 72px; }
      .add-btn span { display: none; }
      .add-btn { padding: 0 14px; }
    }
    @media (min-width: 640px) {
      .cover-wrap { height: 180px; }
      .form-section { margin: 24px 24px 0; }
    }
    /* ── Confirm / Link sheet overlay ── */
    .sheet-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 200;
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; visibility: hidden;
      transition: opacity 0.28s cubic-bezier(0.19,1,0.22,1), visibility 0.28s;
    }
    .sheet-overlay.open { opacity: 1; visibility: visible; }

    .sheet {
      background: var(--card);
      border-radius: 24px 24px 0 0;
      width: 100%; max-width: 600px;
      padding: 20px 20px max(env(safe-area-inset-bottom,16px),24px);
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.19,1,0.22,1);
    }
    .sheet-overlay.open .sheet { transform: translateY(0); }

    .sheet-handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: var(--border); margin: 0 auto 18px;
    }

    /* Confirm sheet */
    .sheet-title {
      font-size: 17px; font-weight: 900; letter-spacing: -0.02em;
      color: var(--text); margin-bottom: 6px; text-align: center;
    }
    .sheet-body {
      font-size: 14px; color: var(--text-light);
      text-align: center; margin-bottom: 22px; line-height: 1.5;
    }
    .sheet-actions { display: flex; flex-direction: column; gap: 10px; }
    .sheet-btn {
      width: 100%; height: 50px; border-radius: 14px;
      border: none; font-size: 15px; font-weight: 800;
      cursor: pointer; font-family: inherit;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .sheet-btn:active { transform: scale(0.97); }
    .sheet-btn.primary {
      background: var(--brand-gradient); color: #fff;
    }
    .sheet-btn.primary:hover { box-shadow: 0 4px 14px rgba(98,98,98,0.28); }
    .sheet-btn.ghost {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--text-light);
    }
    .sheet-btn.ghost:hover { border-color: var(--text-light); color: var(--text); }
    .sheet-btn.danger {
      background: rgba(224,36,94,0.08);
      color: var(--error); border: 1.5px solid rgba(224,36,94,0.2);
    }
    .sheet-btn.danger:hover { background: rgba(224,36,94,0.14); }
    .sheet-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

    /* Link viewer sheet */
    .link-sheet-brand {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-bottom: 16px;
    }
    .link-sheet-logo {
      font-size: 16px; font-weight: 900; letter-spacing: -0.04em;
      background: var(--brand-gradient);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .link-sheet-lock {
      width: 14px; height: 14px; color: var(--success);
      stroke: currentColor; fill: none; stroke-width: 2.2;
      stroke-linecap: round; stroke-linejoin: round;
    }
    .link-sheet-url {
      background: var(--background); border-radius: 12px;
      padding: 12px 14px; margin-bottom: 18px;
      display: flex; align-items: center; gap: 10px;
    }
    .link-sheet-url svg { width: 16px; height: 16px; flex-shrink: 0; stroke: var(--text-light); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .link-sheet-url-text {
      flex: 1; font-size: 13px; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-weight: 500;
    }

    @media (max-width: 480px) {
      .topbar { height: 40px; padding: 0 12px; }
      .page   { padding-top: 40px; }
    }
  </style>
</head>
<body>

<!-- Topbar — just the save button -->
<div class="topbar">
  <button class="save-btn" id="save-btn">
    <div class="save-dots" id="save-dots">
      <span></span><span></span><span></span>
    </div>
    <span id="save-label">Save</span>
  </button>
</div>

<!-- Delete confirm sheet -->
<div class="sheet-overlay" id="confirm-overlay">
  <div class="sheet" id="confirm-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Remove this link?</div>
    <div class="sheet-body">This will delete the link from your profile. You can always add it back later.</div>
    <div class="sheet-actions">
      <button class="sheet-btn danger" id="confirm-delete-btn">
        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        Delete link
      </button>
      <button class="sheet-btn ghost" id="confirm-cancel-btn">Keep it</button>
    </div>
  </div>
</div>

<!-- Link viewer sheet -->
<div class="sheet-overlay" id="link-overlay">
  <div class="sheet" id="link-sheet">
    <div class="sheet-handle"></div>
    <div class="link-sheet-brand">
      <span class="link-sheet-logo">Nmedea</span>
      <svg class="link-sheet-lock" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <div class="link-sheet-url">
      <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      <span class="link-sheet-url-text" id="link-sheet-url-text"></span>
    </div>
    <div class="sheet-actions">
      <button class="sheet-btn primary" id="link-open-btn">
        <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Open in browser
      </button>
      <button class="sheet-btn ghost" id="link-cancel-btn">Stay on Nmedea</button>
    </div>
  </div>
</div>

<div class="page">
  <div class="page-inner">

    <!-- Cover -->
    <div class="cover-wrap" id="cover-wrap">
      <div class="cover-overlay">
        <div class="cover-cam">
          <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </div>
      </div>
    </div>

    <!-- Avatar -->
    <div class="avatar-row">
      <div class="av-ring" id="av-ring">
        <div class="av-inner" id="av-inner">
          <span id="av-letter">?</span>
        </div>
        <div class="av-badge">
          <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </div>
      </div>
      <span class="av-hint">Tap to change photo</span>
    </div>

    <div class="upload-progress" id="upload-progress">
      <div class="upload-progress-bar" id="upload-bar"></div>
    </div>

    <!-- Personal Info -->
    <div class="form-section">
      <div class="section-label">Personal Info</div>

      <div class="input-group">
        <input type="text" id="display-name" placeholder=" " maxlength="50" autocomplete="off" spellcheck="false">
        <label for="display-name">Display Name</label>
      </div>
      <div class="char-row"><span class="char-count" id="name-count">0 / 50</span></div>
      <div class="fmsg" id="name-msg"></div>

      <div class="input-group">
        <input type="text" id="username" placeholder=" " maxlength="20" autocomplete="off" spellcheck="false" class="with-status">
        <label for="username">Username</label>

<!-- Theme -->
<script>

<!-- Firebase -->
<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, updateProfile }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, collection, query, where, getDocs }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({ apiKey:"AIzaSyDnPz8BWCaXJOazlFVO4Eap8VxdSR2oDFQ", authDomain:"globalchat-2d669.firebaseapp.com", projectId:"globalchat-2d669", storageBucket:"globalchat-2d669.firebasestorage.app", messagingSenderId:"178714711978", appId:"1:178714711978:web:fb831188be23e62a4bbdd3" });
const auth = getAuth(app);
const db   = getFirestore(app);
const R2   = 'https://r2-upload.katlegomashilwane0691.workers.dev/upload';
const MAX_LINKS = 2;

// ── refs ──
const saveBtn        = document.getElementById('save-btn');
const saveLabel      = document.getElementById('save-label');
const saveDots       = document.getElementById('save-dots');
const nameEl         = document.getElementById('display-name');
const unameEl        = document.getElementById('username');
const bioEl          = document.getElementById('bio');
const linkInput      = document.getElementById('link-input');
const addBtn         = document.getElementById('add-btn');
const addBtnLabel    = document.getElementById('add-btn-label');
const addLinkSection = document.getElementById('add-link-section');
const linksList      = document.getElementById('links-list');
const linkMsg        = document.getElementById('link-msg');
const linksNote      = document.getElementById('links-note');
const avRing         = document.getElementById('av-ring');
const avInner        = document.getElementById('av-inner');
const avLetter       = document.getElementById('av-letter');
const avatarInput    = document.getElementById('avatar-input');
const coverWrap      = document.getElementById('cover-wrap');
const coverInput     = document.getElementById('cover-input');
const uProgress      = document.getElementById('upload-progress');
const uBar           = document.getElementById('upload-bar');
const unamePill      = document.getElementById('uname-pill');
const unameIcon      = document.getElementById('uname-icon');
const unameText      = document.getElementById('uname-text');
const unameMsg       = document.getElementById('uname-msg');
const nameMsg        = document.getElementById('name-msg');
const nameCount      = document.getElementById('name-count');
const bioCount       = document.getElementById('bio-count');
const toast          = document.getElementById('toast');
const toastMsg       = document.getElementById('toast-msg');
const toastIcon      = document.getElementById('toast-icon');

// ── state ──
let currentUser   = null;
let orig          = {};      // original Firestore snapshot
let _avatarFile   = null;
let _avatarObjURL = null;
let _coverFile    = null;
let _coverObjURL  = null;
let _unameTimer   = null;
let _unameValid   = true;
let _links        = [];      // up to 2 URLs
let _editIdx      = null;    // null = adding, number = editing existing

// ══════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════
onAuthStateChanged(auth, async user => {
  if (!user) { location.href = 'index.html'; return; }
  currentUser = user;
  await loadProfile(user);
});

// ══════════════════════════════════════════
// LOAD
// ══════════════════════════════════════════
async function loadProfile(user) {
  try {
    const snap = await getDoc(doc(db, 'users', user.uid));
    const d = snap.exists() ? snap.data() : {};

    const name     = d.displayName || user.displayName || '';
    const username = d.username    || '';
    const bio      = d.bio         || '';
    // support both old `link` string and new `links` array
    let links = [];
    if (Array.isArray(d.links)) links = d.links.slice(0, MAX_LINKS);
    else if (d.link) links = [d.link];

    const photoURL = d.photoURL || user.photoURL || '';
    const coverURL = d.coverURL || '';

    orig = { name, username, bio, links: [...links], photoURL, coverURL };

    nameEl.value  = name;
    unameEl.value = username;
    bioEl.value   = bio;
    _links        = [...links];

    updateNameCount();
    updateBioCount();
    renderLinks();

    if (photoURL) setAvImg(photoURL, name);
    else {
      const { letter, bg } = letterColor(name || user.email || 'U');
      avLetter.textContent = letter;
      avInner.style.background = bg;
    }

    if (coverURL) {
      const img = document.createElement('img');
      img.src = coverURL;
      img.onerror = () => img.remove();
      coverWrap.insertBefore(img, coverWrap.firstChild);
    }
  } catch(e) {
    console.error(e);
    showToast('Failed to load profile', true);
  }
}

function letterColor(name) {
  const letter = (name || 'U').trim()[0].toUpperCase();
  const hue = (letter.charCodeAt(0) * 37) % 360;
  return { letter, bg: `hsl(${hue},50%,42%)` };
}

function setAvImg(src, name) {
  let img = avInner.querySelector('img');
  if (!img) { img = document.createElement('img'); avInner.appendChild(img); }
  img.src = src;
  img.onerror = () => {
    img.remove();
    const { letter, bg } = letterColor(name || nameEl.value || 'U');
    avLetter.textContent = letter;
    avLetter.style.display = '';
    avInner.style.background = bg;
  };
  avLetter.style.display = 'none';
}

// ══════════════════════════════════════════
// DIRTY CHECK — Save button only when something changed
// ══════════════════════════════════════════
function checkDirty() {
  const changed =
    nameEl.value.trim()  !== orig.name     ||
    unameEl.value.trim() !== orig.username ||
    bioEl.value.trim()   !== orig.bio      ||
    JSON.stringify(_links) !== JSON.stringify(orig.links || []) ||
    _avatarFile !== null ||
    _coverFile  !== null;

  saveBtn.classList.toggle('visible', changed);
}

// ══════════════════════════════════════════
// AVATAR
// ══════════════════════════════════════════
avRing.addEventListener('click', () => avatarInput.click());
avatarInput.addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  if (f.size > 8 * 1024 * 1024) { showToast('Image must be under 8 MB', true); return; }
  _avatarFile = f;
  if (_avatarObjURL) URL.revokeObjectURL(_avatarObjURL);
  _avatarObjURL = URL.createObjectURL(f);
  setAvImg(_avatarObjURL);
  checkDirty();
});

// ══════════════════════════════════════════
// COVER
// ══════════════════════════════════════════
coverWrap.addEventListener('click', () => coverInput.click());
coverInput.addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  if (f.size > 10 * 1024 * 1024) { showToast('Cover must be under 10 MB', true); return; }
  _coverFile = f;
  if (_coverObjURL) URL.revokeObjectURL(_coverObjURL);
  _coverObjURL = URL.createObjectURL(f);
  let img = coverWrap.querySelector('img');
  if (!img) { img = document.createElement('img'); coverWrap.insertBefore(img, coverWrap.firstChild); }
  img.src = _coverObjURL;
  checkDirty();
});

// ══════════════════════════════════════════
// CHAR COUNTS
// ══════════════════════════════════════════
function updateNameCount() {
  const n = nameEl.value.length;
  nameCount.textContent = `${n} / 50`;
  nameCount.className = 'char-count' + (n >= 46 ? ' warn':'') + (n >= 50 ? ' over':'');
}
function updateBioCount() {
  const n = bioEl.value.length;
  bioCount.textContent = `${n} / 160`;
  bioCount.className = 'char-count' + (n >= 145 ? ' warn':'') + (n >= 160 ? ' over':'');
}

nameEl.addEventListener('input', () => {
  updateNameCount();
  if (!nameEl.value.trim()) setFmsg(nameMsg,'Display name is required','err');
  else setFmsg(nameMsg,'','');
  // Update avatar letter + color live when no photo is set
  if (!avInner.querySelector('img')) {
    const { letter, bg } = letterColor(nameEl.value.trim() || 'U');
    avLetter.textContent = letter;
    avInner.style.background = bg;
  }
  checkDirty();
});
bioEl.addEventListener('input', () => { updateBioCount(); checkDirty(); });

// ══════════════════════════════════════════
// USERNAME
// ══════════════════════════════════════════
unameEl.addEventListener('input', () => {
  clearUname();
  setFmsg(unameMsg,'','');
  const v = unameEl.value.trim();
  if (!v) { _unameValid = true; checkDirty(); return; }

  if (!/^[a-zA-Z0-9_]{3,20}$/.test(v)) {
    setUname('bad','invalid');
    setFmsg(unameMsg,'3–20 characters: letters, numbers, underscores only','err');
    unameEl.classList.add('ferr');
    _unameValid = false;
    checkDirty(); return;
  }
  unameEl.classList.remove('ferr');

  if (v === orig.username) { clearUname(); _unameValid = true; checkDirty(); return; }

  setUname('checking','checking…');
  clearTimeout(_unameTimer);
  _unameTimer = setTimeout(() => checkUsername(v), 620);
  checkDirty();
});

async function checkUsername(v) {
  try {
    const snap = await getDocs(query(collection(db,'users'), where('username','==',v)));
    const taken = snap.docs.some(d => d.id !== currentUser.uid);
    if (taken) {
      setUname('bad','taken');
      setFmsg(unameMsg, '@' + v + ' is already taken', 'err');
      unameEl.classList.add('ferr');
      _unameValid = false;
    } else {
      setUname('ok','available');
      setFmsg(unameMsg, '@' + v + ' is available', 'ok');
      unameEl.classList.remove('ferr');
      _unameValid = true;
    }
  } catch(e) { clearUname(); _unameValid = true; }
}

function setUname(type, text) {
  unamePill.className = 'uname-pill vis ' + type;
  unameIcon.innerHTML = type === 'ok'
    ? '<polyline points="20 6 9 17 4 12"/>'
    : type === 'bad'
    ? '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>'
    : '';
  unameText.textContent = text;
}
function clearUname() {
  unamePill.className = 'uname-pill';
  unameEl.classList.remove('ferr');
}

// ══════════════════════════════════════════
// LINKS
// ══════════════════════════════════════════
function validateURL(raw) {
  const s = raw.trim();
  if (!s) return { ok:false, msg:'Enter a URL' };
  if (!/^https?:\/\//i.test(s)) return { ok:false, msg:'URL must start with https:// or http://' };
  try {
    const u = new URL(s);
    if (!u.hostname || !u.hostname.includes('.') || u.hostname.length < 3)
      return { ok:false, msg:'Enter a valid URL (e.g. https://example.com)' };
    return { ok:true, url:s };
  } catch(e) { return { ok:false, msg:'Not a valid URL' }; }
}

function prettyHost(url) {
  try {
    const u = new URL(url);
    const host = u.hostname.replace(/^www\./, '');
    const path = u.pathname === '/' ? '' : u.pathname;
    const tail = path.length > 20 ? path.slice(0, 20) + '…' : path;
    return host + tail;
  } catch(e) { return url; }
}

function renderLinks() {
  linksList.innerHTML = '';

  _links.forEach((url, i) => {
    const pill = document.createElement('div');
    pill.className = 'link-pill';
    pill.innerHTML = `
      <div class="link-pill-inner">
        <div class="pill-icon">
          <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        </div>
        <a class="pill-link" href="${encodeURI(url)}" target="_blank" rel="noopener noreferrer">
          <span class="pill-link-label">${prettyHost(url)}</span>
          <span class="pill-link-url">${url}</span>
        </a>
        <div class="pill-actions">
          <button class="pill-btn edit" data-i="${i}" title="Edit link">
            <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="pill-btn del" data-i="${i}" title="Delete link">
            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
      </div>
    `;

    pill.querySelector('.edit').addEventListener('click', () => {
      _editIdx = i;
      linkInput.value = _links[i];
      linkInput.classList.remove('ferr');
      setFmsg(linkMsg,'','');
      addBtn.disabled = false;
      addBtnLabel.textContent = 'Update';
      addLinkSection.style.display = '';
      linkInput.focus();
    });

    // Delete → confirm sheet
    pill.querySelector('.del').addEventListener('click', () => openConfirmSheet(i));

    // Clicking the pill link → link viewer sheet (intercept default)
    pill.querySelector('.pill-link').addEventListener('click', e => {
      e.preventDefault();
      openLinkSheet(url);
    });

    linksList.appendChild(pill);
  });

  // Show/hide add section
  const atCap = _links.length >= MAX_LINKS && _editIdx === null;
  addLinkSection.style.display = atCap ? 'none' : '';
  linksNote.textContent = _links.length >= MAX_LINKS
    ? 'Maximum 2 links reached'
    : `${MAX_LINKS - _links.length} link${MAX_LINKS - _links.length !== 1 ? 's' : ''} remaining`;
}

linkInput.addEventListener('input', () => {
  setFmsg(linkMsg,'','');
  linkInput.classList.remove('ferr');
  addBtn.disabled = !linkInput.value.trim();
});

addBtn.addEventListener('click', () => {
  const { ok, msg, url } = validateURL(linkInput.value);
  if (!ok) {
    setFmsg(linkMsg, msg, 'err');
    linkInput.classList.add('ferr');
    linkInput.focus();
    return;
  }
  linkInput.classList.remove('ferr');

  if (_editIdx !== null) {
    _links[_editIdx] = url;
    _editIdx = null;
    addBtnLabel.textContent = 'Add';
  } else {
    if (_links.includes(url)) { setFmsg(linkMsg,'This link is already added','err'); return; }
    if (_links.length >= MAX_LINKS) return;
    _links.push(url);
  }

  linkInput.value = '';
  addBtn.disabled = true;
  setFmsg(linkMsg,'','');
  renderLinks();
  checkDirty();
});

// ══════════════════════════════════════════
// CONFIRM DELETE SHEET
// ══════════════════════════════════════════
const confirmOverlay  = document.getElementById('confirm-overlay');
const confirmDeleteBtn = document.getElementById('confirm-delete-btn');
const confirmCancelBtn = document.getElementById('confirm-cancel-btn');
let _pendingDeleteIdx = null;

function openConfirmSheet(idx) {
  _pendingDeleteIdx = idx;
  confirmOverlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeConfirmSheet() {
  confirmOverlay.classList.remove('open');
  _pendingDeleteIdx = null;
  if (!linkOverlay.classList.contains('open')) document.body.style.overflow = '';
}

confirmDeleteBtn.addEventListener('click', () => {
  if (_pendingDeleteIdx === null) return;
  const i = _pendingDeleteIdx;
  _links.splice(i, 1);
  if (_editIdx === i) { _editIdx = null; linkInput.value = ''; addBtnLabel.textContent = 'Add'; addBtn.disabled = true; }
  renderLinks();
  checkDirty();
  closeConfirmSheet();
});
confirmCancelBtn.addEventListener('click', closeConfirmSheet);
confirmOverlay.addEventListener('click', e => { if (e.target === confirmOverlay) closeConfirmSheet(); });

// ══════════════════════════════════════════
// LINK VIEWER SHEET
// ══════════════════════════════════════════
const linkOverlay    = document.getElementById('link-overlay');
const linkSheetURL   = document.getElementById('link-sheet-url-text');
const linkOpenBtn    = document.getElementById('link-open-btn');
const linkCancelBtn  = document.getElementById('link-cancel-btn');
let _pendingURL = '';

function openLinkSheet(url) {
  _pendingURL = url;
  linkSheetURL.textContent = url;
  linkOverlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLinkSheet() {
  linkOverlay.classList.remove('open');
  _pendingURL = '';
  if (!confirmOverlay.classList.contains('open')) document.body.style.overflow = '';
}

linkOpenBtn.addEventListener('click', () => {
  if (_pendingURL) window.open(_pendingURL, '_blank', 'noopener,noreferrer');
  closeLinkSheet();
});
linkCancelBtn.addEventListener('click', closeLinkSheet);
linkOverlay.addEventListener('click', e => { if (e.target === linkOverlay) closeLinkSheet(); });
async function uploadToR2(file, folder) {
  const ext   = (file.name.split('.').pop() || 'jpg').toLowerCase();
  const fname = `${folder}/${currentUser.uid}_${Date.now()}.${ext}`;
  const form  = new FormData();
  form.append('file', file, fname);
  const res = await fetch(R2, { method:'POST', body:form });
  if (!res.ok) throw new Error('Upload failed ' + res.status);
  const data = await res.json();
  return data.url || data.fileUrl || data.publicUrl || '';
}

// ══════════════════════════════════════════
// SAVE
// ══════════════════════════════════════════
saveBtn.addEventListener('click', async () => {
  if (!currentUser) return;

  const name     = nameEl.value.trim();
  const username = unameEl.value.trim();
  const bio      = bioEl.value.trim();

  if (!name) {
    setFmsg(nameMsg,'Display name is required','err');
    nameEl.classList.add('ferr'); nameEl.focus();
    return;
  }
  nameEl.classList.remove('ferr');

  if (username && !_unameValid) {
    showToast('Fix the username error first', true);
    unameEl.focus(); return;
  }

  saveBtn.disabled = true;
  saveLabel.style.display = 'none';
  saveDots.style.display = 'flex';

  try {
    let photoURL = orig.photoURL;
    let coverURL = orig.coverURL;

    if (_avatarFile || _coverFile) { uProgress.style.display='block'; uBar.style.width='8%'; }

    if (_avatarFile) {
      photoURL = await uploadToR2(_avatarFile, 'avatars');
      uBar.style.width = _coverFile ? '42%' : '75%';
    }
    if (_coverFile) {
      coverURL = await uploadToR2(_coverFile, 'covers');
      uBar.style.width = '80%';
    }

    await updateProfile(currentUser, { displayName:name, ...(photoURL ? {photoURL} : {}) });

    const updates = { displayName:name, bio, links:_links, updatedAt:new Date().toISOString() };
    if (username) updates.username = username;
    if (photoURL) updates.photoURL = photoURL;
    if (coverURL) updates.coverURL = coverURL;

    await setDoc(doc(db,'users',currentUser.uid), updates, { merge:true });

    uBar.style.width = '100%';
    setTimeout(() => { uProgress.style.display='none'; uBar.style.width='0%'; }, 700);

    orig = { name, username, bio, links:[..._links], photoURL, coverURL };
    _avatarFile = null; _coverFile = null;
    if (_avatarObjURL) { URL.revokeObjectURL(_avatarObjURL); _avatarObjURL=null; }
    if (_coverObjURL)  { URL.revokeObjectURL(_coverObjURL);  _coverObjURL=null;  }

    // Hide save button — nothing dirty
    saveBtn.classList.remove('visible');
    showToast('Profile saved!');

  } catch(err) {
    console.error(err);
    showToast('Save failed — please try again', true);
    uProgress.style.display = 'none';
  } finally {
    saveBtn.disabled = false;
    saveLabel.style.display = '';
    saveDots.style.display = 'none';
  }
});

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
function setFmsg(el, msg, type) {
  el.textContent = msg;
  el.className = 'fmsg' + (msg ? ' '+type : '');
}

let _tTimer;
function showToast(msg, isErr=false) {
  clearTimeout(_tTimer);
  toastMsg.textContent = msg;
  toast.className = 'toast' + (isErr ? ' terr' : '');
  toastIcon.innerHTML = isErr
    ? '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>'
    : '<polyline points="20 6 9 17 4 12"/>';
  toast.offsetHeight;
  toast.classList.add('show');
  _tTimer = setTimeout(() => toast.classList.remove('show'), 3200);
}
</script>
